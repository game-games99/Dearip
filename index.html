<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DeaRip - v1.5</title>
    <style>
        :root { 
            --bg: #050505; 
            --panel: #121212; 
            --accent: #dcdcdc; 
            --danger: #ff3333; 
            --win: #ffffff; 
            --skill: #0077be; 
            --sp: #ffcc00; 
            --exp-bar: #666666;
            --rarity-n: #aaa;
            --rarity-r: #4af;
            --rarity-e: #a4f;
            --rarity-l: #fa0;
        }
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            touch-action: manipulation; 
        }
        body { 
            background: var(--bg); 
            color: var(--accent); 
            font-family: 'Hiragino Mincho ProN', 'serif'; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
            position: relative;
        }
        
        #game-container { 
            width: 100%; 
            max-width: 480px; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            background: var(--panel); 
            position: relative; 
        }
        
        #header { 
            padding: 8px 15px; 
            border-bottom: 1px solid #333; 
            background: #000; 
            flex-shrink: 0; 
        }
        .status-row { 
            display: flex; 
            justify-content: space-between; 
            font-size: 0.75rem; 
            color: #aaa; 
        }
        .bar-container { 
            width: 100%; 
            height: 5px; 
            background: #222; 
            margin: 2px 0; 
            border-radius: 1px; 
            overflow: hidden; 
        }
        .bar-fill { 
            height: 100%; 
            transition: width 0.3s; 
        }
        .hp-bar { background: #2a2; }
        .e-hp-bar { background: #b30000; }
        .exp-bar { background: var(--exp-bar); height: 2px; }
        
        #display { 
            padding: 15px 10px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            flex-shrink: 0; 
            min-height: 80px; 
        }
        #enemy-name { font-size: 0.9rem; margin-bottom: 6px; letter-spacing: 1px; }

        #tab-container { 
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0a0a0a; 
            border-top: 1px solid #222; 
            overflow: hidden;
        }
        .tab-buttons { display: flex; border-bottom: 1px solid #222; flex-shrink: 0; }
        .tab-btn { 
            flex: 1; 
            padding: 10px; 
            background: #111; 
            border: none; 
            color: #555; 
            font-size: 0.7rem; 
            cursor: pointer; 
        }
        .tab-btn.active { 
            background: #1a1a1a; 
            color: var(--accent); 
            border-bottom: 2px solid var(--accent); 
        }
        .tab-content { 
            display: none; 
            padding: 10px; 
            flex: 1;
            font-size: 0.75rem; 
            overflow-y: auto; 
        }
        .tab-content.active { display: block; }
        
        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px 10px;
            margin-bottom: 10px;
        }
        .stat-item { border-bottom: 1px solid #1a1a1a; padding: 2px 0; display: flex; justify-content: space-between; }
        .stat-label { color: #666; font-size: 0.65rem; }

        .growth-grid { display: flex; gap: 5px; margin-top: 5px; flex-shrink: 0; }
        .growth-btn { 
            flex: 1; 
            background: #222; 
            border: 1px solid #444; 
            color: #aaa; 
            padding: 8px 0; 
            font-size: 0.65rem; 
            border-radius: 3px; 
        }

        .equip-slot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #222;
        }
        .equip-name { color: #ccc; flex: 1; margin-left: 10px; font-size: 0.75rem; }
        .equip-val { color: #8af; font-size: 0.6rem; text-align: right; }

        #controls { 
            padding: 10px; 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 8px; 
            background: #0e0e0e; 
            border-top: 1px solid #333; 
            flex-shrink: 0; 
        }
        button.action-btn { 
            background: #1a1a1a; 
            color: #ccc; 
            border: 1px solid #444; 
            padding: 12px 5px; 
            cursor: pointer; 
            border-radius: 4px; 
            font-size: 0.85rem; 
            touch-action: none;
        }
        button.action-btn:disabled { opacity: 0.2; }
        .btn-skill { border-color: var(--skill) !important; color: #8af !important; }

        #log { 
            height: 100px;
            overflow-y: auto; 
            font-size: 0.75rem; 
            padding: 10px; 
            background: #000; 
            color: #777; 
            line-height: 1.4; 
            border-top: 1px solid #222; 
            flex-shrink: 0;
        }
        .log-entry { margin-bottom: 3px; border-left: 2px solid #222; padding-left: 8px; }

        .coll-item { font-size: 0.65rem; color: #444; }
        .coll-item.owned { color: var(--accent); }
        .rarity-n { color: var(--rarity-n); }
        .rarity-r { color: var(--rarity-r); }
        .rarity-e { color: var(--rarity-e); }
        .rarity-l { color: var(--rarity-l); }

        #version-tag {
            position: absolute;
            bottom: 2px;
            right: 5px;
            font-size: 0.5rem;
            color: #333;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="header">
        <div id="area-title" style="font-size: 0.6rem; color:#666;">---</div>
        <div class="status-row">
            <span id="p-lv">Lv.1</span>
            <span id="p-hp-text">HP: 100/100</span>
        </div>
        <div class="bar-container"><div id="p-hp-bar" class="bar-fill hp-bar"></div></div>
        <div class="bar-container" style="height:2px; margin-top:0;"><div id="p-exp-bar" class="bar-fill exp-bar"></div></div>
    </div>

    <div id="display">
        <div id="enemy-name">---</div>
        <div class="bar-container" style="width: 80%;"><div id="e-hp-bar" class="bar-fill e-hp-bar"></div></div>
    </div>

    <div id="tab-container">
        <div class="tab-buttons">
            <button class="tab-btn active" onclick="game.switchTab(0)">能力</button>
            <button class="tab-btn" onclick="game.switchTab(1)">装備</button>
            <button class="tab-btn" onclick="game.switchTab(2)">収集</button>
        </div>
        
        <div id="tab-status" class="tab-content active">
            <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                <span>Soul Point: <span id="p-sp" style="color:var(--sp)">0</span></span>
                <span id="p-exp-text" style="color:#666; font-size:0.6rem;">exp: 0 / 100</span>
            </div>
            <div class="stat-grid" id="stat-list"></div>
            <div class="growth-grid">
                <button class="growth-btn" onclick="game.grow('atk')">力(ATK)+</button>
                <button class="growth-btn" onclick="game.grow('hp')">器(HP)+</button>
                <button class="growth-btn" onclick="game.grow('spd')">迅(SPD)+</button>
            </div>
        </div>

        <div id="tab-equip" class="tab-content">
            <div id="equip-list"></div>
            <hr style="border:0; border-top:1px solid #222; margin:10px 0;">
            <div id="skill-desc" style="color:#8af; font-size: 0.65rem;">腕パーツを適合させてください。</div>
        </div>

        <div id="tab-coll" class="tab-content">
            <div id="coll-list" style="display:grid; grid-template-columns: 1fr; gap:5px;"></div>
        </div>
    </div>

    <div id="log"></div>

    <div id="controls">
        <button id="btn-main" class="action-btn" onclick="game.handleMainBtn()">こうげき</button>
        <button id="btn-skill" class="action-btn btn-skill" onclick="game.battle('skill')" disabled>技：---</button>
    </div>
    
    <div id="version-tag"></div>
</div>

    save() {
        const data = { p: this.p, seed: this.seed, floor: this.floor };
        localStorage.setItem(this.SAVE_KEY, JSON.stringify(data));
    }

    load() {
        // v1.1-1.3救出ロジック
        const oldKeys = ["DEARIP_SAVE_DATA_V1_1", "DEARIP_SAVE_DATA_V1_2", "DEARIP_SAVE_DATA_V1_3", "DEARIP_SAVE_DATA_V1_4"];
        let migratedData = null;
        for(const oldKey of oldKeys) {
            const data = localStorage.getItem(oldKey);
            if(data) {
                migratedData = JSON.parse(data);
                localStorage.removeItem(oldKey);
                break;
            }
        }

        const saved = migratedData ? JSON.stringify(migratedData) : localStorage.getItem(this.SAVE_KEY);
        
        if(saved) {
            const parsed = JSON.parse(saved);
            this.p = parsed.p;
            this.seed = parsed.seed;
            this.floor = parsed.floor;
            // v1.5用初期化
            if(!this.p.coll) this.p.coll = {}; 
            if(migratedData) this.save();
        } else {
            this.p = {
                lv: 1, exp: 0, next: 100, sp: 0,
                baseHp: 100, baseAtk: 15, baseDef: 5, baseSpd: 10,
                hp: 100, plusAtk: 0, plusHp: 0, plusSpd: 0,
                eq: { 
                    head: { name: "忘却のボロ布", def: 2 },
                    body: { name: "忘却の骸殻", hp: 30 },
                    arm: { name: "忘却の腕", atk: 3, skillId: 0 }, // スキルIDで管理
                    leg: { name: "忘却の足枷", spd: 2 }
                },
                coll: {} // { jobName: [n, r, e, l] }
            };
            this.seed = null; 
            this.floor = 1;
        }
    }

    generateSeed() {
        const name = this.areaNames[Math.floor(Math.random()*this.areaNames.length)] + 
                     this.areaTypes[Math.floor(Math.random()*this.areaTypes.length)];
        this.seed = { name: name, diff: 1.0 + (Math.random() * 0.4) };
    }

    get stats() {
        let s = { 
            hp: this.p.baseHp + this.p.plusHp, 
            atk: this.p.baseAtk + this.p.plusAtk, 
            def: this.p.baseDef, 
            spd: this.p.baseSpd + this.p.plusSpd 
        };
        // コレクション常時発動効果 & コンプボーナス
        let bonuses = { 
            hp: 0, atk: 0, def: 0, spd: 0, hpP: 0, atkP: 0, defP: 0, spdP: 0, 
            exp: 0, crit: 0.05, critD: 1.5, eva: 0.05, drain: 0, regen: 0, shield: 0 
        };

        for(const jobName in this.p.coll) {
            const master = this.jobMaster.find(j => j.n === jobName);
            const owned = this.p.coll[jobName]; // [n, r, e, l] boolean array
            const rarities = ["n", "r", "e", "l"];
            owned.forEach((isOwned, idx) => {
                if(isOwned) {
                    const effects = master.coll[rarities[idx]];
                    for(const key in effects) bonuses[key] += effects[key];
                }
            });
            // コンプボーナス
            if(owned.every(v => v)) {
                for(const key in master.cb) bonuses[key] += master.cb[key];
            }
        }

        // 装備ボーナス
        for(let slot in this.p.eq) {
            const item = this.p.eq[slot];
            if(item) {
                if(item.hp) s.hp += item.hp;
                if(item.atk) s.atk += item.atk;
                if(item.def) s.def += item.def;
                if(item.spd) s.spd += item.spd;
            }
        }

        // 最終計算
        const finalAtk = Math.floor((s.atk + bonuses.atk) * (1 + bonuses.atkP));
        const finalHp = Math.floor((s.hp + bonuses.hp) * (1 + bonuses.hpP));
        const finalDef = Math.floor((s.def + bonuses.def) * (1 + bonuses.defP));
        const finalSpd = Math.floor((s.spd + bonuses.spd) * (1 + bonuses.spdP));

        return { 
            hp: finalHp, atk: finalAtk, def: finalDef, spd: finalSpd, 
            exp: 1 + bonuses.exp, crit: bonuses.crit, critD: bonuses.critD, 
            eva: bonuses.eva, drain: bonuses.drain, regen: bonuses.regen, shield: bonuses.shield
        };
    }

    spawn() {
        const isBoss = this.floor % 30 === 0;
        if(isBoss) {
            this.enemy = {
                name: `${this.seed.name}主：崩御せし異形`,
                hp: Math.floor(1000 * this.seed.diff * (1 + this.floor * 0.1)), 
                maxHp: Math.floor(1000 * this.seed.diff * (1 + this.floor * 0.1)),
                atk: Math.floor(60 * this.seed.diff * (1 + this.floor * 0.05)), 
                def: Math.floor(100 * this.seed.diff),
                isBoss: true, jobRef: this.jobMaster[Math.floor(Math.random()*75)]
            };
            this.log(`<span style="color:#f44;">【警告】領域の主を感知。</span>`);
        } else {
            const job = this.jobMaster[Math.floor(Math.random()*this.jobMaster.length)];
            const rankIdx = Math.floor(Math.random()*Math.min(this.ranks.length, Math.ceil(this.floor/10)));
            const rank = this.ranks[rankIdx];
            const scale = 1 + (this.floor * 0.15) * this.seed.diff;
            this.enemy = {
                name: `${rank.n}${job.n}`,
                hp: Math.floor(60 * rank.m * job.s.h * scale), maxHp: Math.floor(60 * rank.m * job.s.h * scale),
                atk: Math.floor(12 * rank.m * job.s.a * scale), 
                def: Math.floor(10 * rank.m * scale),
                isBoss: false, jobRef: job, rankIdx: rankIdx
            };
        }
        this.state = "battle";
        this.updateUI();
    }

    grow(type) {
        if(this.p.sp <= 0) return;
        this.p.sp--;
        if(type === 'atk') this.p.plusAtk += 4;
        if(type === 'hp') { this.p.plusHp += 20; this.p.hp += 20; }
        if(type === 'spd') this.p.plusSpd += 3;
        this.save(); this.updateUI();
    }

    switchTab(index) {
        document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === index));
        document.querySelectorAll('.tab-content').forEach((c, i) => c.classList.toggle('active', i === index));
    }

    handleMainBtn() {
        if(this.state === "battle") this.battle('atk');
        else if(this.state === "win") this.nextFloor();
    }

    async battle(mode) {
        if(this.busy) return;
        this.busy = true;
        const s = this.stats;
        
        // プレイヤー攻撃
        let dmg = s.atk;
        let isCrit = Math.random() < s.crit;
        if(mode === 'skill') {
            const skillJob = this.jobMaster.find(j => j.id === this.p.eq.arm.skillId);
            dmg *= skillJob.sm;
            this.log(`<span style="color:var(--skill);">『${skillJob.sk}』</span>`);
        }
        if(isCrit) dmg *= s.critD;
        
        // 速度補正（簡易：SPD差が10につき10%上昇、最大2倍）
        const spdBonus = Math.min(2.0, 1 + Math.max(0, (s.spd - 10) / 200));
        dmg *= spdBonus;

        // 防御軽減
        const enemyMitigation = this.enemy.def / (this.enemy.def + 500);
        let finalDmg = Math.floor(dmg * (1 - enemyMitigation));
        
        this.enemy.hp -= finalDmg;
        this.log(`${this.enemy.name} に ${finalDmg}${isCrit?" <b style='color:#fa0'>(Crit!)</b>":""} ダメージ`);

        // ドレイン
        if(s.drain > 0) {
            const heal = Math.floor(finalDmg * (s.drain / 100));
            this.p.hp = Math.min(s.hp, this.p.hp + heal);
        }

        if(this.enemy.hp <= 0) { 
            await this.win(); 
        } else {
            await new Promise(r => setTimeout(r, 400));
            // 敵の攻撃
            if(Math.random() > s.eva) {
                const pMitigation = s.def / (s.def + 500);
                const eDmg = Math.max(1, Math.floor(this.enemy.atk * (1 - pMitigation)));
                this.p.hp -= eDmg;
                this.log(`<span style="color:var(--danger);">${this.enemy.name} から ${eDmg} ダメージ</span>`);
                if(this.p.hp <= 0) { this.p.hp = 0; this.gameOver(); }
            } else {
                this.log(`<span style="color:#4af;">攻撃を回避した</span>`);
            }
        }
        this.updateUI(); this.busy = false; this.save();
    }

    async win() {
        this.enemy.hp = 0;
        const s = this.stats;
        const expBase = (this.enemy.isBoss ? 1500 : 40 + (this.floor * 6));
        const exp = Math.floor(expBase * s.exp);
        this.log(`${exp} exp 獲得`);
        this.state = "win";
        this.p.exp += exp;
        
        // コレクション抽選
        this.tryDropCollection();

        if(this.p.exp >= this.p.next) this.levelUp();
        if(this.enemy.isBoss) { this.dropEquip(); this.generateSeed(); } 
    }

    tryDropCollection() {
        const jobName = this.enemy.jobRef.n;
        if(!this.p.coll[jobName]) this.p.coll[jobName] = [false, false, false, false];
        const owned = this.p.coll[jobName];
        
        const rates = [0.1, 0.02, 0.005, 0.001]; // N, R, E, L
        // ランクに応じて解放 (ただの=0, 生きたかった=1...)
        for(let i = 0; i <= this.enemy.rankIdx; i++) {
            if(owned[i]) continue; // 既に持ってれば抽選はするが飛ばす (既に持っているものは排出されない仕様)
            if(Math.random() < rates[i]) {
                owned[i] = true;
                const rNames = ["(N)", "(R)", "(E)", "(L)"];
                const rColors = ["#aaa", "#4af", "#a4f", "#fa0"];
                this.log(`<span style="color:${rColors[i]}">収集：${jobName}の魂 ${rNames[i]} を獲得！</span>`);
                break; // 1回の戦闘で1つまで
            }
        }
    }

    levelUp() {
        this.p.lv++; this.p.exp -= this.p.next;
        this.p.next = Math.floor(this.p.next * 1.55);
        this.p.sp += 3; this.p.hp = this.stats.hp;
        this.log(`<span style="color:#fff">Level Up: Lv.${this.p.lv}</span>`);
    }

    dropEquip() {
        const slots = ["head", "body", "arm", "leg"];
        const s = slots[Math.floor(Math.random()*slots.length)];
        const suffix = {head:"の思考回路", body:"の防護殻", arm:"の執行腕", leg:"の加速脚"};
        const job = this.enemy.jobRef;
        const part = { name: job.p + suffix[s] };
        if(s === 'head') part.def = Math.floor(25 * job.s.h);
        if(s === 'body') part.hp = Math.floor(200 * job.s.h);
        if(s === 'arm') { 
            part.atk = Math.floor(40 * job.s.a); 
            part.skillId = job.id; 
        }
        if(s === 'leg') part.spd = Math.floor(30 * job.s.a);
        this.p.eq[s] = part;
        this.log(`適合：${part.name}`);
    }

    nextFloor() {
        this.floor++; this.spawn(); this.save();
    }

    gameOver() {
        this.log(`<span style="color:var(--danger);">死を経験し、1層へ回帰した。</span>`);
        this.floor = 1; this.p.hp = this.stats.hp;
        this.spawn(); this.save();
    }

    log(m) {
        const l = document.getElementById('log');
        l.innerHTML = `<div class="log-entry">> ${m}</div>` + l.innerHTML;
        if(l.children.length > 30) l.removeChild(l.lastChild);
        l.scrollTop = 0;
    }

            </div>`;
        });
        document.getElementById('coll-list').innerHTML = collHtml + `<div style="font-size:0.6rem; color:#444; text-align:center;">(以下略: 全75種を追跡中)</div>`;
        
        document.getElementById('version-tag').innerText = `DeaRip v${this.VERSION}`;
    }

    getEquipVal(item) {
        if(!item) return "";
        let t = "";
        if(item.hp) t += `HP+${item.hp} `;
        if(item.atk) t += `ATK+${item.atk} `;
        if(item.def) t += `DEF+${item.def} `;
        if(item.spd) t += `SPD+${item.spd} `;
        return t;
    }
}
const game = new DeaRip();
</script>
