<script>
class DeaRip {
    constructor() {
        this.VERSION = "2.0";
        this.SAVE_KEY = "DEARIP_SAVE_V20";
        this.MAX_MP = 100;
        this.autoMode = false;
        this.autoTimer = null;
        this._pendingEquip = null;
        this._equipResolve = null;

        this.initData();
        this.load();
        if (!this.seed) this.generateArea(0);
        this.spawn();
    }

    initData() {
        const names = ["村人","兵士","騎士","魔導師","暗殺者","狂戦士","守護者","司祭","狩人","格闘家","盗賊","薬師","剣豪","弓兵","盾使い","吟遊詩人","賢者","死霊使い","竜騎士","忍者","僧侶","修道士","侍","錬金術師","踊り子","海賊","呪術師","機工士","聖騎士","道化師","破戒僧","探検家","貴族","隠者","道士","銃士","狙撃手","槍兵","農夫","山賊","審問官","占星術師","呪われし者","異端者","大師","傭兵","狂人","王","職人","無職","虚空騎士","死神","舞姫","重装歩兵","調教師","魔王","予言者","料理人","狂信者","流浪人","傀儡師","探偵","石像鬼","博徒","発明家","裁定者","氷結使い","炎術師","森の番人","虚像","神主","暗黒騎士","英雄","観測者","混沌の器"];
        this.jobMaster = names.map((n, i) => ({
            id: i, n: n,
            p: i > 50 ? "超越的な" : "熟練の",
            s: { h: 1 + i * 0.025, a: 1 + i * 0.025 },
            sk: n === "無職" ? "あがき" : "魂の一撃",
            sm: 2.0 + i * 0.02,
            mpCost: 30 + Math.floor(i * 0.3),
            coll: {
                n: { hp: 5 + i },
                r: { atk: 2 + (i % 5) },
                e: { def: 1 + (i % 3), spd: 1 + (i % 3) },
                l: { atkP: 0.01, exp: 0.02 }
            },
            cb: { hpP: 0.05 },
            // Drop rate info
            rates: [0.12, 0.04, 0.01, 0.003]
        }));

        this.areaMaster = [
            { id: 0, name: "嘆きの村", type: "村", tier: 1, jobs: [0, 1, 38, 39, 49] },
            { id: 1, name: "静寂の墓所", type: "墓所", tier: 2, jobs: [7, 10, 11, 17, 33, 61] },
            { id: 2, name: "狂乱の牢獄", type: "牢獄", tier: 3, jobs: [2, 13, 14, 25, 45, 53] },
            { id: 3, name: "忘却の廃都", type: "廃都", tier: 4, jobs: [16, 18, 47, 51, 55, 72] }
        ];
        this.ranks = [
            { n: "ただの", m: 1.0 },
            { n: "生きたかった", m: 1.3 },
            { n: "狂気に染まる", m: 1.8 },
            { n: "支配された", m: 2.5 }
        ];

        // Enemy action types
        this.enemyActions = [
            { id: "atk", label: "通常攻撃", dmgMul: 1.0 },
            { id: "heavy", label: "強撃を構えている", dmgMul: 2.2, chance: 0.25 },
            { id: "guard", label: "防御を固めている", dmgMul: 0, defMul: 3.0, chance: 0.2 }
        ];
    }

    load() {
        const saved = localStorage.getItem(this.SAVE_KEY);
        if (saved) {
            try {
                const data = JSON.parse(saved);
                this.p = data.p;
                this.floor = data.floor;
                this.seed = data.seed;
                this.kills = data.kills || 0;
            } catch(e) { this.freshStart(); }
        } else {
            this.freshStart();
        }
    }

    freshStart() {
        this.kills = 0;
        this.resetStatus(true);
        this.p.eq = {
            head: { name: "ただの村人の頭", def: 2 },
            body: { name: "ただの村人の胴", hp: 40 },
            arm: { name: "ただの村人の腕", atk: 4, skillId: 49 },
            leg: { name: "ただの村人の脚", spd: 3 }
        };
        this.p.coll = {};
        this.floor = 1;
    }

    resetStatus(full = false) {
        if (!this.p || full) this.p = {};
        this.p.lv = 1; this.p.exp = 0; this.p.next = 100;
        this.p.base = { hp: 120, atk: 18, def: 5, spd: 10 };
        this.p.mp = 0;
        // preserve eq and coll if not full reset
        if (!this.p.eq) this.p.eq = {};
        if (!this.p.coll) this.p.coll = {};
        this.p.hp = this.calcStats().hp;
    }

    save() {
        localStorage.setItem(this.SAVE_KEY, JSON.stringify({
            p: this.p, floor: this.floor, seed: this.seed, kills: this.kills
        }));
    }

    generateArea(areaIdx) {
        const area = this.areaMaster[areaIdx % this.areaMaster.length] || this.areaMaster[0];
        this.seed = { ...area, diff: 1 + area.tier * 0.4 };
    }

    calcStats() {
        let s = { ...this.p.base };
        let b = { hp: 0, atk: 0, def: 0, spd: 0, hpP: 0, atkP: 0, defP: 0, spdP: 0, exp: 1, crit: 0.05, critD: 1.5, eva: 0.05, drain: 0, regen: 0 };

        for (let jn in this.p.coll) {
            const m = this.jobMaster.find(j => j.n === jn);
            if (!m) continue;
            const owned = this.p.coll[jn];
            const rr = ["n", "r", "e", "l"];
            owned.forEach((has, i) => { if (has) for (let k in m.coll[rr[i]]) b[k] = (b[k] || 0) + m.coll[rr[i]][k]; });
            if (owned.every(v => v)) for (let k in m.cb) b[k] = (b[k] || 0) + m.cb[k];
        }

        const eq = this.p.eq || {};
        for (let k in eq) {
            const it = eq[k];
            if (it.hp) s.hp += it.hp; if (it.atk) s.atk += it.atk;
            if (it.def) s.def += it.def; if (it.spd) s.spd += it.spd;
        }

        return {
            hp: Math.floor((s.hp + b.hp) * (1 + b.hpP)),
            atk: Math.floor((s.atk + (b.atk||0)) * (1 + (b.atkP||0))),
            def: Math.floor((s.def + (b.def||0)) * (1 + (b.defP||0))),
            spd: Math.floor((s.spd + (b.spd||0)) * (1 + (b.spdP||0))),
            exp: b.exp, crit: b.crit, critD: b.critD, eva: b.eva,
            drain: b.drain || 0, regen: b.regen || 0
        };
    }

    get stats() { return this.calcStats(); }

    spawn() {
        const isBoss = this.floor > 1 && this.floor % 30 === 0;
        const availableJobs = this.seed.jobs;
        const job = this.jobMaster[availableJobs[Math.floor(Math.random() * availableJobs.length)]];
        const rankIdx = Math.floor(Math.random() * Math.min(4, this.seed.tier));
        const scale = (1 + this.floor * 0.12) * this.seed.diff;

        this.enemy = {
            name: isBoss ? `${this.seed.name}の主` : `${this.ranks[rankIdx].n}${job.n}`,
            hp: Math.floor((isBoss ? 1200 : 70) * scale * job.s.h),
            atk: Math.floor((isBoss ? 60 : 15) * scale * job.s.a),
            def: Math.floor(12 * scale),
            isBoss, jobRef: job, rankIdx,
            nextAction: this.rollEnemyAction()
        };
        this.enemy.maxHp = this.enemy.hp;
        this.state = "battle";
        this.updateUI();
        this._scheduleAuto();
    }

    rollEnemyAction() {
        const r = Math.random();
        if (r < 0.2) return this.enemyActions[2]; // guard
        if (r < 0.45) return this.enemyActions[1]; // heavy
        return this.enemyActions[0]; // normal
    }

    levelUp() {
        this.p.lv++;
        this.p.exp -= this.p.next;
        this.p.next = Math.floor(this.p.next * 1.6);
        const incHp = 18 + Math.floor(Math.random() * 12);
        const incAtk = 4 + Math.floor(Math.random() * 4);
        this.p.base.hp += incHp;
        this.p.base.atk += incAtk;
        this.p.base.def += 1;
        this.p.base.spd += 1;
        this.p.hp = this.stats.hp;
        this.log(`<span style="color:#fff;">── 魂の格が上昇 (HP+${incHp} ATK+${incAtk}) ──</span>`);
    }

    async battle(mode) {
        if (this.busy || this.state !== "battle") return;

        // MP check for skill
        if (mode === 'skill') {
            const skJob = this.jobMaster.find(j => j.id === this.p.eq?.arm?.skillId);
            if (!skJob) return;
            const cost = skJob.mpCost;
            if (this.p.mp < cost) {
                this.log(`MPが足りない (必要: ${cost})`);
                return;
            }
            this.p.mp -= cost;
        }

        this.busy = true;
        const s = this.stats;
        let dmg = s.atk;
        let isCrit = Math.random() < s.crit;
        let logMsg = "";

        if (mode === 'skill') {
            const sk = this.jobMaster.find(j => j.id === this.p.eq.arm.skillId);
            dmg *= sk.sm;
            logMsg = `<span style="color:var(--skill);">『${sk.sk}』</span> `;
        }
        if (isCrit) dmg *= s.critD;

        // Enemy guard reduces damage
        const enemyDefMul = this.enemy.nextAction.id === "guard" ? this.enemy.nextAction.defMul : 1;
        let finalDmg = Math.max(1, Math.floor(dmg * (600 / (this.enemy.def * enemyDefMul + 600))));

        this.enemy.hp -= finalDmg;
        if (this.enemy.hp < 0) this.enemy.hp = 0;

        logMsg += `${this.enemy.name} に ${finalDmg}${isCrit ? " <span style='color:#fa0;'>会心</span>" : ""}ダメージ`;
        if (enemyDefMul > 1) logMsg += ` <span style='color:#888;'>(防御中)</span>`;
        this.log(logMsg);
        this.showDamageFloat(finalDmg, isCrit, true);

        // Drain
        if (s.drain > 0) {
            const heal = Math.floor(finalDmg * s.drain / 100);
            this.p.hp = Math.min(s.hp, this.p.hp + heal);
        }

        if (this.enemy.hp <= 0) {
            this.state = "win";
            this.kills = (this.kills || 0) + 1;
            const exp = Math.floor((this.enemy.isBoss ? 3000 : 50 + this.floor * 8) * s.exp);
            this.p.exp += exp;
            // MP gain on kill
            this.p.mp = Math.min(this.MAX_MP, this.p.mp + 15 + Math.floor(this.floor * 0.5));
            this.log(`${exp} EXP獲得 / MP回収`);
            this.tryDrop();

            const dropChance = this.enemy.isBoss ? 1.0 : 0.08 + this.floor * 0.002;
            if (Math.random() < dropChance) await this.dropEquipWithModal();

            while (this.p.exp >= this.p.next) this.levelUp();
            if (this.enemy.isBoss) this.nextArea();
            this.updateUI();
            if (this.autoMode) {
                this.busy = false;
                setTimeout(() => this.handleMainBtn(), 500);
            } else {
                this.busy = false;
            }
        } else {
            await new Promise(r => setTimeout(r, 200));
            this.enemy.nextAction = this.rollEnemyAction();

            // Enemy attack
            const action = this.enemy.nextAction;
            if (action.id !== "guard") {
                if (Math.random() > s.eva) {
                    const eDmg = Math.max(1, Math.floor(this.enemy.atk * action.dmgMul * (600 / (s.def + 600))));
                    this.p.hp -= eDmg;
                    if (this.p.hp < 0) this.p.hp = 0;
                    const isHeavy = action.id === "heavy";
                    this.log(`<span style="color:${isHeavy ? '#ff6666' : 'var(--danger)'};">${this.enemy.name}から${eDmg}${isHeavy ? " (強撃!)" : ""}の痛打</span>`);
                    this.showDamageFloat(eDmg, isHeavy, false);
                    if (this.p.hp <= 0) { this.gameOver(); this.busy = false; return; }
                } else {
                    this.log(`回避`);
                }
            } else {
                this.log(`<span style="color:#888;">${this.enemy.name}は防御した</span>`);
            }

            // Regen
            if (s.regen > 0) {
                this.p.hp = Math.min(s.hp, this.p.hp + s.regen);
            }

            // MP passive gain
            this.p.mp = Math.min(this.MAX_MP, this.p.mp + 8);

            this.updateUI();
            this.busy = false;
            this.save();
            this._scheduleAuto();
        }
        this.save();
    }

    showDamageFloat(dmg, special, isPlayer) {
        const el = document.createElement('div');
        el.className = 'dmg-float';
        el.textContent = (isPlayer ? '-' : '-') + dmg;
        el.style.color = isPlayer ? (special ? '#fa0' : '#ccc') : (special ? '#f66' : '#f44');
        const area = document.getElementById('enemy-area');
        const rect = area.getBoundingClientRect();
        const containerRect = document.getElementById('game-container').getBoundingClientRect();
        el.style.left = (rect.left - containerRect.left + 30 + Math.random() * 60) + 'px';
        el.style.top = (rect.top - containerRect.top + 20 + Math.random() * 20) + 'px';
        document.getElementById('game-container').appendChild(el);
        setTimeout(() => el.remove(), 900);
    }

    tryDrop() {
        const jn = this.enemy.jobRef.n;
        if (!this.p.coll[jn]) this.p.coll[jn] = [false, false, false, false];
        const rates = [0.15, 0.05, 0.015, 0.004]; // slightly raised
        for (let i = 0; i <= this.enemy.rankIdx; i++) {
            if (!this.p.coll[jn][i] && Math.random() < rates[i]) {
                this.p.coll[jn][i] = true;
                const rn = ["N", "R", "E", "L"][i];
                this.log(`<span style="color:#fa0;">魂収集：${jn} [${rn}]</span>`);
                break;
            }
        }
    }

    buildEquipItem(slot, job) {
        const slotSuffix = { head: "の頭", body: "の胴", arm: "の腕", leg: "の脚" };
        const item = { name: `${job.p}${job.n}${slotSuffix[slot]}` };
        const baseVal = 5 + job.id * 0.5;
        if (slot === 'head') item.def = Math.floor(baseVal * job.s.h);
        if (slot === 'body') item.hp = Math.floor(baseVal * 10 * job.s.h);
        if (slot === 'arm') { item.atk = Math.floor(baseVal * 2 * job.s.a); item.skillId = job.id; }
        if (slot === 'leg') item.spd = Math.floor(baseVal * job.s.a);
        return item;
    }

    async dropEquipWithModal() {
        const slots = ["head", "body", "arm", "leg"];
        const slot = slots[Math.floor(Math.random() * 4)];
        const newItem = this.buildEquipItem(slot, this.enemy.jobRef);
        const currentItem = this.p.eq[slot];

        // Show modal
        document.getElementById('modal-cur-name').textContent = currentItem.name;
        document.getElementById('modal-cur-eff').innerHTML = this.getEqStr(currentItem).replace(/ /g, '<br>');
        document.getElementById('modal-new-name').textContent = newItem.name;
        document.getElementById('modal-new-eff').innerHTML = this.getEqStr(newItem).replace(/ /g, '<br>');

        // Compute diff
        const keys = ['hp', 'atk', 'def', 'spd'];
        let diffHtml = '';
        keys.forEach(k => {
            const cur = currentItem[k] || 0;
            const nw = newItem[k] || 0;
            const diff = nw - cur;
            if (diff !== 0) {
                const cls = diff > 0 ? 'pos' : 'neg';
                const sign = diff > 0 ? '+' : '';
                diffHtml += `<span class="${cls}">${k.toUpperCase()} ${sign}${diff}</span>  `;
            }
        });
        if (newItem.skillId !== undefined) {
            const sk = this.jobMaster.find(j => j.id === newItem.skillId);
            diffHtml += `<span style="color:#6aacff;">技: ${sk?.sk}</span>`;
        }
        document.getElementById('modal-diff').innerHTML = diffHtml || '<span style="color:#444;">変化なし</span>';

        this._pendingEquip = { slot, item: newItem };
        document.getElementById('equip-modal').classList.add('show');

        return new Promise(resolve => { this._equipResolve = resolve; });
    }

    resolveEquip(doEquip) {
        document.getElementById('equip-modal').classList.remove('show');
        if (doEquip && this._pendingEquip) {
            this.p.eq[this._pendingEquip.slot] = this._pendingEquip.item;
            this.log(`<span style="color:#8f8;">装備した: ${this._pendingEquip.item.name}</span>`);
        } else {
            this.log(`装備を捨てた`);
        }
        this._pendingEquip = null;
        if (this._equipResolve) { this._equipResolve(); this._equipResolve = null; }
        this.updateUI();
    }

    nextArea() {
        const curIdx = this.areaMaster.findIndex(a => a.id === this.seed.id);
        const nextIdx = (curIdx + 1) % this.areaMaster.length;
        this.generateArea(nextIdx);
        this.floor++;
        const savedEq = this.p.eq;
        const savedColl = this.p.coll;
        this.resetStatus(false);
        this.p.eq = savedEq;
        this.p.coll = savedColl;
        this.p.hp = this.stats.hp;
        this.log(`<span style="color:#fa0; font-weight:bold;">── 領域踏破。魂は浄化され、「${this.seed.name}」へ ──</span>`);
    }

    gameOver() {
        this.log(`<span style="color:#555;">── 力尽きた ──</span>`);
        // HP/MPのみ回復。レベル・ステータス・装備はそのまま
        this.p.hp = this.stats.hp;
        this.p.mp = 0;
        this.spawn();
    }

    handleMainBtn() {
        if (this.state === "battle") this.battle('atk');
        else { this.floor++; this.spawn(); }
    }

    toggleAuto(on) {
        this.autoMode = on;
        if (on && !this.busy) {
            if (this.state === "win") { this.floor++; this.spawn(); }
            else this._scheduleAuto();
        } else {
            if (this.autoTimer) { clearTimeout(this.autoTimer); this.autoTimer = null; }
        }
        document.getElementById('battle-state-text').textContent = on ? "自動" : "";
    }

    _scheduleAuto() {
        if (!this.autoMode) return;
        if (this.autoTimer) clearTimeout(this.autoTimer);
        const delay = 600 + Math.max(0, 200 - this.stats.spd * 5);
        this.autoTimer = setTimeout(() => {
            if (!this.busy) this.battle('atk');
        }, delay);
    }

    switchTab(i) {
        document.querySelectorAll('.tab-btn').forEach((b, idx) => b.classList.toggle('active', i === idx));
        document.querySelectorAll('.tab-content').forEach((c, idx) => c.classList.toggle('active', i === idx));
    }

    log(m) {
        const l = document.getElementById('log');
        l.innerHTML = `<div class="log-entry">${m}</div>` + l.innerHTML;
        while (l.children.length > 60) l.removeChild(l.lastChild);
    }

    updateUI() {
        const s = this.stats;
        const areaIdx = this.areaMaster.findIndex(a => a.id === this.seed.id);

        document.getElementById('area-title').textContent = `${this.seed.name}  ${this.floor}層  Tier${this.seed.tier}`;
        document.getElementById('p-lv').textContent = `Lv.${this.p.lv}`;
        document.getElementById('p-hp-text').textContent = `HP ${this.p.hp} / ${s.hp}`;
        document.getElementById('p-kill-count').textContent = `討滅: ${this.kills || 0}`;
        document.getElementById('p-hp-bar').style.width = (Math.max(0, this.p.hp) / s.hp * 100) + '%';
        document.getElementById('p-mp-bar').style.width = (this.p.mp / this.MAX_MP * 100) + '%';
        document.getElementById('p-exp-bar').style.width = (this.p.exp / this.p.next * 100) + '%';

        document.getElementById('enemy-name').textContent = this.enemy.name;
        document.getElementById('enemy-hp-num').textContent = `HP: ${this.enemy.hp} / ${this.enemy.maxHp}`;
        document.getElementById('e-hp-bar').style.width = (Math.max(0, this.enemy.hp) / this.enemy.maxHp * 100) + '%';

        // Enemy intent
        const intent = this.enemy.nextAction;
        const intentEl = document.getElementById('enemy-intent');
        if (this.state === "battle") {
            intentEl.textContent = intent.id !== "atk" ? `▲ ${intent.label}` : "";
            intentEl.style.color = intent.id === "heavy" ? "#884444" : "#445566";
        } else {
            intentEl.textContent = "";
        }

        document.getElementById('btn-main').textContent = this.state === "battle" ? "こうげき" : "深層へ";

        const sk = this.jobMaster.find(j => j.id === this.p.eq?.arm?.skillId);
        const mpCost = sk ? sk.mpCost : 0;
        document.getElementById('btn-skill').textContent = sk ? `${sk.sk} (${mpCost}MP)` : "技なし";
        document.getElementById('btn-skill').disabled = !sk || this.state !== "battle" || this.p.mp < mpCost;

        // Stats
        document.getElementById('stat-list').innerHTML = [
            ['最大HP', s.hp], ['攻撃力', s.atk], ['防御力', s.def], ['俊敏性', s.spd],
            ['会心率', Math.floor(s.crit * 100) + '%'], ['会心倍率', s.critD.toFixed(1) + 'x'],
            ['回避率', Math.floor(s.eva * 100) + '%'], ['経験値倍率', s.exp.toFixed(2) + 'x'],
            ['吸収', s.drain + '%'], ['再生', s.regen]
        ].map(([l, v]) => `<div class="stat-item"><span class="stat-label">${l}</span><span class="stat-val">${v}</span></div>`).join('');
        document.getElementById('p-exp-full').textContent = `EXP ${this.p.exp} / ${this.p.next}  MP ${this.p.mp}/${this.MAX_MP}`;

        // Equip
        document.getElementById('equip-list').innerHTML = ["head", "body", "arm", "leg"].map(k => {
            const it = this.p.eq[k] || {};
            return `<div class="equip-slot">
                <div class="slot-header"><span>${{ head: '頭部', body: '胴体', arm: '腕部', leg: '脚部' }[k]}</span></div>
                <div class="equip-name">${it.name || '---'}</div>
                <div class="equip-eff">${this.getEqStr(it)}</div>
            </div>`;
        }).join('');

        // Collection
        const total = this.jobMaster.length * 4;
        let owned = 0;
        this.jobMaster.forEach(j => { const c = this.p.coll[j.n] || []; c.forEach(v => { if (v) owned++; }); });
        document.getElementById('coll-summary').textContent = `収集: ${owned} / ${total}`;

        document.getElementById('coll-list').innerHTML = this.jobMaster.map(j => {
            const ow = this.p.coll[j.n] || [false, false, false, false];
            const hasAny = ow.some(v => v);
            const isComp = ow.every(v => v);
            const rates = j.rates || [0.15, 0.05, 0.015, 0.004];
            return `<div class="coll-row">
                <div class="coll-name ${isComp ? 'comp' : hasAny ? 'has-any' : ''}" title="N:${(rates[0]*100).toFixed(0)}% R:${(rates[1]*100).toFixed(0)}% E:${(rates[2]*100).toFixed(1)}% L:${(rates[3]*100).toFixed(1)}%">${j.n}</div>
                <div class="coll-chips">
                    ${["n","r","e","l"].map((r,i) => `<div class="chip ${r} ${ow[i]?'active':''}">${r.toUpperCase()}</div>`).join('')}
                </div>
            </div>`;
        }).join('');
    }

    getEqStr(it) {
        if (!it) return '';
        const parts = [];
        if (it.hp) parts.push(`HP+${it.hp}`);
        if (it.atk) parts.push(`ATK+${it.atk}`);
        if (it.def) parts.push(`DEF+${it.def}`);
        if (it.spd) parts.push(`SPD+${it.spd}`);
        if (it.skillId !== undefined) {
            const sk = this.jobMaster.find(j => j.id === it.skillId);
            if (sk) parts.push(`[${sk.sk}]`);
        }
        return parts.join('  ') || '---';
    }
}

const game = new DeaRip();
</script>
