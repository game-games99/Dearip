function getET(f){for(var i=0;i<ET.length;i++){if(f>=ET[i].r[0]&&f<=ET[i].r[1])return ET[i];}return ET[ET.length-1];}
function buildEn(f,tp){
  tp=tp||'normal';
  var tier=getET(f);
  var pool=[];for(var i=0;i<tier.pool.length;i++){if(!tier.pool[i].rare)pool.push(tier.pool[i]);}
  var base=pool[rnd(0,pool.length-1)];
  var lv=rnd(Math.max(1,f-1),f+2);
  var bHP=Math.floor((90+f*45)*base.hm);
  var bAT=Math.floor((14+f*8.5)*base.am);
  var bDF=Math.floor((7+f*4)*base.dm);
  var bSP=Math.floor(48*base.sm);
  var hm=1,am=1,dm=1,isE=false,isB=false,isR=false;
  var nm=base.nm,em=base.em;
  if(tp==='rare'){
    var rp=[];for(var i=0;i<tier.pool.length;i++){if(tier.pool[i].rare)rp.push(tier.pool[i]);}
    if(rp.length){base=rp[rnd(0,rp.length-1)];nm=base.nm;em=base.em;hm=5;am=1.8;dm=2.5;lv=f+3;isR=true;}
  } else if(tp==='floor_elite'){
    // Normal monster with エリート suffix
    nm=base.nm+'エリート';hm=2.2;am=1.4;dm=1.2;lv=f+1;isE=true;
  } else if(tp==='elite'){
    var ep=EL[(f-1)%EL.length];nm=ep.nm;em=ep.em;hm=ep.hm;am=ep.am;dm=ep.dm;lv=f+2;isE=true;
  } else if(tp==='boss'){
    var bd=GB[f]||{nm:'深淵の支配者',em:'👑'};nm=bd.nm;em=bd.em;hm=6.5;am=2.2;dm=1.8;lv=f+5;isB=true;
  }
  var hp=Math.floor(bHP*hm);
  return{nm:nm,em:em,lv:lv,hp:hp,mhp:hp,atk:Math.floor(bAT*am),def:Math.floor(bDF*dm),spd:bSP,
    ch:0,dd:1,ad:1,psn:0,brn:0,
    exp:Math.floor((18+f*14)*base.xp*hm),gold:rnd(10+f*6,16+f*11),
    isE:isE,isB:isB,isR:isR};
}

function expN(lv){return Math.floor(22*Math.pow(lv,1.58));}
var G={
  gold:200,medals:5,cf:0,hf:1,fl:1,
  party:['gladius'],chars:{},eq:{},inv:[],
  dun:{active:false,auto:true,fast:false,dist:0,phase:'idle',
    enemy:null,pend:null,bp:[],
    pendingDrops:[],   // items earned this run - lost on wipe
    stampede:0,        // remaining stampede waves
    halfChecked:false, // half-floor checkpoint shown
    atk_buff:false,    // strength spring buff (until next action)
    def_buff:false     // guard spring buff
  }
};
for(var _i=0;_i<CD.length;_i++){
  var _d=CD[_i];
  G.chars[_d.id]={id:_d.id,nm:_d.nm,lv:1,exp:0,en:expN(1),ul:_d.ul===0,sk:_d.sk};
  G.eq[_d.id]={weapon:null,armor:null,ring:null};
}
function cdef(id){for(var i=0;i<CD.length;i++){if(CD[i].id===id)return CD[i];}return null;}
function cst(id){
  var d=cdef(id);var c=G.chars[id];
  if(!d||!c)return{at:0,df:0,hp:1,dex:50};
  var at=Math.floor(d.b.at+d.gr.at*(c.lv-1));
  var df=Math.floor(d.b.df+d.gr.df*(c.lv-1));
  var hp=Math.floor(d.b.hp+d.gr.hp*(c.lv-1));
  var eq=G.eq[id]||{};
  var sl=['weapon','armor','ring'];
  for(var j=0;j<sl.length;j++){
    var it=eq[sl[j]];if(!it)continue;
    var iD=gid(it.id2);if(!iD)continue;
    if(iD.stats.atk)at+=cs(iD.stats.atk,it.plus,it.q);
    if(iD.stats.def)df+=cs(iD.stats.def,it.plus,it.q);
    if(iD.stats.hp)hp+=cs(iD.stats.hp,it.plus,it.q);
  }
  return{at:at,df:df,hp:hp,dex:Math.floor(d.b.dex+d.gr.dex*(c.lv-1))};
}

// ── SAVE/LOAD ─────────────────────────────────────────
function save(){
  try{
    var s={gold:G.gold,medals:G.medals,cf:G.cf,hf:G.hf,fl:G.fl,
      party:G.party,inv:G.inv,eq:G.eq,chars:{}};
    for(var id in G.chars){var c=G.chars[id];s.chars[id]={lv:c.lv,exp:c.exp,en:c.en,ul:c.ul};}
    localStorage.setItem('dt6',JSON.stringify(s));
  }catch(e){}
}
function load(){
  try{
    var raw=localStorage.getItem('dt6');if(!raw)return;
    var s=JSON.parse(raw);
    G.gold=s.gold||200;G.medals=s.medals||5;G.cf=s.cf||0;G.hf=s.hf||1;G.fl=s.fl||1;
    var vi={};for(var i=0;i<CD.length;i++)vi[CD[i].id]=true;
    G.party=(s.party||['gladius']).filter(function(id){return !!vi[id];});
    if(!G.party.length)G.party=['gladius'];
    G.inv=s.inv||[];
    var se=s.eq||{};for(var id in se){if(G.eq[id])G.eq[id]=se[id];}
    var sc=s.chars||{};
    for(var id in sc){
      if(!G.chars[id])continue;
      G.chars[id].lv=sc[id].lv||1;G.chars[id].exp=sc[id].exp||0;
      G.chars[id].en=sc[id].en||expN(sc[id].lv||1);G.chars[id].ul=!!sc[id].ul;
    }
  }catch(e){}
}

// ── DISCARD ──────────────────────────────────────────
function discardItem(idx){
  if(idx<0||idx>=G.inv.length)return;
  var iD=gid(G.inv[idx].id2);
  G.inv.splice(idx,1);
  log('sy',(iD?iD.name:'アイテム')+'を捨てた');
  renderInv();save();
}

// ── CHESTS/DROPS ──────────────────────────────────────
function rollC(et){
  var t={normal:[['iron',42],['copper',14],[null,44]],
    elite:[['silver',52],['gold',24],['iron',24]],
    boss:[['gold',44],['silver',30],['dia',9],['anc',5],['iron',12]],
    rare:[['dia',35],['anc',20],['gold',45]]};
  var tbl=t[et]||t.normal;var tot=0;for(var i=0;i<tbl.length;i++)tot+=tbl[i][1];
  var r=Math.random()*tot;for(var i=0;i<tbl.length;i++){r-=tbl[i][1];if(r<=0)return tbl[i][0];}return null;
}
function dropC(ct,f){
  if(!ct)return;var cd=CH[ct];
  var plus=rnd(cd.pr[0],cd.pr[1]);var q=rnd(1,100);
  var pool=cd.u?UQ:IT[Math.min(3,tier(f))];
  var iD=pool[rnd(0,pool.length-1)];
  G.dun.pendingDrops.push({id2:iD.id,q:q,plus:plus});
  updDropBadge();
  var qi2=qi(q);
  log(cd.lc,cd.em+' '+cd.name+' => '+iD.name+' ['+qi2.n+' '+q+'%] +'+plus+'  '+ss(iD,plus,q));
}

// ── DROP BADGE ────────────────────────────────────────
function updDropBadge(){
  var n=G.dun.pendingDrops.length;
  var db=g('dropbadge');var dc=g('dropct');
  if(!db)return;
  if(n>0){db.classList.remove('hidden');if(dc)dc.textContent=n;}
  else db.classList.add('hidden');
}

// ── RETURN TO BASE ─────────────────────────────────────
function returnToBase(){
  // Commit pending drops to inventory
  for(var i=0;i<G.dun.pendingDrops.length;i++)G.inv.push(G.dun.pendingDrops[i]);
  G.dun.pendingDrops=[];
  updDropBadge();
  stopD('拠点に戻った。装備を確認しよう!');
  var vv=g('vi');if(vv&&vv.classList.contains('active'))renderInv();
  save();
}

// ── DUNGEON ───────────────────────────────────────────
var gT=null,eT=null,ptk=0;
function initBP(fh){
  var nb=[];
  for(var i=0;i<G.party.length;i++){
    var id=G.party[i];var d=cdef(id);if(!d)continue;
    var st=cst(id);var c=G.chars[id];
    var old=null;for(var j=0;j<G.dun.bp.length;j++){if(G.dun.bp[j].id===id){old=G.dun.bp[j];break;}}
    var hp=fh?st.hp:(old?Math.min(old.hp,st.hp):st.hp);
    nb.push({id:id,nm:c.nm,em:d.em,lv:c.lv,hp:hp,mhp:st.hp,at:st.at,df:st.df,
      dex:d.b.dex+d.gr.dex*(c.lv-1),ch:Math.random()*30,sk:c.sk,cd:0,row:i<3?'f':'b'});
  }
  G.dun.bp=nb;
}
function toggleD(){
  if(G.dun.active){stopD('撤退した。');return;}
  if(!G.party.length){log('sy','パーティを編成してください');return;}
  G.dun.active=true;G.dun.dist=0;G.dun.phase='exploring';G.dun.fast=false;
  G.dun.pendingDrops=[];G.dun.halfChecked=false;G.dun.stampede=0;
  G.dun.atk_buff=false;G.dun.def_buff=false;
  updDropBadge();
  initBP(true);
  gT=setInterval(gTick,100);eT=setInterval(eTick,200);
  log('sy',G.fl+'F 探索開始!');
  updFloor();updH();renderPC();
  var sb=g('sbtn');if(sb){sb.textContent='停止';sb.className='sbtn act';}
  var it=g('idletxt');if(it)it.textContent='探索中...';
}
function stopD(msg){
  clearInterval(gT);clearInterval(eT);gT=null;eT=null;
  G.dun.active=false;G.dun.phase='idle';G.dun.enemy=null;G.dun.pend=null;
  var eo=g('encovl');if(eo)eo.classList.add('hidden');
  if(msg)log('sy',msg);
  var sb=g('sbtn');if(sb){sb.textContent='▶ 出発';sb.className='sbtn';}
  renderB();renderPC();save();
}
function eTick(){
  if(G.dun.phase!=='exploring')return;
  var cfg=fcfg(G.fl);G.dun.dist++;updFloor();
  // Half-floor checkpoint
  var half=Math.floor(cfg.dist/2);
  if(!G.dun.halfChecked&&G.dun.dist>=half&&G.dun.dist<cfg.dist){
    G.dun.halfChecked=true;
    clearInterval(eT);eT=null;
    showCP(
      '📍 折り返し地点',
      '探索の半分に到達。拠点に戻って装備を受け取るか？',
      [{lbl:'拠点に戻る',fn:function(){
        var o=g('cpovl');if(o)o.classList.add('hidden');
        returnToBase();
      }},{lbl:'このまま進む',fn:function(){
        var o=g('cpovl');if(o)o.classList.add('hidden');
        G.dun.phase='exploring';
        eT=setInterval(eTick,200);
      }}]
    );
    return;
  }
  // Normal encounter trigger
  if(G.dun.dist<cfg.dist&&G.dun.dist%cfg.enc===0){
    // Stampede mode: high-elite encounters
    if(G.dun.stampede>0){
      G.dun.stampede--;
      if(G.dun.stampede===0){var sb=g('stampbadge');if(sb)sb.classList.add('hidden');}
      var tp=Math.random()<.7?'floor_elite':'normal';
      trigEnc(tp);return;
    }
    // Random event check (~12% chance at each encounter step)
    if(Math.random()<.12){trigEvent();return;}
    // Determine encounter type
    var tr=getET(G.fl);var hr=false;
    for(var i=0;i<tr.pool.length;i++){if(tr.pool[i].rare){hr=true;break;}}
    var roll=Math.random();
    var tp2=hr&&roll<.03?'rare':roll<.12?'floor_elite':'normal';
    trigEnc(tp2);return;
  }
  if(G.dun.dist>=cfg.dist){
    G.dun.dist=cfg.dist;updFloor();
    log('sy',cfg.boss?'大ボス出現!':'エリート出現!');
    trigEnc(cfg.boss?'boss':'elite');
  }
}
function trigEnc(tp){
  var e=buildEn(G.fl,tp);
  if(G.dun.auto){startB(e);}
  else{
    G.dun.pend=e;G.dun.phase='pend';
    var et=g('enctx');if(et)et.textContent=e.isB?'大ボス出現!':e.isE?'エリート出現!':e.isR?'レア!':'敵が現れた!';
    var ed=g('encdsc');if(ed)ed.textContent=e.nm+' Lv.'+e.lv;
    var eo=g('encovl');if(eo)eo.classList.remove('hidden');
  }
}
function startB(e){
  G.dun.phase='battle';G.dun.enemy=e;
  var an=g('ann');if(an)an.textContent='LV'+e.lv+' '+e.nm+'が現れた!';
  log('dm',(e.isB?'[BOSS] ':e.isE?'[ELITE] ':e.isR?'[RARE] ':'')+e.em+' '+e.nm+' Lv.'+e.lv);
  renderB();
}
function gTick(){
  if(G.dun.phase!=='battle')return;
  var en=G.dun.enemy;if(!en)return;
  var aa=[];for(var i=0;i<G.dun.bp.length;i++){if(G.dun.bp[i].hp>0)aa.push(G.dun.bp[i]);}
  if(!aa.length){onWipe();return;}
  if(en.hp<=0){onKill();return;}
  var spMul=G.dun.fast?2:1;
  for(var i=0;i<aa.length;i++)aa[i].ch+=aa[i].dex/9*spMul;
  en.ch+=en.spd/9*spMul;
  var acts=[];for(var i=0;i<aa.length;i++){if(aa[i].ch>=100)acts.push(aa[i]);}
  if(en.ch>=100)acts.push(en);
  acts.sort(function(a,b){return b.ch-a.ch;});
  for(var ai=0;ai<acts.length;ai++){
    if(en.hp<=0)break;
    var allD=true;for(var i=0;i<aa.length;i++){if(aa[i].hp>0){allD=false;break;}}
    if(allD)break;
    var ac=acts[ai];ac.ch-=100;
    if(ac===en){
      var fr=[];for(var i=0;i<aa.length;i++){if(aa[i].row==='f'&&aa[i].hp>0)fr.push(aa[i]);}
      var tg=fr.length>0?fr[rnd(0,fr.length-1)]:aa[rnd(0,aa.length-1)];
      var ea=Math.floor(en.atk*(en.ad||1));
      var d=Math.max(1,Math.floor((ea-tg.df*.28)*(0.85+Math.random()*.3)));
      tg.hp=Math.max(0,tg.hp-d);
      log('dm',en.em+en.nm+'->'+tg.nm+': '+d);
      if(tg.hp<=0)log('dt',tg.nm+' 倒れた...');
    } else {
      if(en.hp<=0)continue;
      var am=ac.row==='b'?.9:1;var res=null;
      // Apply and clear buffs on first action this battle
      var atkBonus=1,defBonus=1;
      if(G.dun.atk_buff){atkBonus=1.2;G.dun.atk_buff=false;}
      if(G.dun.def_buff){defBonus=1.2;G.dun.def_buff=false;}
      // Skill cooldown: decrement on each action
      if(ac.cd>0)ac.cd--;
      // Try skill only if cd==0
      if(ac.cd===0&&Math.random()<ac.sk.rt){
        try{res=ac.sk.ex(ac,en,G.dun.bp);}catch(er){res=null;}
        if(res)ac.cd=ac.sk.ct||3;
      }
      if(!res){
        var effDef=Math.floor(en.def*(en.dd||1)/defBonus);
        var baseDmg=Math.max(1,Math.floor((ac.at*am*atkBonus-effDef*.28)*(0.85+Math.random()*.3)));
        var critRate=Math.min(0.5,ac.dex/500);
        var isCrit=Math.random()<critRate;
        var dm=isCrit?Math.floor(baseDmg*1.5):baseDmg;
        en.hp=Math.max(0,en.hp-dm);
        log('dm',ac.em+'->'+en.nm+': '+dm+(isCrit?' [会心]':'')+(ac.row==='b'?' [後]':''));
      } else log(res.tp==='hl'?'hl':'sk',res.tx);
    }
  }
  ptk++;
  if(ptk%12===0){
    if(en.psn>0){var pd=Math.floor(en.mhp*.05);en.hp=Math.max(0,en.hp-pd);en.psn--;log('sk','毒! -'+pd+'(残'+en.psn+'T)');}
    if(en.brn>0){var bd2=Math.floor(en.mhp*.04);en.hp=Math.max(0,en.hp-bd2);en.brn--;log('sk','燃焼! -'+bd2+'(残'+en.brn+'T)');}
  }
  renderB();renderPC();
}
function onKill(){
  var en=G.dun.enemy;G.dun.enemy=null;G.dun.phase='exploring';
  var et=en.isB?'boss':en.isR?'rare':en.isE?'elite':'normal';
  log('lv',en.nm+' 倒した! EXP+'+en.exp+' G+'+en.gold);
  G.gold+=en.gold;
  for(var i=0;i<G.party.length;i++)gainE(G.party[i],en.exp);
  dropC(rollC(et),G.fl);
  if(Math.random()<.12){G.medals++;log('sy','勲章獲得!(計'+G.medals+'枚)');}
  var cfg=fcfg(G.fl);
  if((en.isE||en.isB)&&G.dun.dist>=cfg.dist){onFC();return;}
  var an=g('ann');if(an)an.textContent='探索中...';
  updH();renderB();renderPC();save();
}
function onFC(){
  var f=G.fl;if(f>G.cf)G.cf=f;
  var cfg=fcfg(f);var bm=cfg.boss?5:2;G.medals+=bm;
  log('lv',f+'F クリア! 勲章x'+bm);
  for(var i=0;i<CD.length;i++){
    var d=CD[i];
    if(d.ul>0&&d.ul<=f&&!G.chars[d.id].ul){
      G.chars[d.id].ul=true;log('lv',d.fn+' が仲間に加わった!');}
  }
  var nf=f+1;if(nf>G.hf)G.hf=nf;
  updH();save();
  clearInterval(gT);clearInterval(eT);gT=null;eT=null;
  // Show floor-clear checkpoint
  showCP(
    f+'F 制覇!',
    '拠点に戻って装備を整えるか、そのまま進むか？(HP+40%回復)',
    [
      {lbl:'拠点に戻る',fn:function(){
        var o=g('cpovl');if(o)o.classList.add('hidden');
        returnToBase();
      }},
      {lbl:(nf)+'Fへ進む',fn:function(){
        var o=g('cpovl');if(o)o.classList.add('hidden');
        G.fl=nf;G.dun.dist=0;G.dun.phase='exploring';G.dun.halfChecked=false;
        for(var i=0;i<G.dun.bp.length;i++){var b=G.dun.bp[i];b.hp=Math.min(b.mhp,b.hp+Math.floor(b.mhp*.4));}
        log('sy',nf+'F へ! HP+40%回復');
        gT=setInterval(gTick,100);eT=setInterval(eTick,200);
        updFloor();renderB();renderPC();
        var vc=g('vc');if(vc&&vc.classList.contains('active'))renderChars();
      }}
    ]
  );
}
function onWipe(){
  var lost=G.dun.pendingDrops.length;
  G.dun.pendingDrops=[];updDropBadge();
  log('dt','全滅! 装備'+(lost?lost+'個ロスト':'')+'...');
  G.fl=Math.max(1,G.fl-1);stopD(null);updFloor();
}
function gainE(id,exp){
  var c=G.chars[id];if(!c)return;c.exp+=exp;
  while(c.exp>=c.en){
    c.exp-=c.en;c.lv++;c.en=expN(c.lv);
    var b=null;for(var i=0;i<G.dun.bp.length;i++){if(G.dun.bp[i].id===id){b=G.dun.bp[i];break;}}
    if(b){var st=cst(id);var pv=b.mhp;b.mhp=st.hp;b.hp=Math.min(b.mhp,b.hp+(b.mhp-pv));b.at=st.at;b.df=st.df;}
    log('lv',c.nm+' Lv.'+c.lv+'!');
    var vc=g('vc');if(vc&&vc.classList.contains('active'))renderChars();
  }
}

// ── FLOOR EVENTS ──────────────────────────────────────
function trigEvent(){
  clearInterval(eT);eT=null;
  var roll=Math.random();
  if(roll<0.25){
    // Magic Trap
    var trapDex=G.dun.bp.reduce(function(mx,b){return b.hp>0&&b.dex>mx?b.dex:mx;},0);
    var defuseRate=Math.min(0.9,trapDex/600);
    var defused=Math.random()<defuseRate;
    showEvt('💥 魔法トラップ!',
      defused?'罠の解除に成功した！ダメージなし':'罠を解除できず、パーティにダメージ！',
      [{lbl:'確認',fn:function(){
        if(!defused){
          for(var i=0;i<G.dun.bp.length;i++){
            var b=G.dun.bp[i];if(b.hp<=0)continue;
            var d=Math.floor(b.mhp*(0.1+Math.random()*.1));
            b.hp=Math.max(1,b.hp-d);
          }
          renderPC();
        }
        closeEvt();eT=setInterval(eTick,200);
      }}]
    );
  } else if(roll<0.45){
    // HP Spring
    showEvt('💧 回復の泉',
      'パーティのHPが全回復した！',
      [{lbl:'入る',fn:function(){
        for(var i=0;i<G.dun.bp.length;i++){var b=G.dun.bp[i];b.hp=b.mhp;}
        renderPC();closeEvt();eT=setInterval(eTick,200);
        log('hl','回復の泉！全員HP全回復！');
      }},{lbl:'無視',fn:function(){closeEvt();eT=setInterval(eTick,200);}}]
    );
  } else if(roll<0.65){
    // Attack Spring
    showEvt('🔥 力の泉',
      '次の戦闘で一度行動するまで攻撃力+20%！',
      [{lbl:'入る',fn:function(){
        G.dun.atk_buff=true;closeEvt();eT=setInterval(eTick,200);
        log('sk','力の泉！次の戦闘で攻撃力UP！');
      }},{lbl:'無視',fn:function(){closeEvt();eT=setInterval(eTick,200);}}]
    );
  } else if(roll<0.82){
    // Defense Spring
    showEvt('🛡 守りの泉',
      '次の戦闘で一度行動するまで防御力+20%！',
      [{lbl:'入る',fn:function(){
        G.dun.def_buff=true;closeEvt();eT=setInterval(eTick,200);
        log('sk','守りの泉！次の戦闘で防御UP！');
      }},{lbl:'無視',fn:function(){closeEvt();eT=setInterval(eTick,200);}}]
    );
  } else {
    // Stampede!
    var waves=rnd(3,5);G.dun.stampede=waves;
    var sb=g('stampbadge');if(sb)sb.classList.remove('hidden');
    showEvt('⚡ スタンピード!',
      waves+'連戦が発生した！エリートモンスターが大量出現！',
      [{lbl:'迎え撃つ',fn:function(){
        closeEvt();eT=setInterval(eTick,200);
        log('dt','スタンピード！'+waves+'連戦！');
      }}]
    );
  }
}

function makePCard(id,row){
  var d=cdef(id);var c=G.chars[id];if(!d||!c)return mk('div','pc');

  var hc=pct<25?'cr':pct<50?'lo':'';

  var card=mk('div','pc'+(dead?' dead':'')+(row==='b'?' bk':''));

  card.appendChild(qb);

function toggleP(id){
  var idx=G.party.indexOf(id);
  var fc=G.party.slice(0,3).length;var bc=G.party.slice(3,6).length;
  if(idx===-1){
    if(fc<3)G.party.splice(fc,0,id);
    else if(bc<3)G.party.push(id);
    else{log('sy','前衛・後衛ともに満員');return;}
  } else if(idx<3){
    G.party.splice(idx,1);
    if(bc<3){G.party.push(id);log('sy',G.chars[id].nm+' を後衛に');}
    else log('sy',G.chars[id].nm+' を除外');
  } else {G.party.splice(idx,1);log('sy',G.chars[id].nm+' を除外');}
  if(G.dun.active)initBP(false);
  renderChars();renderPC();save();
}
function renderInv(){
  var list=g('ilist');if(!list)return;list.innerHTML='';
  // Pending drops (in dungeon - not yet received)
  if(G.dun.pendingDrops&&G.dun.pendingDrops.length){
    var pHdr=mk('div','st2','⏳ 未回収 (拠点に戻ると獲得)');list.appendChild(pHdr);
    for(var pi=0;pi<G.dun.pendingDrops.length;pi++){
      var pit=G.dun.pendingDrops[pi];var piD=gid(pit.id2);if(!piD)continue;
      var qi3=qi(pit.q);
      var pr=mk('div','ii');pr.style.opacity='.6';
      pr.appendChild(mk('div','iic',piD.em));
      var pd=mk('div','iid');
      pd.appendChild(mk('div','iinm',piD.name));
      var pSub=mk('div','iisub');
      pSub.appendChild(mk('span','rar-'+(piD.rar||'N'),rarName(piD.rar||'N')));
      pSub.appendChild(mk('span',qi3.c,' '+qi3.n+' '+pit.q+'%'));
      pd.appendChild(pSub);
      pr.appendChild(pd);
      if(pit.plus)pr.appendChild(mk('div','iipl','+'+pit.plus));
      list.appendChild(pr);
    }
    var sep=mk('div',null);sep.style.cssText='height:1px;background:var(--brd);margin:8px 0';
    list.appendChild(sep);
  }
  if(!G.inv.length&&!(G.dun.pendingDrops&&G.dun.pendingDrops.length)){list.appendChild(mk('div','em2','装備品なし'));return;}
  if(!G.inv.length)return;
  var eq2=[];
  for(var i=0;i<G.inv.length;i++){var it=G.inv[i];var d=gid(it.id2);if(d)eq2.push({it:it,d:d,i:i});}
  eq2.sort(function(a,b){var o={weapon:0,armor:1,ring:2};return (o[a.d.t]||0)-(o[b.d.t]||0);});
  list.appendChild(mk('div','st2','装備品'));
  for(var i=0;i<eq2.length;i++){
    var e=eq2[i];var qi2=qi(e.it.q);
    var tJ=e.d.t==='weapon'?'武器':e.d.t==='armor'?'防具':'指輪';
    var row=mk('div','ii');
    row.appendChild(mk('div','iic',e.d.em));
    var det=mk('div','iid');
    det.appendChild(mk('div','iinm',e.d.name));
    var subDiv=mk('div','iisub');
    var rarSpan2=mk('span','rar-'+(e.d.rar||'N'),rarName(e.d.rar||'N'));subDiv.appendChild(rarSpan2);
    subDiv.appendChild(mk('span',null,' '));
    var qSpan=mk('span',qi2.c,qi2.n+' '+e.it.q+'%  '+tJ);subDiv.appendChild(qSpan);
    det.appendChild(subDiv);
    det.appendChild(mk('div','iistat',ss(e.d,e.it.plus,e.it.q)));
    row.appendChild(det);
    row.appendChild(mk('div','iipl'+(!e.it.plus?' hidden':''),'+'+e.it.plus));
    (function(it2,oi){
      row.addEventListener('click',function(ev){
        if(ev.target.classList.contains('inv-discard'))return;
        openEQ(it2,oi);
      });
      var db=mk('button','inv-discard','捨');
      db.addEventListener('click',function(ev){ev.stopPropagation();discardItem(oi);});
      row.appendChild(db);
    })(e.it,e.i);
    list.appendChild(row);
  }
  // Bulk discard: discard all items not equipped
  if(G.inv.length>1){
    var bulk=mk('button','bulk-discard','一括破棄（全'+G.inv.length+'個）');
    bulk.addEventListener('click',function(){
      if(confirm&&confirm('全'+G.inv.length+'個を破棄しますか？')){}
      G.inv=[];renderInv();save();log('sy','全装備品を破棄した');
    });
    list.insertBefore(bulk,list.firstChild);
  }
}

var _eqIt=null,_eqIdx=-1;
function statDiff(newD,newPlus,newQ,curIt){
  var ns={};if(newD.stats.atk)ns.atk=cs(newD.stats.atk,newPlus,newQ);
  if(newD.stats.def)ns.def=cs(newD.stats.def,newPlus,newQ);
  if(newD.stats.hp)ns.hp=cs(newD.stats.hp,newPlus,newQ);
  var os={};
  if(curIt){var cD=gid(curIt.id2);if(cD){if(cD.stats.atk)os.atk=cs(cD.stats.atk,curIt.plus,curIt.q);if(cD.stats.def)os.def=cs(cD.stats.def,curIt.plus,curIt.q);if(cD.stats.hp)os.hp=cs(cD.stats.hp,curIt.plus,curIt.q);}}
  var keys=['atk','def','hp'];var lines=[];
  for(var i=0;i<keys.length;i++){
    var k=keys[i];var nv=ns[k]||0;var ov=os[k]||0;
    if(!nv&&!ov)continue;
    var diff=nv-ov;var cls=diff>0?'cmp-up':diff<0?'cmp-dn':'';
    var dstr=diff>0?'(+'+diff+')':diff<0?'('+diff+')':'';
    lines.push({k:k.toUpperCase(),nv:nv,ov:ov,cls:cls,dstr:dstr});
  }
  return lines;
}
function openEQ(it,idx){
  _eqIt=it;_eqIdx=idx;var iD=gid(it.id2);if(!iD)return;
  var qi2=qi(it.q);
  var t=g('etitle');if(t)t.textContent=iD.name+' を装備';
  var ed=g('edesc');if(ed){
    ed.textContent='';
    var rarSpan=mk('span','rar-'+(iD.rar||'N'),rarName(iD.rar||'N'));ed.appendChild(rarSpan);
    var inf=mk('span',null,'  '+qi2.n+' '+it.q+'%'+(it.plus?' +'+it.plus:''));ed.appendChild(inf);
  }
  var cl=g('echars');if(!cl)return;cl.innerHTML='';
  for(var ci=0;ci<CD.length;ci++){
    var d=CD[ci];if(!G.chars[d.id].ul)continue;
    var eq=G.eq[d.id]||{};var cur=eq[iD.t];
    var row=mk('div','dr');row.style.flexDirection='column';row.style.cursor='default';
    // Header row
    var hdr=mk('div',null);hdr.style.cssText='display:flex;align-items:center;gap:6px;margin-bottom:5px';
    hdr.appendChild(mk('span',null,d.em));hdr.appendChild(mk('span','drnm',d.nm));
    row.appendChild(hdr);
    // Comparison
    var cmp=mk('div','cmp-wrap');
    // Current
    var curBox=mk('div','cmp-box');curBox.appendChild(mk('div','cmp-title','現在'));
    if(cur){var cD=gid(cur.id2);curBox.appendChild(mk('div','cmp-nm',(cD?cD.name:'?')+(cur.plus?' +'+cur.plus:'')));}
    else curBox.appendChild(mk('div','cmp-nm','なし'));
    // New
    var newBox=mk('div','cmp-box');newBox.style.border='1px solid var(--tel)';
    newBox.appendChild(mk('div','cmp-title','新しい'));
    newBox.appendChild(mk('div','cmp-nm',iD.name+(it.plus?' +'+it.plus:'')));
    // Stats
    var diffs=statDiff(iD,it.plus,it.q,cur);
    var curSt=mk('div','cmp-stat');var newSt=mk('div','cmp-stat');
    for(var di2=0;di2<diffs.length;di2++){
      var df=diffs[di2];
      curSt.appendChild(mk('div',null,df.k+': '+(df.ov||'—')));
      var nline=mk('div',df.cls,df.k+': '+df.nv+(df.dstr?' '+df.dstr:''));
      newSt.appendChild(nline);
    }
    curBox.appendChild(curSt);newBox.appendChild(newSt);
    cmp.appendChild(curBox);cmp.appendChild(newBox);
    row.appendChild(cmp);
    // Equip button
    var ebtn=mk('button','btn btn-r','この騎士に装備');ebtn.style.cssText='width:100%;padding:6px;cursor:pointer';
    (function(cid,sl,itm){ebtn.addEventListener('click',function(){doEQ(cid,sl,itm);});})(d.id,iD.t,it);
    row.appendChild(ebtn);
    cl.appendChild(row);
    // Divider
    var sep=mk('div',null);sep.style.cssText='height:1px;background:var(--brd);margin:6px 0';
    cl.appendChild(sep);
  }
  // Discard button
  var del=mk('button','bulk-discard','このアイテムを捨てる');
  del.addEventListener('click',function(){if(_eqIdx>=0)G.inv.splice(_eqIdx,1);var ov=g('eovl');if(ov)ov.classList.add('hidden');renderInv();save();});
  cl.appendChild(del);
  var ov=g('eovl');if(ov)ov.classList.remove('hidden');
}
function doEQ(cid,sl,it){
  var eq=G.eq[cid]||{};
  if(eq[sl])G.inv.push(eq[sl]);
  eq[sl]={id2:it.id2,q:it.q,plus:it.plus};
  G.eq[cid]=eq;
  if(_eqIdx>=0)G.inv.splice(_eqIdx,1);
  if(G.dun.active){
    var bp=null;for(var i=0;i<G.dun.bp.length;i++){if(G.dun.bp[i].id===cid){bp=G.dun.bp[i];break;}}
    if(bp){var st=cst(cid);var pv=bp.mhp;bp.mhp=st.hp;bp.hp=Math.min(bp.mhp,bp.hp+Math.max(0,bp.mhp-pv));bp.at=st.at;bp.df=st.df;}
  }
  var iD=gid(it.id2);log('sy',G.chars[cid].nm+' が '+(iD?iD.name:'?')+' を装備!');
  var ov=g('eovl');if(ov)ov.classList.add('hidden');
  renderInv();renderChars();renderPC();save();
}

// ── VIEW SWITCH ───────────────────────────────────────
function sv(v){
  var vs=['vb','vc','vi'];var ns=['nvb','nvc','nvi'];
  for(var i=0;i<vs.length;i++){
    var ve=g(vs[i]);var ne=g(ns[i]);
    if(vs[i]===v){if(ve)ve.classList.add('active');if(ne)ne.classList.add('active');}
    else{if(ve)ve.classList.remove('active');if(ne)ne.classList.remove('active');}
  }
  if(v==='vc')renderChars();
  if(v==='vi')renderInv();
}

// ── BIND ─────────────────────────────────────────────
on('nvb',function(){sv('vb');});
on('nvc',function(){sv('vc');});
on('nvi',function(){sv('vi');});
on('sbtn',toggleD);

on('tm',function(){G.dun.auto=false;var a=g('ta'),m=g('tm');if(m)m.className='tog on';if(a)a.className='tog';});
on('spdbtn',function(){
  G.dun.fast=!G.dun.fast;
  var b=g('spdbtn');if(b){b.textContent=G.dun.fast?'2x':'1x';b.className=G.dun.fast?'tog on':'tog';}
});
on('mcancel',function(){var o=g('movl');if(o)o.classList.add('hidden');});
on('scancel',function(){var o=g('sovl');if(o)o.classList.add('hidden');});
on('mchip',openMedal);
on('ecancel',function(){var o=g('eovl');if(o)o.classList.add('hidden');});
on('bfight',function(){var e=G.dun.pend;G.dun.pend=null;var o=g('encovl');if(o)o.classList.add('hidden');if(e)startB(e);});
on('bflee',function(){G.dun.pend=null;var o=g('encovl');if(o)o.classList.add('hidden');G.dun.phase='exploring';log('sy','逃げた!');updFloor();});

// ── INIT ─────────────────────────────────────────────
load();updH();updFloor();renderPC();renderB();
log('sy','深淵の塔へようこそ。');
log('sy',G.fl+'F / 最高 '+G.hf+'F');
setInterval(save,30000);
setInterval(updH,3000);

})();
