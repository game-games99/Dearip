<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>BABEL</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09080f;--bg2:#111020;--bg3:#181628;
  --brd:#221e38;--brd2:#342e55;
  --gold:#c9a227;--gdim:#7a6018;
  --txt:#d0c8de;--tdim:#5e5672;
  --red:#b03030;--grn:#307040;--tel:#287080;
}
html,body{width:100%;height:100%;background:var(--bg);color:var(--txt);
  font-size:15px;overflow:hidden;-webkit-tap-highlight-color:transparent;
  font-family:Georgia,serif}
#app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto}
main{flex:1;overflow:hidden;position:relative;min-height:0}
.view{display:none;height:100%;flex-direction:column}
.view.active{display:flex}
#vc.active,#vi.active{overflow-y:auto;padding:8px}
nav{background:#0a0916;border-top:1px solid var(--brd2);display:flex;flex-shrink:0;height:48px}
.nb{flex:1;background:none;border:none;color:var(--tdim);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;cursor:pointer;font-size:9px;letter-spacing:.05em;transition:color .18s}
.nb.active{color:var(--gold)}
/* BATTLE */
#vb{overflow:hidden}
.bt-top{display:flex;align-items:center;gap:8px;padding:5px 8px 0;flex-shrink:0;height:52px}
.fl-badge{background:linear-gradient(160deg,#1a2840,#0e1828);
  border:2px solid var(--tel);border-radius:50%;width:46px;height:46px;flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1}
.fl-f{font-size:7px;color:var(--tel);letter-spacing:.1em}
.fl-num{font-size:20px;color:var(--txt);font-weight:bold;line-height:1}
.bt-info{flex:1;display:flex;flex-direction:column;justify-content:center;gap:3px}
.ann{font-size:11px;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  background:rgba(30,25,50,.7);border:1px solid var(--brd2);border-radius:3px;padding:3px 8px}
.dw{background:#080612;border:1px solid var(--brd);height:10px;
  border-radius:2px;overflow:hidden;position:relative}
.db{background:linear-gradient(90deg,#1a4060,#2a6898);height:100%;transition:width .5s}
.dl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:7px;color:var(--tdim);letter-spacing:.06em}
.hg{font-size:12px;color:var(--gold);flex-shrink:0}
/* STAGE */
.stage{flex:1;min-height:0;position:relative;overflow:hidden;
  background:linear-gradient(180deg,#0c0a18,#080612)}
.stage::before{content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(90deg,rgba(0,0,0,.55) 0%,transparent 20%),
             linear-gradient(270deg,rgba(0,0,0,.55) 0%,transparent 20%)}
.stage::after{content:'';position:absolute;bottom:0;left:0;right:0;height:25%;
  background:repeating-linear-gradient(0deg,transparent,transparent 18px,rgba(30,25,50,.35) 18px,rgba(30,25,50,.35) 19px)}
.tgl{position:absolute;top:10%;left:0;width:50px;height:150px;
  background:radial-gradient(ellipse at 0% 50%,rgba(255,130,30,.16),transparent 70%)}
.tgr{position:absolute;top:10%;right:0;width:50px;height:150px;
  background:radial-gradient(ellipse at 100% 50%,rgba(255,130,30,.16),transparent 70%)}
.stage-top{position:absolute;top:6px;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:5px;z-index:5;width:calc(100% - 60px)}
.mchip{background:rgba(10,8,20,.85);border:1px solid var(--gdim);border-radius:12px;
  padding:3px 10px;font-size:11px;color:var(--gold);cursor:pointer;flex-shrink:0}
.togp{display:flex;gap:3px;margin-left:auto}
.tog{padding:4px 8px;border-radius:3px;border:1px solid var(--brd2);
  background:rgba(10,8,20,.85);color:var(--tdim);cursor:pointer;font-size:9px}
.tog.on{background:rgba(28,48,70,.9);border-color:var(--tel);color:var(--txt)}
.sc{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:2}
.idle{color:var(--tdim);font-style:italic;font-size:13px;
  animation:p 2.5s infinite;text-align:center}
@keyframes p{0%,100%{opacity:.3}50%{opacity:.8}}
.en-box{display:flex;flex-direction:column;align-items:center;gap:4px;width:100%}
.en-em{font-size:60px;line-height:1;animation:fl 3s ease-in-out infinite;
  filter:drop-shadow(0 0 12px rgba(80,40,120,.5))}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.en-em.bg{filter:drop-shadow(0 0 20px rgba(180,140,30,.7))}
.ennm{font-size:13px;letter-spacing:.06em;font-weight:bold}
.ennm.elite{color:#a898d8}.ennm.boss{color:var(--gold)}.ennm.rare{color:#38b8d8}
.ehpw{width:200px;height:8px;background:#100818;border:1px solid var(--brd);
  border-radius:3px;overflow:hidden}
.ehpb{height:100%;background:linear-gradient(90deg,#7a1818,#c02828);transition:width .25s}
.ehpt{font-size:10px;color:var(--tdim)}
/* Encounter dialog */
.eo{position:absolute;inset:0;background:rgba(5,3,12,.85);
  display:flex;align-items:center;justify-content:center;z-index:20}
.ed{background:var(--bg2);border:1px solid var(--gdim);border-radius:8px;
  padding:16px;text-align:center;width:190px}
.ed h3{color:var(--gold);font-size:13px;margin-bottom:5px}
.ed p{color:var(--tdim);font-size:12px;margin-bottom:12px;line-height:1.5}
.edb{display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
.btn{border:none;border-radius:4px;padding:9px 13px;cursor:pointer;
  font-size:11px;letter-spacing:.04em;transition:all .14s}
.btn:active{transform:scale(.96)}
.btn-f{background:linear-gradient(180deg,#2a1010,#180808);border:1px solid #5a2020;color:#c06060}
.btn-r{background:linear-gradient(180deg,#101828,#080e18);border:1px solid var(--brd2);color:var(--tdim)}
.btn-g{background:linear-gradient(180deg,#102810,#081808);border:1px solid #205a20;color:#60c060}
/* LOG */
.blog{flex-shrink:0;height:84px;overflow:hidden;padding:3px 8px 2px;
  background:#060510;border-top:1px solid var(--brd);border-bottom:1px solid var(--brd);
  font-size:10.5px;line-height:1.7;display:flex;flex-direction:column;justify-content:flex-end;gap:0}
.ll{width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* Floor select */
.fs-grid{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;justify-content:center;max-height:55vh;overflow-y:auto}
.fs-btn{width:46px;height:34px;background:var(--bg3);border:1px solid var(--brd2);
  border-radius:3px;color:var(--tdim);cursor:pointer;font-size:11px;font-weight:bold;transition:all .14s}
.fs-btn.cur{background:rgba(28,48,70,.9);border-color:var(--tel);color:var(--txt)}
.fs-btn.clr{border-color:#2a5020;color:#60b060}
.fs-btn:disabled{opacity:.25;cursor:default}
/* Drop result */
.drop-item{background:var(--bg3);border:1px solid var(--brd);border-radius:4px;
  padding:5px 8px;display:flex;align-items:center;gap:7px;margin-bottom:4px}
.drop-em{font-size:18px;flex-shrink:0}
.drop-info{flex:1;min-width:0}
.drop-nm{font-size:11px;font-weight:bold}
.drop-sub{font-size:10px;color:var(--tdim)}
.ll.sk{color:#c8a030;font-style:italic}.ll.dm{color:#a05838}
.ll.hl{color:#389848}.ll.dt{color:#902020;font-weight:600}
.ll.sy{color:#287888}.ll.lv{color:#b8a82a;font-weight:600}
.ll.ch{color:#7838a8}.ll.cg{color:var(--gold)}.ll.cd{color:#30a8c8}.ll.ca{color:#c09820}
.ll.er{color:#ff4040}.ll.ev{color:#8860d0}.ll.wa{color:#c07820}
/* PARTY */
.psec{flex-shrink:0;background:#05040c;padding:3px 4px;display:flex;flex-direction:column;gap:2px}
.rlbl{font-size:8px;color:var(--tdim);letter-spacing:.1em;padding:1px 3px}
.prow{display:flex;gap:3px}
.pc{flex:1;position:relative;border-radius:5px;border:1px solid #1c2e50;
  height:110px;background:linear-gradient(180deg,#0f1c36,#0a1428);
  display:flex;flex-direction:column;align-items:center;padding:4px 3px}
.pc.dead{opacity:.35;filter:grayscale(.8)}
.pc.sel{border-color:#c9a227;box-shadow:0 0 8px rgba(201,162,39,.5);}
.pc.bk{border-color:#14204a;height:100px;background:linear-gradient(180deg,#101830,#080e22)}
.pc-nm{font-size:8px;color:#aab8d8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  width:100%;text-align:center;margin-bottom:2px}
.pc-em{font-size:28px;flex:1;display:flex;align-items:center;justify-content:center;line-height:1}
.pc-qb{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.55);
  border:1px solid #243050;border-radius:3px;color:#4a5870;font-size:8px;
  padding:0 3px;cursor:pointer;line-height:15px}
.pc-ht{font-size:7.5px;color:#8898b8;text-align:center;margin-bottom:2px}
.pc-hw{width:100%;height:5px;background:rgba(8,12,24,.7);border-radius:2px;overflow:hidden}
.pc-hb{height:100%;background:linear-gradient(90deg,#1e5428,#2e8040);transition:width .3s}
.pc-hb.lo{background:linear-gradient(90deg,#786018,#b09028)}
.pc-hb.cr{background:linear-gradient(90deg,#701818,#a82828)}
.pc-do{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:22px;background:rgba(0,0,0,.5);border-radius:5px}
.pc-ct{font-size:7px;color:#6880a0;text-align:center;height:11px;line-height:11px;}
.pslot{flex:1;height:110px;background:rgba(255,255,255,.02);
  border:1px dashed #1a2840;border-radius:5px;
  display:flex;align-items:center;justify-content:center}
.pslot.bk{height:100px}
.pslot-t{font-size:9px;color:var(--tdim);text-align:center;line-height:1.6}
/* CONTROLS */
.ctrl{flex-shrink:0;display:flex;align-items:center;gap:5px;
  padding:4px 6px;background:#08070e;border-top:1px solid var(--brd)}
.gd{font-size:12px;color:var(--gold)}
.sbtn{margin-left:auto;background:linear-gradient(180deg,#1a2c44,#0e1c2c);
  border:1px solid var(--tel);color:#68a0c0;border-radius:4px;padding:9px 15px;
  cursor:pointer;font-size:12px;letter-spacing:.06em}
.sbtn.act{background:linear-gradient(180deg,#2c1010,#1a0808);border-color:#5a2020;color:#b06060}
/* CHAR CARDS */
.vt{color:var(--gold);font-size:12px;letter-spacing:.1em;
  margin-bottom:4px;padding-bottom:4px;border-bottom:1px solid var(--brd);flex-shrink:0}
.vs{font-size:11px;color:var(--tdim);margin-bottom:7px;flex-shrink:0}
.cc{background:var(--bg2);border:1px solid var(--brd);border-radius:5px;
  padding:8px;display:flex;align-items:flex-start;gap:8px;cursor:pointer;
  margin-bottom:5px;position:relative}
.cc.fr{border-color:var(--gdim)}.cc.bk2{border-color:#2a3870}.cc.lk{opacity:.38;cursor:default}
.cav{width:42px;height:50px;flex-shrink:0;background:#0a1020;border-radius:3px;
  display:flex;align-items:center;justify-content:center;font-size:26px}
.cdet{flex:1;min-width:0}
.cnmr{display:flex;align-items:center;gap:5px;margin-bottom:1px;flex-wrap:wrap}
.cnm{font-size:13px;font-weight:bold}
.ccls{font-size:9px;color:var(--tdim);background:var(--bg3);border:1px solid var(--brd);padding:1px 5px;border-radius:2px}
.cfn{font-size:9px;color:var(--tdim);margin-bottom:2px}
.clv{font-size:11px;color:var(--gold);margin-bottom:3px}
.cst{display:flex;gap:5px;flex-wrap:nowrap;margin-bottom:2px;overflow:hidden}
.st{font-size:9px;color:var(--tdim);white-space:nowrap}.st span{color:var(--txt)}
.csk{font-size:10px;color:var(--tdim);font-style:italic;margin-bottom:3px}
.ceq{display:flex;gap:3px;flex-wrap:wrap}
.eqb{font-size:9px;background:var(--bg3);border:1px solid var(--brd);padding:1px 4px;border-radius:2px;color:var(--tdim)}
.pb{position:absolute;top:6px;right:6px;font-size:8px;padding:1px 6px;border-radius:2px}
.pb.fr{background:var(--gdim);color:#060400}
.pb.bk2{background:#182858;color:#6888c0;border:1px solid #2a3870}
.exw{background:var(--bg3);height:2px;border-radius:1px;margin-top:4px;overflow:hidden}
.exb{background:linear-gradient(90deg,#243468,#3450a0);height:100%;transition:width .4s}
.ulk{font-size:10px;color:var(--tdim);margin-top:3px}
/* INV */
.ii{background:var(--bg2);border:1px solid var(--brd);border-radius:4px;
  padding:7px 9px;display:flex;align-items:center;gap:8px;margin-bottom:5px;cursor:pointer}
.iic{font-size:24px;flex-shrink:0;width:32px;text-align:center}
.iid{flex:1;min-width:0}
.iinm{font-size:12px;font-weight:bold}
.iisub{font-size:10px;margin-top:1px}
.iistat{font-size:10px;color:var(--tdim);margin-top:2px}
.iipl{font-size:11px;background:var(--bg3);border:1px solid var(--brd2);padding:2px 6px;
  border-radius:3px;color:var(--tel);flex-shrink:0}
.em2{color:var(--tdim);font-size:12px;text-align:center;padding:30px 10px}
.st2{font-size:11px;color:var(--gold);letter-spacing:.08em;
  margin:7px 0 5px;padding-bottom:4px;border-bottom:1px solid var(--brd)}
/* rarity colors: common/uncommon/rare/epic/legend/origin */
.qn{color:#909090}  /* ノーマル 灰 */
.qg{color:#3cc060}  /* アンコモン 緑 */
.qr{color:#3888e8}  /* レア 青 */
.qs{color:#b838e8}  /* エピック 紫 */
.qp{color:#e8b820}  /* レジェンド 黄 */
.qo{color:#e83030}  /* オリジン 赤 */
/* rarity border colors */
.ii.rq1{border-color:#484848}  /* ノーマル 灰 */
.ii.rq2{border-color:#1a5028}  /* アンコモン 緑 */
.ii.rq3{border-color:#1a3870}  /* レア 青 */
.ii.rq4{border-color:#581898}  /* エピック 紫 */
.ii.rq5{border-color:#786010}  /* レジェンド 黄 */
.ii.rq6{border-color:#781818}  /* オリジン 赤 */
/* INV TABS */
.inv-tabs{display:flex;gap:0;margin-bottom:6px;border:1px solid var(--brd2);border-radius:4px;overflow:hidden;flex-shrink:0}
.inv-tab{flex:1;background:var(--bg3);border:none;color:var(--tdim);padding:7px 4px;cursor:pointer;font-size:10px;border-right:1px solid var(--brd2)}
.inv-tab:last-child{border-right:none}
.inv-tab.active{background:rgba(28,48,70,.9);color:var(--txt);border-bottom:2px solid var(--tel)}
.bulk-bar{display:flex;gap:5px;padding:5px 0;flex-shrink:0}
.bulk-btn{flex:1;background:var(--bg3);border:1px solid var(--brd2);border-radius:3px;
  color:var(--tdim);padding:6px 4px;cursor:pointer;font-size:10px}
.bulk-btn:active{background:var(--bg2)}
/* OVERLAYS */
.ovl{position:fixed;inset:0;background:rgba(4,3,10,.88);
  display:flex;align-items:center;justify-content:center;z-index:100}
.dlg{background:var(--bg2);border:1px solid var(--gdim);border-radius:7px;
  padding:14px;width:310px;max-height:85vh;overflow-y:auto}
.dlg h3{color:var(--gold);text-align:center;font-size:13px;margin-bottom:10px}
.dr{background:var(--bg3);border:1px solid var(--brd);border-radius:4px;
  padding:7px 9px;display:flex;align-items:center;gap:8px;cursor:pointer;margin-bottom:5px}
.drd{flex:1}.drnm{font-size:12px;font-weight:bold}.drsub{font-size:10px;color:var(--tdim)}
.dr.ded{opacity:.38;cursor:not-allowed}
.cbtn{width:100%;background:none;border:1px solid var(--brd);border-radius:3px;
  color:var(--tdim);padding:8px;cursor:pointer;font-size:13px;margin-top:6px}
.cbtn.red{border-color:#5a2020;color:#b06060;margin-top:3px}
.sbox{background:var(--bg3);border:1px solid var(--brd);border-radius:4px;padding:8px;margin-bottom:8px}
.snm{font-size:12px;color:var(--gold);margin-bottom:3px;font-weight:bold}
.sdsc{font-size:11px;color:var(--tdim)}
/* Comparison UI */
.cmp-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.cmp-col{background:var(--bg3);border:1px solid var(--brd);border-radius:4px;padding:6px}
.cmp-title{font-size:9px;color:var(--tdim);margin-bottom:3px;letter-spacing:.08em}
.cmp-nm{font-size:11px;font-weight:bold;margin-bottom:2px}
.cmp-stat{font-size:10px;margin:1px 0}
.cmp-up{color:#40c060}.cmp-dn{color:#c04040}.cmp-eq{color:var(--tdim)}
/* Choice overlay */
.choice-ovl{position:absolute;inset:0;background:rgba(5,3,12,.88);
  display:flex;align-items:center;justify-content:center;z-index:25}
.choice-dlg{background:var(--bg2);border:1px solid var(--gdim);border-radius:8px;
  padding:18px;text-align:center;width:230px}
.choice-dlg h3{color:var(--gold);font-size:13px;margin-bottom:6px}
.choice-dlg p{color:var(--tdim);font-size:11px;margin-bottom:14px;line-height:1.5}
.choice-dlg .edb{flex-direction:column;gap:7px}
/* Stampede bar */
.stmp-bar{position:absolute;top:34px;left:50%;transform:translateX(-50%);
  background:rgba(80,20,20,.85);border:1px solid #7a2020;border-radius:3px;
  padding:2px 8px;font-size:9px;color:#d06060;z-index:6;white-space:nowrap}
/* Event flash */
.ev-flash{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
  background:rgba(80,40,130,.9);border:1px solid #6040a8;border-radius:5px;
  padding:5px 12px;font-size:11px;color:#c8a8f8;z-index:10;
  animation:fadeup .4s ease;pointer-events:none}
@keyframes fadeup{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
/* Buff icons */
.buff-row{position:absolute;bottom:2px;left:0;right:0;display:flex;justify-content:center;gap:3px}
.buff-ic{font-size:10px;background:rgba(0,0,0,.6);border-radius:2px;padding:0 2px}

/* Ceq slot buttons in char card */
.ceq-slot-btn{
font-size:9px;background:var(–bg3);border:1px solid var(–brd);
padding:2px 5px;border-radius:3px;color:var(–tdim);
cursor:pointer;display:block;width:100%;text-align:left;
margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.ceq-slot-btn:active{background:var(–bg2);}
/* ceq list rarity colors applied as class */
.ceq-slot-btn.qn{border-color:#484848;color:#909090;}
.ceq-slot-btn.qg{border-color:#1a5028;color:#3cc060;}
.ceq-slot-btn.qr{border-color:#1a3870;color:#3888e8;}
.ceq-slot-btn.qs{border-color:#581898;color:#b838e8;}
.ceq-slot-btn.qp{border-color:#786010;color:#e8b820;}
.ceq-slot-btn.qo{border-color:#781818;color:#e83030;}
/* Lock btn */
.inv-lock-btn{background:none;border:none;font-size:14px;cursor:pointer;padding:0 2px;flex-shrink:0;line-height:1;}
/* Pending loot */
.loot-bar{font-size:9px;color:var(–gold);padding:1px 4px;background:rgba(90,70,10,.3);border-radius:2px;text-align:center}
.pc-rem-hint{position:absolute;bottom:2px;left:0;right:0;text-align:center;
font-size:9px;color:#e04040;background:rgba(0,0,0,.7);padding:1px 0;pointer-events:none;}
/* Sort buttons */
.sort-btn{background:var(–bg3);border:1px solid var(–brd2);border-radius:3px;
color:var(–tdim);padding:3px 7px;cursor:pointer;font-size:9px;}
.sort-btn.active{background:rgba(28,48,70,.9);border-color:var(–tel);color:var(–txt);}
/* CEQ: current equip panel */
.ceq-cur{background:rgba(20,18,38,.9);border:1px solid var(–brd2);border-radius:5px;
padding:7px 10px;margin-bottom:8px;flex-shrink:0}
.ceq-cur-nm{font-size:11px;font-weight:bold;margin-bottom:3px}
.ceq-cur-stats{display:flex;gap:8px;flex-wrap:wrap}
.ceq-cur-st{font-size:10px;color:var(–tdim)}
.ceq-cur-st span{color:var(–txt)}
/* stat diff tags */
.sd-up{font-size:10px;color:#4ccc6a;font-weight:bold}
.sd-dn{font-size:10px;color:#cc5050;font-weight:bold}
.sd-eq{font-size:10px;color:var(–tdim)}
.ceq-diff{display:flex;gap:5px;flex-wrap:wrap;margin-top:2px}
/* Leader skill */
.ldr-badge{position:absolute;top:3px;right:3px;background:#b8920a;border-radius:3px;
font-size:8px;color:#fff;padding:1px 4px;font-weight:bold;pointer-events:none}

function cs(base, plus, q){
  var qualMul = q / 100;
  var rarMul = RARITY_MULT[Math.min(plus, RARITY_MULT.length-1)];
  return Math.max(1, Math.floor(base * qualMul * rarMul));
}
// Rarity determined by plus value (not quality)
// +0=コモン(灰) +1=アンコモン(緑) +2=レア(青) +3=エピック(紫) +4=レジェンド(黄) Origin=赤
// レアリティは+値で決定（品質とは独立）
// +0=ノーマル灰  +1=アンコモン緑  +2=レア青  +3=エピック紫  +4=レジェンド黄  オリジン=赤
function qi(plus,isAnc){
  if(isAnc)return{n:'オリジン',c:'qo',r:6};
  if(plus===0)return{n:'ノーマル', c:'qn',r:1};
  if(plus===1)return{n:'アンコモン',c:'qg',r:2};
  if(plus===2)return{n:'レア',     c:'qr',r:3};
  if(plus===3)return{n:'エピック', c:'qs',r:4};
  return      {n:'レジェンド',     c:'qp',r:5};
}

function getET(f){for(var i=0;i<ET.length;i++){if(f>=ET[i].r[0]&&f<=ET[i].r[1])return ET[i];}return ET[ET.length-1];}
function buildEn(f,tp){
  tp=tp||'normal';
  var tierD=getET(f);
  var pool=[];for(var i=0;i<tierD.pool.length;i++){if(!tierD.pool[i].rare)pool.push(tierD.pool[i]);}
  var base=pool[rnd(0,pool.length-1)];
  var lv=rnd(Math.max(1,f-1),f+2);
  // 大幅強化: 装備なしでは序盤から厳しい数値
  var bHP=Math.floor((90+f*52)*base.hm);
  var bAT=Math.floor((18+f*10)*base.am);
  var bDF=Math.floor((8+f*5)*base.dm);
  var bSP=Math.floor(55*base.sm);
  var hm=1,am=1,dm=1,isE=false,isB=false,isR=false,isEl=false;
  var nm=base.nm,em=base.em;
  var skType=base.sk||'rage';
  if(tp==='rare'){
    var rp=[];for(var i=0;i<tierD.pool.length;i++){if(tierD.pool[i].rare)rp.push(tierD.pool[i]);}
    if(rp.length){
      base=rp[rnd(0,rp.length-1)];nm=base.nm;em=base.em;skType=base.sk||'charge';
      hm=base.hm||6;am=base.am||2.5;dm=base.dm||3.5;lv=f+3;isR=true;
    }
  } else if(tp==='elite'){
    var ep=EL[(f-1)%EL.length];nm=ep.nm;em=ep.em;hm=ep.hm;am=ep.am;dm=ep.dm;skType=ep.sk||'charge';lv=f+2;isE=true;
  } else if(tp==='boss'){
    var bd=GB[f]||{nm:'深淵の支配者',em:'👑'};nm=bd.nm;em=bd.em;hm=11.0;am=3.8;dm=3.2;skType='charge';lv=f+5;isB=true;
  } else if(tp==='named_elite'){
    nm=base.nm+'エリート';hm=2.8;am=2.2;dm=2.0;skType='rage';lv=f+1;isEl=true;
    if(base.isDG){nm='ダイヤモンドゴーレムエリート';hm=8.0;am=3.5;dm=7.0;skType='charge';}
  }
  var hp=Math.floor(bHP*hm);
  var isDG=!!(base&&base.isDG);
  return{nm:nm,em:em,lv:lv,hp:hp,mhp:hp,atk:Math.floor(bAT*am),def:Math.floor(bDF*dm),spd:bSP,
    ch:0,dd:1,ad:1,psn:0,par:0,slp:0,cnf:0,
    skType:skType,skCd:0,charging:false,guardUp:false,
    exp:Math.floor((22+f*18)*base.xp*hm),gold:rnd(12+f*7,20+f*13),
    isE:isE,isB:isB,isR:isR,isEl:isEl,isDG:isDG};
}

var EVENTS=[
  {id:'trap',    w:20, nm:'マジックトラップ', em:'⚠️'},
  {id:'chest',   w:25, nm:'宝箱発見',         em:'📦'},
  {id:'heal',    w:18, nm:'回復の泉',          em:'💧'},
  {id:'atk_buff',w:15, nm:'力の泉',            em:'⚔️'},
  {id:'def_buff',w:15, nm:'守りの泉',          em:'🛡️'},
  {id:'stampede',w:7,  nm:'スタンピード!',     em:'💥'}
];
function rollEvent(){
  var tot=0;for(var i=0;i<EVENTS.length;i++)tot+=EVENTS[i].w;
  var r=Math.random()*tot;
  for(var i=0;i<EVENTS.length;i++){r-=EVENTS[i].w;if(r<=0)return EVENTS[i];}
  return EVENTS[0];
}
function runEvent(ev){
  var alive=G.dun.bp.filter(function(b){return b.hp>0;});
  if(!alive.length)return;
  if(ev.id==='trap'){
    var tg=alive[rnd(0,alive.length-1)];
    var dex=tg.dex||50;
    var success=Math.random()<(dex/300);
    if(success){log('ev','⚠️ マジックトラップ → '+tg.nm+'が解除した!');}
    else{
      var dmg=Math.floor(tg.mhp*0.15);tg.hp=Math.max(0,tg.hp-dmg);
      log('ev','⚠️ マジックトラップ発動! '+tg.nm+' に'+dmg+'ダメージ!');
      if(tg.hp<=0)log('dt',tg.nm+' 倒れた...');
    }
  } else if(ev.id==='chest'){
    var t=['iron','iron','iron','copper','copper','silver'];
    if(Math.random()<0.08)t.push('gold');
    var ct=t[rnd(0,t.length-1)];
    log('ev','📦 宝箱発見! (帰還後に確認)');
    dropPending(ct,G.fl);
  } else if(ev.id==='heal'){
    for(var i=0;i<alive.length;i++){alive[i].hp=alive[i].mhp;}
    log('ev','💧 回復の泉! 全員HP全回復!');
  } else if(ev.id==='atk_buff'){
    G.dun.atkBuff=true;
    log('ev','⚔️ 力の泉! 次の戦闘で攻撃力+20%!');
  } else if(ev.id==='def_buff'){
    G.dun.defBuff=true;
    log('ev','🛡️ 守りの泉! 次の戦闘で防御力+20%!');
  } else if(ev.id==='stampede'){
    var cnt=rnd(3,5);
    G.dun.stampede=cnt;
    log('ev','💥 スタンピード! '+cnt+'連戦が始まる!');
    updStampedeUI();
    trigEnc(Math.random()<0.7?'named_elite':'normal');
    return;
  }
  renderPC();
}

// Level cap: 40. EXP curve steep.
var LV_CAP=40;
function expN(lv){
  if(lv>=LV_CAP)return Infinity;
  return Math.floor(120*Math.pow(lv,2.2));
}

  gold:200,medals:5,cf:0,hf:1,fl:1,leader:null,

    pendingLoot:[],   // items collected during run, awarded on return

    stampede:0,       // remaining stampede fights
    midShown:false,   // whether mid-floor choice was shown
    speedIdx:0,speedMul:1  // battle speed
  }
};
for(var _i=0;_i<CD.length;_i++){
  var _d=CD[_i];
  G.chars[_d.id]={id:_d.id,nm:_d.nm,lv:1,exp:0,en:expN(1),ul:false,sk:_d.sk};
  G.eq[_d.id]={weapon:null,armor:null,ring:null};
}
function cdef(id){for(var i=0;i<CD.length;i++){if(CD[i].id===id)return CD[i];}return null;}
function cst(id){
  var d=cdef(id);var c=G.chars[id];
  if(!d||!c)return{at:0,df:0,hp:1,dex:50};
  var at=Math.floor(d.b.at+d.gr.at*(c.lv-1));
  var df=Math.floor(d.b.df+d.gr.df*(c.lv-1));
  var hp=Math.floor(d.b.hp+d.gr.hp*(c.lv-1));
  var eq=G.eq[id]||{};
  var sl=['weapon','armor','ring'];
  for(var j=0;j<sl.length;j++){
    var it=eq[sl[j]];if(!it)continue;
    var iD=gid(it.id2);if(!iD)continue;
    if(iD.stats.atk)at+=cs(iD.stats.atk,it.plus,it.q);
    if(iD.stats.def)df+=cs(iD.stats.def,it.plus,it.q);
    if(iD.stats.hp)hp+=cs(iD.stats.hp,it.plus,it.q);
  }
  return{at:at,df:df,hp:hp,dex:Math.floor(d.b.dex+d.gr.dex*(c.lv-1))};
}

function initNewGame(){
  // ランダムに3体の戦士を選んでスタート
  G.party=[];
  var all=CD.slice();
  for(var i=all.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=all[i];all[i]=all[j];all[j]=t;}
  var picks=all.slice(0,3);
  for(var i=0;i<picks.length;i++){G.chars[picks[i].id].ul=true;G.party.push(picks[i].id);}
}
function save(){
  try{
    var s={gold:G.gold,medals:G.medals,cf:G.cf,hf:G.hf,fl:G.fl,leader:G.leader,
      party:G.party,inv:G.inv,eq:G.eq,chars:{}};
    for(var id in G.chars){var c=G.chars[id];s.chars[id]={lv:c.lv,exp:c.exp,en:c.en,ul:c.ul};}
    localStorage.setItem('dt6',JSON.stringify(s));
  }catch(e){}
}
function load(){
  try{
    var raw=localStorage.getItem('dt6');
    if(!raw){initNewGame();return;}
    var s=JSON.parse(raw);
    G.gold=s.gold||200;G.medals=s.medals||5;G.cf=s.cf||0;G.hf=s.hf||1;G.fl=s.fl||1;
    G.leader=s.leader||null;
    var vi={};for(var i=0;i<CD.length;i++)vi[CD[i].id]=true;
    G.party=(s.party||[]).map(function(id){return (id&&vi[id])?id:null;});
    // 末尾のnullを除去
    while(G.party.length>0&&!G.party[G.party.length-1])G.party.pop();
    if(!G.party.filter(Boolean).length)initNewGame();
    G.inv=s.inv||[];
    var se=s.eq||{};for(var id in se){if(G.eq[id])G.eq[id]=se[id];}
    var sc=s.chars||{};
    for(var id in sc){
      if(!G.chars[id])continue;
      G.chars[id].lv=sc[id].lv||1;G.chars[id].exp=sc[id].exp||0;
      G.chars[id].en=sc[id].en||expN(sc[id].lv||1);G.chars[id].ul=!!sc[id].ul;
    }
  }catch(e){initNewGame();}
}

function rollC(et){
  // ドロップなし44%は全敵共通。残り56%を種別で按分。
  // ダイヤの宝箱はdiamond_golem/diamond_golem_eliteのみ
  // いにしえの秘宝箱はbossのみ
  var DROP_NONE=44;
  var tables={
    // 残56%: iron30 copper16 silver10
    normal:     [['iron',30],['copper',16],['silver',10],[null,DROP_NONE]],
    // 残56%: iron20 copper18 silver14 gold4
    named_elite:[['iron',20],['copper',18],['silver',14],['gold',4],[null,DROP_NONE]],
    // 残56%: silver24 gold22 iron10
    elite:      [['silver',24],['gold',22],['iron',10],[null,DROP_NONE]],
    // 残56%: iron10 silver16 gold20 anc10
    boss:       [['iron',10],['silver',16],['gold',20],['anc',10],[null,DROP_NONE]],
    // ダイヤモンドゴーレム: 残56%はdiaのみ
    diamond_golem:[['dia',56],[null,DROP_NONE]],
    // ダイヤモンドゴーレムエリート: 確定ダイヤ
    diamond_golem_elite:[['dia',100]]
  };
  var tbl=tables[et]||tables.normal;
  var tot=0;for(var i=0;i<tbl.length;i++)tot+=tbl[i][1];
  var r=Math.random()*tot;
  for(var i=0;i<tbl.length;i++){r-=tbl[i][1];if(r<=0)return tbl[i][0];}
  return null;
}

function eTick(){
  if(G.dun.phase!=='exploring')return;
  var cfg=fcfg(G.fl);G.dun.dist++;updFloor();

  // Mid-floor checkpoint
  var half=Math.floor(cfg.dist/2);
  if(!G.dun.midShown&&G.dun.dist>=half&&G.dun.dist<cfg.dist){
    G.dun.midShown=true;
    G.dun.phase='pend';
    clearInterval(eT);eT=null;
    var mo=g('midcovl');if(mo)mo.classList.remove('hidden');
    return;
  }

  if(G.dun.dist<cfg.dist&&G.dun.dist%cfg.enc===0){
    // Check for floor event (15% chance instead of encounter)
    if(Math.random()<0.15){
      var ev=rollEvent();
      if(ev.id==='stampede'||ev.id==='trap'||ev.id==='chest'){
        // These may pause exploration
        runEvent(ev);if(G.dun.phase!=='exploring')return;
      } else {
        runEvent(ev);
      }
      return;
    }
    var tr=getET(G.fl);var hr=false;for(var i=0;i<tr.pool.length;i++){if(tr.pool[i].rare){hr=true;break;}}
    var partyCount=G.party.filter(Boolean).length;
    var eliteOk=(G.fl>=4&&partyCount>=4);
    // Named elite chance: 12%（条件を満たす場合のみ）
    var tp='normal';
    if(eliteOk&&Math.random()<0.12)tp='named_elite';
    else if(hr&&Math.random()<.01)tp='rare'; // 1%
    trigEnc(tp);return;
  }
  if(G.dun.dist>=cfg.dist){
    G.dun.dist=cfg.dist;updFloor();
    var partyCount2=G.party.filter(Boolean).length;
    var bossOrElite=(cfg.boss||partyCount2>=4&&G.fl>=4);
    log('sy',cfg.boss?'大ボス出現!':(bossOrElite?'エリート出現!':'強敵出現!'));
    trigEnc(cfg.boss?'boss':(bossOrElite?'elite':'named_elite'));
  }
}
function trigEnc(tp){
  var e=buildEn(G.fl,tp);

  if(G.dun.atkBuff){G.dun.atkBuff=false;G.dun._atkBuff=true;}
  if(G.dun.defBuff){G.dun.defBuff=false;G.dun._defBuff=true;}
  if(G.dun.auto){startB(e);}
  else{
    G.dun.pend=e;G.dun.phase='pend';
    var et=g('enctx');
    if(et)et.textContent=e.isB?'大ボス出現!':e.isE?'エリート出現!':e.isR?'レア!':e.isEl?'エリートモンスター!':'敵が現れた!';
    var ed=g('encdsc');if(ed)ed.textContent=e.nm+' Lv.'+e.lv;
    var eo=g('encovl');if(eo)eo.classList.remove('hidden');
  }
}

function gTick(){
  if(G.dun.phase!=='battle')return;
  var en=G.dun.enemy;if(!en)return;
  var aa=[];for(var i=0;i<G.dun.bp.length;i++){if(G.dun.bp[i].hp>0)aa.push(G.dun.bp[i]);}
  if(!aa.length){onWipe();return;}
  if(en.hp<=0){onKill();return;}
  var spMul=G.dun.speedMul||1;
  for(var i=0;i<aa.length;i++)aa[i].ch+=aa[i].dex/9*spMul;
  en.ch+=en.spd/9*spMul;
  var acts=[];for(var i=0;i<aa.length;i++){if(aa[i].ch>=100)acts.push(aa[i]);}
  if(en.ch>=100)acts.push(en);
  acts.sort(function(a,b){return b.ch-a.ch;});
  for(var ai=0;ai<acts.length;ai++){
    if(en.hp<=0)break;
    var allD=true;for(var i=0;i<aa.length;i++){if(aa[i].hp>0){allD=false;break;}}
    if(allD)break;
    var ac=acts[ai];ac.ch-=100;
    if(ac===en){
      // 麻痺中は行動不能
      if(en.par>0){log('sk','⚡ '+en.nm+' は麻痺して動けない!');en.par=Math.max(0,en.par-1);continue;}
      // 睡眠中は行動不能
      if(en.slp>0){log('sk','💤 '+en.nm+' は眠っている...');en.slp=Math.max(0,en.slp-1);continue;}
      var fr=[];for(var i=0;i<aa.length;i++){if(aa[i].row==='f'&&aa[i].hp>0)fr.push(aa[i]);}
      // 混乱: 敵味方ランダム攻撃
      if(en.cnf>0){
        var allTgts=[];
        for(var i=0;i<aa.length;i++){if(aa[i].hp>0)allTgts.push(aa[i]);}
        allTgts.push(en);
        var tgCnf=allTgts[rnd(0,allTgts.length-1)];
        var eaCnf=Math.floor(en.atk*(en.ad||1));
        var dCnf=Math.max(1,Math.floor((eaCnf-tgCnf.df*.28)*(0.85+Math.random()*.3)));
        tgCnf.hp=Math.max(0,tgCnf.hp-dCnf);
        log('sk','😵 '+en.nm+' 混乱! →'+tgCnf.nm+': '+dCnf);
        if(tgCnf.hp<=0&&tgCnf!==en)log('dt',tgCnf.nm+' 倒れた...');
        if(tgCnf===en&&tgCnf.hp<=0){onKill();return;}
        en.cnf=Math.max(0,en.cnf-1);
        continue;
      }
      // ── 敵スキル行動 ────────────────────────────────
      var tg=fr.length>0?fr[rnd(0,fr.length-1)]:aa[rnd(0,aa.length-1)];
      var didSkill=false;
      if(en.skCd<=0&&Math.random()<0.28){
        en.skCd=4+(en.isB?2:0);
        var sk=en.skType||'rage';
        if(sk==='charge'){
          if(!en.charging){
            en.charging=true;
            log('wa',en.em+en.nm+' が力を溜めている…!');
            didSkill=true;
          } else {
            en.charging=false;
            var ea2=Math.floor(en.atk*(en.ad||1)*2.6);
            var d2=Math.max(1,Math.floor((ea2-tg.df*.28)*(0.9+Math.random()*.2)));
            tg.hp=Math.max(0,tg.hp-d2);
            log('dt',en.em+'【必殺】'+en.nm+'→'+tg.nm+': '+d2+'!!');
            if(tg.hp<=0)log('dt',tg.nm+' 倒れた...');
            didSkill=true;
          }
        } else if(sk==='aoe'){
          log('wa',en.em+'【全体攻撃】'+en.nm+'!');
          for(var i=0;i<aa.length;i++){
            if(aa[i].hp<=0)continue;
            var eaoe=Math.floor(en.atk*(en.ad||1)*0.65);
            var daoe=Math.max(1,Math.floor((eaoe-aa[i].df*.28)*(0.8+Math.random()*.3)));
            aa[i].hp=Math.max(0,aa[i].hp-daoe);
            if(aa[i].hp<=0)log('dt',aa[i].nm+' 倒れた...');
          }
          didSkill=true;
        } else if(sk==='regen'){
          var rh=Math.floor(en.mhp*0.18);en.hp=Math.min(en.mhp,en.hp+rh);
          log('ev',en.em+'【再生】'+en.nm+' HP+'+rh+'!');
          didSkill=true;
        } else if(sk==='guard'){
          en.guardUp=true;
          log('sy',en.em+'【防御】'+en.nm+' 守りを固めた! (DEF×2)');
          didSkill=true;
        } else if(sk==='debuff'){
          for(var i=0;i<aa.length;i++){if(aa[i].hp>0){aa[i].at=Math.floor(aa[i].at*0.78);}}
          log('wa',en.em+'【弱体】'+en.nm+'の呪い! 全員ATK-22%!');
          didSkill=true;
        } else if(sk==='rage'){
          var earage=Math.floor(en.atk*(en.ad||1)*1.9);
          if(Math.random()<0.25){
            log('sk',en.em+'【大振り】'+en.nm+' 空振り!');
          } else {
            var drage=Math.max(1,Math.floor((earage-tg.df*.28)*(0.9+Math.random()*.2)));
            tg.hp=Math.max(0,tg.hp-drage);
            log('wa',en.em+'【大振り】'+en.nm+'→'+tg.nm+': '+drage+'!');
            if(tg.hp<=0)log('dt',tg.nm+' 倒れた...');
          }
          didSkill=true;
        }
      } else {
        if(en.skCd>0)en.skCd--;
        if(en.charging){en.charging=false;}
      }
      if(!didSkill){
        // 通常攻撃
        var ea=Math.floor(en.atk*(en.ad||1));
        var defMul=G.dun._defBuff?1.2:1;
        var guardMul=en.guardUp?0.4:1.0; // guard後は自DEFではなくPC側軽減
        // guardUpは次の被弾時に効果 – 敵が守りを固めた後、攻撃の威力はそのまま
        // (実際には敵DEFを下げる設計より PC受けダメ軽減として実装)
        var d=Math.max(1,Math.floor((ea-tg.df*defMul*.28)*(0.85+Math.random()*.3)));
        en.guardUp=false; // guard効果は1回
        tg.hp=Math.max(0,tg.hp-d);
        log('dm',en.em+en.nm+'->'+tg.nm+': '+d);
        if(tg.hp<=0)log('dt',tg.nm+' 倒れた...');
      }
    } else {
      if(en.hp<=0)continue;
      var am=ac.row==='b'?.9:1;
      // Apply attack buff
      var atkMul=G.dun._atkBuff?1.2:1;
      var res=null;
      // Skill with cooldown
      if(ac.skCd<=0&&Math.random()<ac.sk.rt){
        try{res=ac.sk.ex(ac,en,G.dun.bp);}catch(er){res=null;}
        if(res){
          var skDef=cdef(ac.id);
          ac.skCd=skDef?skDef.sk.cd:3;
        }
      }
      // Decrement cooldown when character acts
      if(ac.skCd>0&&!res)ac.skCd--;
      if(!res){
        var slpDefMul=en.slp>0?0.8:1.0; // 睡眠中DEF-20%
        var effDef=Math.floor(en.def*(en.dd||1)*slpDefMul);
        var baseDmg=Math.max(1,Math.floor((ac.at*am*atkMul-effDef*.28)*(0.85+Math.random()*.3)));
        var critRate=Math.min(0.5,ac.dex/500);
        var isCrit=Math.random()<critRate;
        var dm=isCrit?Math.floor(baseDmg*1.5):baseDmg;
        en.hp=Math.max(0,en.hp-dm);
        if(en.slp>0){en.slp=0;log('dm',ac.em+'->'+en.nm+': '+dm+(isCrit?' [会心]':'')+(ac.row==='b'?' [後]':'')+' [睡眠解除]');}
        else log('dm',ac.em+'->'+en.nm+': '+dm+(isCrit?' [会心]':'')+(ac.row==='b'?' [後]':''));
      } else {
        if(en.slp>0&&res.tp!=='hl'){en.slp=0;}
        log(res.tp==='hl'?'hl':'sk',res.tx);
      }
      // 技量バフのカウントダウン
      if(ac.dexBufRem>0){
        ac.dexBufRem--;
        if(ac.dexBufRem===0){ac.dex=ac.dexBase;log('sy',ac.nm+' 技量バフ終了');}
      }
    }
  }
  ptk++;
  if(ptk%12===0){
    // ── 毒: 最大HP10%/tick ──────────────────────
    if(en.psn>0){
      var pd=Math.floor(en.mhp*.10);
      en.hp=en.hp-pd; // 戦闘不能あり(0以下もそのまま)
      en.psn--;
      log('sk','☠ 毒! -'+pd+(en.psn>0?' (残'+en.psn+'T)':' [解除]'));
      if(en.hp<=0){onKill();return;}
    }
    // ── 麻痺: 50%で1T解除チェック ────────────────
    if(en.par>0){
      if(Math.random()<0.5){en.par=0;log('sk','⚡ 麻痺が解除された!');}
      else{en.par--;if(en.par===0)log('sk','⚡ 麻痺が解除された!');}
    }
    // ── 睡眠: 50%で1T解除チェック ────────────────
    if(en.slp>0){
      if(Math.random()<0.5){en.slp=0;log('sk','💤 睡眠から目覚めた!');}
      else{en.slp--;if(en.slp===0)log('sk','💤 睡眠から目覚めた!');}
    }
    // ── 混乱: 50%で1T解除チェック ────────────────
    if(en.cnf>0){
      if(Math.random()<0.5){en.cnf=0;log('sk','😵 混乱が解除された!');}
      else{en.cnf--;if(en.cnf===0)log('sk','😵 混乱が解除された!');}
    }
  }
  renderB();renderPC();
}
function clearBattleState(){
  // 全味方のSKクールタイム・状態異常リセット
  for(var i=0;i<G.dun.bp.length;i++){
    G.dun.bp[i].skCd=0;
    // 将来味方に状態異常が実装された時用
  }
}
function onKill(){
  var en=G.dun.enemy;G.dun.enemy=null;
  clearBattleState();
  // Clear one-time battle buffs
  G.dun._atkBuff=false;G.dun._defBuff=false;
  var et;
  if(en.isB)et='boss';
  else if(en.isDG&&en.isEl)et='diamond_golem_elite';
  else if(en.isDG)et='diamond_golem';
  else if(en.isR)et='rare';
  else if(en.isE)et='elite';
  else if(en.isEl)et='named_elite';
  else et='normal';
  log('lv',en.nm+' 倒した! EXP+'+en.exp+' G+'+en.gold);
  G.gold+=en.gold;
  for(var i=0;i<G.party.length;i++)gainE(G.party[i],en.exp);
  dropPending(rollC(et),G.fl);
  // 加護は戦闘では増えない（拠点帰還時のみ回復）
  // Stampede continue
  if(G.dun.stampede>0){
    G.dun.stampede--;
    updStampedeUI();
    if(G.dun.stampede>0){
      G.dun.phase='exploring';
      var cfg2=fcfg(G.fl);
      if(G.dun.dist<cfg2.dist){
        var tp2=Math.random()<0.7?'named_elite':'normal';
        setTimeout(function(){trigEnc(tp2);},500);
        updH();renderB();renderPC();save();
        return;
      }
    } else {
      updStampedeUI();
    }
  }
  var cfg=fcfg(G.fl);
  if((en.isE||en.isB)&&G.dun.dist>=cfg.dist){onFC();return;}
  G.dun.phase='exploring';
  if(!eT)eT=setInterval(eTick,200);
  var an=g('ann');if(an)an.textContent='探索中...';
  updH();renderB();renderPC();save();
}
function onFC(){
  var f=G.fl;if(f>G.cf)G.cf=f;
  log('lv',f+'F クリア!');
  // 3フロアごとにランダムな戦士が合流
  if(f%3===0){
    var locked=[];
    for(var i=0;i<CD.length;i++){if(!G.chars[CD[i].id].ul)locked.push(CD[i]);}
    if(locked.length>0){
      var pick=locked[rnd(0,locked.length-1)];
      G.chars[pick.id].ul=true;
      log('lv',pick.fn+' が仲間に加わった!');
      var vc2=g('vc');if(vc2&&vc2.classList.contains('active'))renderChars();
    }
  }
  var nf=f+1;if(nf>G.hf)G.hf=nf;
  updH();save();
  // Show floor clear choice
  clearInterval(eT);eT=null;
  G.dun.phase='pend';
  var fc=g('fcovl');
  var ft=g('fctxt');
  if(ft)ft.textContent=f+'F を制覇!\n次の階層へ進むか拠点に戻るか?';
  if(fc)fc.classList.remove('hidden');
  G.dun._pendNextFloor=nf;
}
function advanceNextFloor(){
  var nf=G.dun._pendNextFloor||G.fl+1;
  G.fl=nf;G.dun.dist=0;G.dun.midShown=false;
  G.dun.phase='exploring';
  for(var i=0;i<G.dun.bp.length;i++){var b=G.dun.bp[i];b.hp=Math.min(b.mhp,b.hp+Math.floor(b.mhp*.4));}
  log('sy',nf+'F へ! HP+40%回復');
  if(!eT)eT=setInterval(eTick,200);
  updFloor();renderB();renderPC();
  var vc=g('vc');if(vc&&vc.classList.contains('active'))renderChars();
}
function onWipe(){
  clearBattleState();
  log('dt','全滅...全ての荷物を失った!');
  loseAllLoot();
  G.medals=5; // 加護回復
  G.fl=Math.max(1,G.fl-1);
  clearInterval(gT);clearInterval(eT);gT=null;eT=null;
  G.dun.active=false;G.dun.phase='idle';G.dun.enemy=null;G.dun.pend=null;
  G.dun.stampede=0;G.dun._atkBuff=false;G.dun._defBuff=false;
  ['encovl','midcovl','fcovl'].forEach(function(id){var el=g(id);if(el)el.classList.add('hidden');});
  var sb=g('sbtn');if(sb){sb.textContent='▶ 出発';sb.className='sbtn';sb.disabled=false;}
  updStampedeUI();updH();updFloor();renderB();renderPC();save();
}
function gainE(id,exp){
  var c=G.chars[id];if(!c)return;
  if(c.lv>=LV_CAP){c.exp=0;c.en=Infinity;return;}
  c.exp+=exp;
  while(c.lv<LV_CAP&&c.exp>=c.en){
    c.exp-=c.en;c.lv++;c.en=expN(c.lv);
    var b=null;for(var i=0;i<G.dun.bp.length;i++){if(G.dun.bp[i].id===id){b=G.dun.bp[i];break;}}
    if(b){var st=cst(id);var pv=b.mhp;b.mhp=st.hp;b.hp=Math.min(b.mhp,b.hp+(b.mhp-pv));b.at=st.at;b.df=st.df;
      // dexの更新（バフ中でなければdexBaseも更新）
      var newDex=Math.floor(cdef(id).b.dex+cdef(id).gr.dex*(c.lv-1));
      b.dexBase=newDex;if(b.dexBufRem<=0)b.dex=newDex;
    }
    log('lv',c.nm+' Lv.'+c.lv+(c.lv>=LV_CAP?' [MAX]':'')+'!');
    var vc=g('vc');if(vc&&vc.classList.contains('active'))renderChars();
  }
  if(c.lv>=LV_CAP)c.exp=0;
}

function renderPC(){
  var sec=g('psec');if(!sec)return;
  sec.innerHTML='';
  var fLbl=mk('div','rlbl','前衛 ──');sec.appendChild(fLbl);
  var fRow=mk('div','prow');
  for(var i=0;i<3;i++){
    var pid=G.party[i];
    if(pid){
      fRow.appendChild(makePCard(pid,'f',i));
    } else {
      var sl=mk('div','pslot');
      sl.appendChild(mk('div','pslot-t',_selPartyIdx>=0?'▶ ここへ':'前衛\n空き'));
      (function(idx){sl.addEventListener('click',function(){onEmptySlotTap(idx);});})(i);
      fRow.appendChild(sl);
    }
  }
  sec.appendChild(fRow);
  var bLbl=mk('div','rlbl','後衛 ──');sec.appendChild(bLbl);
  var bRow=mk('div','prow');
  for(var i=0;i<3;i++){
    var bpid=G.party[3+i];
    if(bpid){
      bRow.appendChild(makePCard(bpid,'b',3+i));
    } else {
      var sl2=mk('div','pslot bk');
      sl2.appendChild(mk('div','pslot-t',_selPartyIdx>=0?'▶ ここへ':'後衛\n空き'));
      (function(idx){sl2.addEventListener('click',function(){onEmptySlotTap(3+idx);});})(i);
      bRow.appendChild(sl2);
    }
  }
  sec.appendChild(bRow);
}
function makePCard(id,row,partyIdx){
  var d=cdef(id);var c=G.chars[id];if(!d||!c)return mk('div','pc');
  var bp=null;for(var i=0;i<G.dun.bp.length;i++){if(G.dun.bp[i].id===id){bp=G.dun.bp[i];break;}}
  var mhp=bp?bp.mhp:cst(id).hp;var hp=bp?bp.hp:mhp;
  var pct=mhp>0?(hp/mhp*100):0;
  var hc=pct<25?'cr':pct<50?'lo':'';
  var dead=hp<=0;
  var isSel=(_selPartyIdx===partyIdx);
  var card=mk('div','pc'+(dead?' dead':'')+(row==='b'?' bk':'')+(isSel?' sel':''));
  card.appendChild(mk('div','pc-nm',c.nm));
  var qb=mk('button','pc-qb','?');
  (function(cid){qb.addEventListener('click',function(ev){ev.stopPropagation();openSK(cid);});})(id);
  card.appendChild(qb);
  card.appendChild(mk('div','pc-em',d.em));
  card.appendChild(mk('div','pc-ht',hp.toLocaleString()+'/'+mhp.toLocaleString()));
  var hw=mk('div','pc-hw');var hbar=mk('div','pc-hb '+hc);hbar.style.width=pct+'%';
  hw.appendChild(hbar);card.appendChild(hw);
  var ctEl=mk('div','pc-ct',(bp&&bp.skCd>0)?'CT:'+bp.skCd:'');card.appendChild(ctEl);
  if(dead)card.appendChild(mk('div','pc-do','X'));
  if(isSel)card.appendChild(mk('div','pc-rem-hint','✕ 再タップで外す'));
  // Tap to select/swap/remove
  (function(idx){card.addEventListener('click',function(){onPartyCardTap(idx);});})(partyIdx);
  return card;
}

function onEmptySlotTap(toIdx){
  if(G.dun.active){log('sy','探索中は編成を変更できません');return;}
  if(_selPartyIdx>=0){
    // 選択中のキャラをこのスロットへ移動
    var id=G.party[_selPartyIdx];
    G.party[_selPartyIdx]=null;
    // toIdx分まで配列を拡張
    while(G.party.length<=toIdx)G.party.push(null);
    G.party[toIdx]=id;
    _selPartyIdx=-1;
    // 末尾nullを除去
    while(G.party.length>0&&!G.party[G.party.length-1])G.party.pop();
    if(G.dun.active)initBP(false);
    renderPC();save();
  } else {
    openCharPicker(toIdx);
  }
}
function _trimPartyTrail(){
  while(G.party.length>0&&!G.party[G.party.length-1])G.party.pop();
}
function openCharPicker(toIdx){
  if(G.dun.active){log('sy','探索中は編成を変更できません');return;}
  var ovl=g('cpickOvl');if(!ovl)return;
  var list=g('cpickList');if(!list)return;
  list.innerHTML='';
  g('cpickTitle').textContent=(toIdx<3?'前衛':'後衛')+' スロット '+(toIdx%3+1)+' に配置';
  for(var ci=0;ci<CD.length;ci++){
    var d=CD[ci];var c=G.chars[d.id];
    if(!c.ul)continue;
    if(G.party.indexOf(d.id)>=0)continue;
    var row=mk('div','dr');
    row.appendChild(mk('div',null,d.em));
    var inf=mk('div','drd');
    var st=cst(d.id);
    inf.appendChild(mk('div','drnm',c.nm+' Lv.'+c.lv));
    inf.appendChild(mk('div','drsub','HP:'+st.hp+' ATK:'+st.at+' DEF:'+st.df));
    row.appendChild(inf);
    (function(cid,ti){row.addEventListener('click',function(){
      // 指定スロットへ直接配置。nullパッドして位置を確保
      while(G.party.length<=ti)G.party.push(null);
      G.party[ti]=cid;
      _trimPartyTrail();
      if(G.dun.active)initBP(false);
      var o=g('cpickOvl');if(o)o.classList.add('hidden');
      renderPC();save();
    });})(d.id,toIdx);
    list.appendChild(row);
  }
  ovl.classList.remove('hidden');
}
function onPartyCardTap(idx){
  if(G.dun.active){log('sy','探索中は編成を変更できません');return;}
  if(_selPartyIdx===-1){
    _selPartyIdx=idx;
    renderPC();
  } else if(_selPartyIdx===idx){
    // 選択済みを再タップ → パーティから外す
    G.party[idx]=null;
    _trimPartyTrail();
    _selPartyIdx=-1;
    if(G.dun.active)initBP(false);
    renderPC();save();
    log('sy','パーティから外した');
  } else {
    // 異なるスロット → スワップ
    var tmp=G.party[_selPartyIdx];
    G.party[_selPartyIdx]=G.party[idx];
    G.party[idx]=tmp;
    _trimPartyTrail();
    _selPartyIdx=-1;
    if(G.dun.active)initBP(false);
    renderPC();save();
  }
}

function bulkDiscard(minR,maxR){
  var before=G.inv.length;
  G.inv=G.inv.filter(function(it){
    if(it.locked)return true; // never discard locked
    var r=qi(it.plus,!!it.anc).r;
    return r<minR||r>maxR;
  });
  var removed=before-G.inv.length;
  log('sy',removed+'個を破棄した。');

}

// statキー表示名
var STAT_LABEL={atk:'ATK',def:'DEF',hp:'HP'};

// 装備アイテムの実効ステータスをオブジェクトで返す
function itemStats(it){
  if(!it)return{};
  var d=gid(it.id2);if(!d)return{};
  var r={};
  var ks=Object.keys(d.stats);
  for(var i=0;i<ks.length;i++)r[ks[i]]=cs(d.stats[ks[i]],it.plus,it.q);
  return r;
}

// diff表示用文字列を生成（▲up / ▼dn / → same）
function buildDiffEl(newSt, curSt){
  var allKeys={};
  var ks1=Object.keys(newSt);var ks2=Object.keys(curSt);
  for(var i=0;i<ks1.length;i++)allKeys[ks1[i]]=1;
  for(var i=0;i<ks2.length;i++)allKeys[ks2[i]]=1;
  var wrap=mk('div','ceq-diff');
  var keys=Object.keys(allKeys);
  for(var i=0;i<keys.length;i++){
    var k=keys[i];
    var nv=newSt[k]||0;var ov=curSt[k]||0;
    var diff=nv-ov;
    var lbl=STAT_LABEL[k]||k.toUpperCase();
    var el;
    if(diff>0){
      el=mk('span','sd-up','▲'+lbl+' +'+diff);
    } else if(diff<0){
      el=mk('span','sd-dn','▼'+lbl+' '+diff);
    } else {
      el=mk('span','sd-eq','→'+lbl+' '+nv);
    }
    wrap.appendChild(el);
  }
  return wrap;
}

  var matches=[];
  for(var i=0;i<G.inv.length;i++){
    var it=G.inv[i];var d=gid(it.id2);
    if(d&&d.t===slot)matches.push({it:it,d:d,i:i});
  }
  matches.sort(function(a,b){
    return (b.it.q*RARITY_MULT[b.it.plus])-(a.it.q*RARITY_MULT[a.it.plus]);
  });

  if(!matches.length){
    list.appendChild(mk('div','em2','該当装備なし'));
  }
  for(var mi=0;mi<matches.length;mi++){
    var m=matches[mi];
    var qi2=qi(m.it.plus,!!m.it.anc);
    var row=mk('div','dr');
    row.appendChild(mk('div',null,m.d.em));
    var inf=mk('div','drd');
    var ps=m.it.plus>0?' +'+m.it.plus:'';
    inf.appendChild(mk('div','drnm '+qi2.c,m.d.name+ps+'  ['+qi2.n+'] 品質'+m.it.q+'%'));

    // ステータス実値
    var newSt=itemStats(m.it);
    var stTxt=Object.keys(newSt).map(function(k){return (STAT_LABEL[k]||k.toUpperCase())+' '+newSt[k];}).join('  ');
    inf.appendChild(mk('div','drsub',stTxt));

    // diff表示（装備中がある場合のみ）
    if(cur){
      var curSt2=itemStats(cur);
      inf.appendChild(buildDiffEl(newSt,curSt2));
    } else {
      // 未装備→全部UP扱い
      var upWrap=mk('div','ceq-diff');
      var upKeys=Object.keys(newSt);
      for(var ui=0;ui<upKeys.length;ui++){
        var uk=upKeys[ui];
        upWrap.appendChild(mk('span','sd-up','▲'+(STAT_LABEL[uk]||uk.toUpperCase())+' +'+newSt[uk]));
      }
      inf.appendChild(upWrap);
    }

    row.appendChild(inf);
    if(m.it.locked){row.appendChild(mk('span',null,' 🔒'));}
    (function(it2,oi){row.addEventListener('click',function(){
      doEQ(_ceqCharId,_ceqSlot,it2,oi);
      var o=g('ceqOvl');if(o)o.classList.add('hidden');
      renderChars();
    });})(m.it,m.i);
    list.appendChild(row);
  }
  var o=g('ceqOvl');if(o)o.classList.remove('hidden');
}
// ── VIEW SWITCH ───────────────────────────────────────
function sv(v){
  var vs=['vb','vc','vi'];var ns=['nvb','nvc','nvi'];
  for(var i=0;i<vs.length;i++){
    var ve=g(vs[i]);var ne=g(ns[i]);
    if(vs[i]===v){if(ve)ve.classList.add('active');if(ne)ne.classList.add('active');}
    else{if(ve)ve.classList.remove('active');if(ne)ne.classList.remove('active');}
  }
  if(v==='vc')renderChars();
  if(v==='vi')renderInv();
  if(v==='vb')updLeaderPanel();
}

  });
