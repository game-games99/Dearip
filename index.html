<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DeaRip - v1.1</title>
    <style>
        :root { 
            --bg: #050505; 
            --panel: #121212; 
            --accent: #dcdcdc; 
            --danger: #ff3333; 
            --win: #ffffff; 
            --skill: #0077be; 
            --sp: #ffcc00; 
            --exp-bar: #555555;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); 
            color: var(--accent); 
            font-family: 'Hiragino Mincho ProN', 'serif'; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
            position: relative;
        }
        
        #game-container { 
            width: 100%; 
            max-width: 480px; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            background: var(--panel); 
            position: relative; 
        }
        
        #header { 
            padding: 8px 15px; 
            border-bottom: 1px solid #333; 
            background: #000; 
            flex-shrink: 0; 
        }
        .status-row { 
            display: flex; 
            justify-content: space-between; 
            font-size: 0.75rem; 
            color: #aaa; 
        }
        .bar-container { 
            width: 100%; 
            height: 5px; 
            background: #222; 
            margin: 4px 0; 
            border-radius: 2px; 
            overflow: hidden; 
        }
        .bar-fill { 
            height: 100%; 
            transition: width 0.3s; 
        }
        .hp-bar { background: #2a2; }
        .e-hp-bar { background: #b30000; }
        .exp-bar { background: var(--exp-bar); height: 3px; }
        
        #display { 
            padding: 20px 10px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            flex-shrink: 0; 
            min-height: 100px; 
        }
        #enemy-name { font-size: 0.95rem; margin-bottom: 8px; letter-spacing: 1px; }

        #tab-container { 
            flex-shrink: 0; 
            background: #0a0a0a; 
            border-top: 1px solid #222; 
            border-bottom: 1px solid #333; 
        }
        .tab-buttons { display: flex; border-bottom: 1px solid #222; }
        .tab-btn { 
            flex: 1; 
            padding: 12px; 
            background: #111; 
            border: none; 
            color: #555; 
            font-size: 0.75rem; 
            cursor: pointer; 
        }
        .tab-btn.active { 
            background: #1a1a1a; 
            color: var(--accent); 
            border-bottom: 2px solid var(--accent); 
        }
        .tab-content { 
            display: none; 
            padding: 12px; 
            height: 140px; 
            font-size: 0.75rem; 
            overflow-y: auto; 
        }
        .tab-content.active { display: block; }
        
        .growth-grid { display: flex; gap: 8px; margin-top: 10px; }
        .growth-btn { 
            flex: 1; 
            background: #222; 
            border: 1px solid #444; 
            color: #aaa; 
            padding: 10px 0; 
            font-size: 0.7rem; 
            border-radius: 3px; 
            cursor: pointer;
        }

        .equip-slot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid #222;
        }
        .equip-name { color: #ccc; flex: 1; margin-left: 10px; }
        .equip-val { color: #8af; font-size: 0.65rem; }

        #controls { 
            padding: 12px; 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            background: #0e0e0e; 
            border-bottom: 1px solid #333; 
            flex-shrink: 0; 
        }
        button.action-btn { 
            background: #1a1a1a; 
            color: #ccc; 
            border: 1px solid #444; 
            padding: 16px 5px; 
            cursor: pointer; 
            font-family: inherit; 
            border-radius: 4px; 
            font-size: 0.95rem; 
        }
        button.action-btn:disabled { opacity: 0.2; }
        .btn-skill { border-color: var(--skill) !important; color: #8af !important; }

        #log { 
            flex: 1; 
            overflow-y: auto; 
            font-size: 0.8rem; 
            padding: 12px; 
            background: #000; 
            color: #777; 
            line-height: 1.5; 
            border-top: 1px solid #222; 
        }
        .log-entry { margin-bottom: 5px; border-left: 2px solid #222; padding-left: 10px; }

        #version-tag {
            position: absolute;
            bottom: 5px;
            right: 10px;
            font-size: 0.6rem;
            color: #444;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="header">
        <div id="area-title" style="font-size: 0.65rem; color:#666; margin-bottom:2px;">---</div>
        <div class="status-row">
            <span id="p-lv">Lv.1</span>
            <span id="p-hp-text">HP: 100/100</span>
        </div>
        <div class="bar-container"><div id="p-hp-bar" class="bar-fill hp-bar"></div></div>
    </div>

    <div id="display">
        <div id="enemy-name">---</div>
        <div class="bar-container" style="width: 85%;"><div id="e-hp-bar" class="bar-fill e-hp-bar"></div></div>
    </div>

    <div id="tab-container">
        <div class="tab-buttons">
            <button class="tab-btn active" onclick="game.switchTab(0)">ステータス</button>
            <button class="tab-btn" onclick="game.switchTab(1)">装備</button>
            <button class="tab-btn" onclick="game.switchTab(2)">スキル</button>
        </div>
        
        <div id="tab-status" class="tab-content active">
            <div style="display:flex; justify-content:space-between; margin-bottom:2px;">
                <span>Soul Point: <span id="p-sp" style="color:var(--sp)">0</span></span>
                <span id="p-exp-text" style="color:#666; font-size:0.65rem;">exp: 0 / 100</span>
            </div>
            <div class="bar-container" style="height:3px; margin-bottom:8px;"><div id="p-exp-bar" class="bar-fill exp-bar"></div></div>
            
            <div id="stat-list" style="margin: 8px 0; line-height: 1.6;"></div>
            
            <div class="growth-grid">
                <button class="growth-btn" onclick="game.grow('atk')">力(ATK)+</button>
                <button class="growth-btn" onclick="game.grow('hp')">器(HP)+</button>
                <button class="growth-btn" onclick="game.grow('spd')">迅(SPD)+</button>
            </div>
        </div>

        <div id="tab-equip" class="tab-content">
            <div class="equip-slot"><span>頭</span><span id="eq-head-n" class="equip-name">未装着</span><span id="eq-head-v" class="equip-val"></span></div>
            <div class="equip-slot"><span>体</span><span id="eq-body-n" class="equip-name">未装着</span><span id="eq-body-v" class="equip-val"></span></div>
            <div class="equip-slot"><span>腕</span><span id="eq-arm-n" class="equip-name">未装着</span><span id="eq-arm-v" class="equip-val"></span></div>
            <div class="equip-slot"><span>脚</span><span id="eq-leg-n" class="equip-name">未装着</span><span id="eq-leg-v" class="equip-val"></span></div>
        </div>

        <div id="tab-skill" class="tab-content">
            <div id="skill-desc" style="color:#8af; font-size: 0.7rem; line-height: 1.4;">
                腕パーツを適合させると技が解放されます。
            </div>
        </div>
    </div>

    <div id="controls">
        <button id="btn-main" class="action-btn" onclick="game.handleMainBtn()">こうげき</button>
        <button id="btn-skill" class="action-btn btn-skill" onclick="game.battle('skill')" disabled>技：---</button>
    </div>

    <div id="log"></div>
    <div id="version-tag"></div>
</div>

<script>
class DeaRip {
    constructor() {
        this.VERSION = "1.1";
        this.SAVE_KEY = "DEARIP_SAVE_DATA_V1_1";
        
        this.jobs = [
            {n:"村人", p:"素朴な", s:{h:1.0, a:1.0}}, {n:"兵士", p:"軍属の", s:{h:1.2, a:1.1}}, {n:"騎士", p:"高潔な", s:{h:1.5, a:1.3}}, {n:"魔導師", p:"叡智の", s:{h:0.8, a:1.8}}, {n:"暗殺者", p:"潜伏者の", s:{h:0.7, a:2.0}},
            {n:"狂戦士", p:"獣性の", s:{h:2.0, a:2.2}}, {n:"守護者", p:"鉄壁の", s:{h:2.5, a:0.9}}, {n:"司祭", p:"祈念の", s:{h:1.1, a:1.2}}, {n:"狩人", p:"追跡の", s:{h:1.0, a:1.4}}, {n:"格闘家", p:"剛腕の", s:{h:1.4, a:1.5}},
            {n:"盗賊", p:"強奪の", s:{h:0.9, a:1.2}}, {n:"薬師", p:"調合の", s:{h:1.1, a:0.8}}, {n:"剣豪", p:"一閃の", s:{h:1.3, a:1.9}}, {n:"弓兵", p:"必中の", s:{h:1.0, a:1.6}}, {n:"盾使い", p:"金剛の", s:{h:2.2, a:1.0}},
            {n:"吟遊詩人", p:"共鳴の", s:{h:1.0, a:1.1}}, {n:"賢者", p:"万物の", s:{h:1.2, a:1.7}}, {n:"死霊使い", p:"墓守の", s:{h:1.1, a:1.5}}, {n:"竜騎士", p:"飛竜の", s:{h:1.6, a:1.8}}, {n:"忍者", p:"影の", s:{h:0.8, a:2.1}},
            {n:"僧侶", p:"慈愛の", s:{h:1.3, a:0.9}}, {n:"修道士", p:"求道の", s:{h:1.5, a:1.4}}, {n:"侍", p:"武士道の", s:{h:1.4, a:1.7}}, {n:"錬金術師", p:"変転の", s:{h:1.1, a:1.3}}, {n:"踊り子", p:"演舞の", s:{h:0.9, a:1.4}},
            {n:"海賊", p:"略奪の", s:{h:1.5, a:1.5}}, {n:"呪術師", p:"禁忌の", s:{h:0.9, a:1.8}}, {n:"機工士", p:"鋼鉄の", s:{h:1.4, a:1.6}}, {n:"聖騎士", p:"守護聖の", s:{h:1.8, a:1.4}}, {n:"道化師", p:"幻惑の", s:{h:1.0, a:1.3}},
            {n:"破戒僧", p:"背徳の", s:{h:1.6, a:1.6}}, {n:"探検家", p:"未踏の", s:{h:1.2, a:1.2}}, {n:"貴族", p:"権威の", s:{h:1.3, a:1.1}}, {n:"隠者", p:"孤独の", s:{h:1.1, a:1.4}}, {n:"道士", p:"陰陽の", s:{h:1.2, a:1.6}},
            {n:"銃士", p:"轟音の", s:{h:1.1, a:1.7}}, {n:"狙撃手", p:"静寂の", s:{h:1.0, a:1.9}}, {n:"槍兵", p:"穿孔の", s:{h:1.3, a:1.5}}, {n:"農夫", p:"開拓の", s:{h:1.4, a:0.9}}, {n:"山賊", p:"荒野の", s:{h:1.5, a:1.4}},
            {n:"審問官", p:"断罪の", s:{h:1.3, a:1.6}}, {n:"踊り子", p:"情熱の", s:{h:1.0, a:1.3}}, {n:"呪われし者", p:"亡執の", s:{h:1.7, a:1.7}}, {n:"異端者", p:"虚無の", s:{h:1.1, a:1.9}}, {n:"大師", p:"真理の", s:{h:1.4, a:1.8}},
            {n:"傭兵", p:"血塗られた", s:{h:1.5, a:1.6}}, {n:"狂人", p:"混沌の", s:{h:1.2, a:2.3}}, {n:"王", p:"覇道の", s:{h:2.0, a:2.0}}, {n:"職人", p:"精巧な", s:{h:1.2, a:1.2}}, {n:"無職", p:"名もなき", s:{h:1.0, a:1.0}}
        ];

        this.ranks = [{n:"ただの", m:1.0}, {n:"生きたかった", m:1.3}, {n:"狂気に染まる", m:1.8}, {n:"支配された", m:2.5}];
        this.areaNames = ["嘆きの", "静寂の", "狂乱の", "歪な", "見捨てられた"];
        this.areaTypes = ["村", "街", "砦", "城"];

        this.enemy = null;
        this.busy = false;
        this.state = "battle"; 

        this.load();
        if(!this.seed) this.generateSeed();
        this.spawn();
    }

    save() {
        const data = { p: this.p, seed: this.seed, floor: this.floor };
        localStorage.setItem(this.SAVE_KEY, JSON.stringify(data));
    }

    load() {
        const saved = localStorage.getItem(this.SAVE_KEY);
        if(saved) {
            this.p = JSON.parse(saved).p;
            this.seed = JSON.parse(saved).seed;
            this.floor = JSON.parse(saved).floor;
        } else {
            this.p = {
                lv: 1, exp: 0, next: 100, sp: 0,
                baseHp: 100, baseAtk: 15, baseDef: 5, baseSpd: 10,
                hp: 100, plusAtk: 0, plusHp: 0, plusSpd: 0,
                eq: { 
                    head: { name: "忘却のボロ布", def: 2 },
                    body: { name: "忘却の骸殻", hp: 30 },
                    arm: { name: "忘却の錆びた腕", atk: 3, skill: "微かな火花" },
                    leg: { name: "忘却の足枷", spd: 2 }
                }
            };
            this.seed = null; 
            this.floor = 1;
        }
    }

    generateSeed() {
        const name = this.areaNames[Math.floor(Math.random()*this.areaNames.length)] + 
                     this.areaTypes[Math.floor(Math.random()*this.areaTypes.length)];
        this.seed = { name: name, diff: 1.0 + (Math.random() * 0.4) };
    }

    get stats() {
        let s = { 
            hp: this.p.baseHp + this.p.plusHp, 
            atk: this.p.baseAtk + this.p.plusAtk, 
            def: this.p.baseDef, 
            spd: this.p.baseSpd + this.p.plusSpd 
        };
        let eqBonus = { hp: 0, atk: 0, def: 0, spd: 0 };
        for(let slot in this.p.eq) {
            const item = this.p.eq[slot];
            if(item) {
                eqBonus.hp += (item.hp || 0); eqBonus.atk += (item.atk || 0);
                eqBonus.def += (item.def || 0); eqBonus.spd += (item.spd || 0);
            }
        }
        return { total: { hp: s.hp + eqBonus.hp, atk: s.atk + eqBonus.atk, def: s.def + eqBonus.def, spd: s.spd + eqBonus.spd }, base: s, bonus: eqBonus };
    }

    spawn() {
        const isBoss = this.floor % 30 === 0;
        if(isBoss) {
            this.enemy = {
                name: `${this.seed.name}主：崩御せし異形`,
                hp: Math.floor(800 * this.seed.diff), maxHp: Math.floor(800 * this.seed.diff),
                atk: Math.floor(45 * this.seed.diff), isBoss: true,
                jobRef: { p: "崩御せし", s: { h: 1.2, a: 1.2 } }
            };
            this.log(`<span style="color:#f44;">【警告】領域の主を感知。</span>`);
        } else {
            const job = this.jobs[Math.floor(Math.random()*this.jobs.length)];
            const rank = this.ranks[Math.floor(Math.random()*Math.min(this.ranks.length, Math.ceil(this.floor/8)))];
            const scale = 1 + (this.floor * 0.12) * this.seed.diff;
            this.enemy = {
                name: `${rank.n}${job.n}`,
                hp: Math.floor(50 * rank.m * job.s.h * scale), maxHp: Math.floor(50 * rank.m * job.s.h * scale),
                atk: Math.floor(10 * rank.m * job.s.a * scale), isBoss: false, jobRef: job
            };
        }
        this.state = "battle";
        this.updateUI();
    }

    grow(type) {
        if(this.p.sp <= 0) return;
        this.p.sp--;
        if(type === 'atk') this.p.plusAtk += 3;
        if(type === 'hp') { this.p.plusHp += 15; this.p.hp += 15; }
        if(type === 'spd') this.p.plusSpd += 2;
        this.save(); this.updateUI();
    }

    switchTab(index) {
        document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === index));
        document.querySelectorAll('.tab-content').forEach((c, i) => c.classList.toggle('active', i === index));
    }

    handleMainBtn() {
        if(this.state === "battle") this.battle('atk');
        else if(this.state === "win") this.nextFloor();
    }

    async battle(mode) {
        if(this.busy) return;
        this.busy = true;
        const s = this.stats.total;
        
        let dmgValue = s.atk + Math.floor(Math.random()*5);
        if(mode === 'skill' && this.p.eq.arm) {
            dmgValue = Math.floor(dmgValue * 2.5);
            this.log(`<span style="color:var(--skill);">『${this.p.eq.arm.skill}』</span>`);
        }
        this.enemy.hp -= dmgValue;
        this.log(`${this.enemy.name} に ${dmgValue} ダメージ`);

        if(this.enemy.hp <= 0) { 
            await this.win(); 
        } else {
            await new Promise(r => setTimeout(r, 400));
            const eDmg = Math.max(1, this.enemy.atk - Math.floor(s.def/2));
            this.p.hp -= eDmg;
            this.log(`<span style="color:var(--danger);">${this.enemy.name} から ${eDmg} ダメージ</span>`);
            if(this.p.hp <= 0) { this.p.hp = 0; this.gameOver(); }
        }
        this.updateUI(); this.busy = false; this.save();
    }

    async win() {
        this.enemy.hp = 0;
        const exp = (this.enemy.isBoss ? 1000 : 30 + (this.floor * 5));
        this.log(`${exp} exp 獲得`);
        this.state = "win";
        this.p.exp += exp;
        if(this.p.exp >= this.p.next) this.levelUp();
        if(this.enemy.isBoss) { this.dropPart(); this.generateSeed(); } 
    }

    levelUp() {
        this.p.lv++; this.p.exp -= this.p.next;
        this.p.next = Math.floor(this.p.next * 1.6);
        this.p.sp += 2; this.p.hp = this.stats.total.hp;
        this.log(`Level Up`);
    }

    dropPart() {
        const slots = ["head", "body", "arm", "leg"];
        const s = slots[Math.floor(Math.random()*slots.length)];
        const suffix = {head:"の思考回路", body:"の防護殻", arm:"の執行腕", leg:"の加速脚"};
        const skills = ["絶命の一撃", "魂の解放", "無の咆哮", "因果の逆転"];
        const part = { name: this.enemy.jobRef.p + suffix[s] };
        const mult = this.enemy.jobRef.s;
        if(s === 'head') part.def = Math.floor(15 * mult.h);
        if(s === 'body') part.hp = Math.floor(150 * mult.h);
        if(s === 'arm') { 
            part.atk = Math.floor(20 * mult.a); 
            part.skill = skills[Math.floor(Math.random()*skills.length)]; 
        }
        if(s === 'leg') part.spd = Math.floor(15 * mult.a);
        this.p.eq[s] = part;
        this.log(`適合完了：${part.name}`);
    }

    nextFloor() {
        this.floor++; this.spawn(); this.save();
    }

    gameOver() {
        this.log(`<span style="color:var(--danger);">意識が消失。1層へ回帰。</span>`);
        this.floor = 1; this.p.hp = this.stats.total.hp;
        this.spawn(); this.save();
    }

    log(m) {
        const l = document.getElementById('log');
        l.innerHTML = `<div class="log-entry">> ${m}</div>` + l.innerHTML;
        if(l.children.length > 50) l.removeChild(l.lastChild);
    }

    updateUI() {
        const s = this.stats;
        document.getElementById('area-title').innerText = `${this.seed.name} (${this.floor}層)`;
        document.getElementById('p-lv').innerText = `Lv.${this.p.lv}`;
        document.getElementById('p-hp-text').innerText = `HP: ${Math.max(0,this.p.hp)}/${s.total.hp}`;
        document.getElementById('p-hp-bar').style.width = `${(this.p.hp/s.total.hp)*100}%`;
        
        document.getElementById('p-exp-text').innerText = `exp: ${this.p.exp} / ${this.p.next}`;
        document.getElementById('p-exp-bar').style.width = `${(this.p.exp/this.p.next)*100}%`;
        document.getElementById('p-sp').innerText = this.p.sp;
        
        document.getElementById('stat-list').innerHTML = `
            <div>攻撃力: ${s.total.atk} <span style="color:#555; font-size:0.6rem;">(素:${s.base.atk} + 装備:${s.bonus.atk})</span></div>
            <div>防御力: ${s.total.def} <span style="color:#555; font-size:0.6rem;">(素:${s.base.def} + 装備:${s.bonus.def})</span></div>
            <div>俊敏性: ${s.total.spd} <span style="color:#555; font-size:0.6rem;">(素:${s.base.spd} + 装備:${s.bonus.spd})</span></div>
        `;

        document.getElementById('enemy-name').innerText = this.enemy ? this.enemy.name : "---";
        document.getElementById('e-hp-bar').style.width = this.enemy ? `${(this.enemy.hp/this.enemy.maxHp)*100}%` : "0%";
        
        const slots = ["head", "body", "arm", "leg"];
        slots.forEach(slot => {
            const item = this.p.eq[slot];
            const nameEl = document.getElementById(`eq-${slot}-n`);
            const valEl = document.getElementById(`eq-${slot}-v`);
            if(item) {
                nameEl.innerText = item.name;
                let bonusTxt = "";
                if(item.hp) bonusTxt += `HP+${item.hp} `;
                if(item.atk) bonusTxt += `ATK+${item.atk} `;
                if(item.def) bonusTxt += `DEF+${item.def} `;
                if(item.spd) bonusTxt += `SPD+${item.spd} `;
                valEl.innerText = bonusTxt;
            } else {
                nameEl.innerText = "未装着";
                valEl.innerText = "";
            }
        });

        const sk = this.p.eq.arm ? this.p.eq.arm.skill : "---";
        document.getElementById('btn-skill').innerText = `技：${sk}`;
        document.getElementById('btn-skill').disabled = (sk === "---" || this.busy || this.state === "win");
        document.getElementById('btn-main').innerText = (this.state === "battle") ? "こうげき" : "深層へ";
        document.getElementById('skill-desc').innerText = this.p.eq.arm ? `適合中の腕パーツにより『${sk}』が発動可能です。` : "腕パーツを適合させると技が解放されます。";
        
        document.getElementById('version-tag').innerText = `DeaRip v${this.VERSION}`;
    }
}
const game = new DeaRip();
</script>
