<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Dearip v1.4.0</title>
    <style>
        :root { --bg: #050505; --card: #121212; --text: #d0d0d0; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 10px; }
        .card { background: var(--card); border: 1px solid #333; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        .btn-main { width: 100%; padding: 15px; background: #ff3e3e; color: white; border: none; font-weight: bold; cursor: pointer; }
        #log { height: 150px; overflow-y: auto; background: #000; padding: 10px; font-size: 0.8rem; border: 1px solid #333; }
    </style>
</head>
<body>
    <div class="card">
        HP: <span id="hp">100</span> | SEED: <span id="seed">10</span>
    </div>
    
    <div id="battle-area" class="card">
        <h3 id="dungeon-name">未侵攻</h3>
        <div id="log"></div>
        <button class="btn-main" onclick="handleAction()">侵攻 / 攻撃</button>
    </div>

    <script>
        const RANKS = [
            { name: "", color: "#ffffff", mult: 1.0 },
            { name: "熟練の", color: "#00ff41", mult: 1.5 },
            { name: "覚醒した", color: "#007fff", mult: 2.5 },
            { name: "神の", color: "#ffd700", mult: 5.0 }
        ];
        const ADJ = ["俊敏な", "暗黒の", "狂気の", "老練な", "神速の", "不滅の"];
        const JOB = ["騎士", "村人", "神官", "弓兵", "魔導師", "暗殺者", "英雄", "狂戦士"];
        const PRE = ["混沌の", "寂れた", "天空の", "禁断の", "忘れ去られた", "要塞化された"];
        const LOC = ["村", "街", "城", "砦", "神殿", "学園", "領域", "浮遊城"];

        let G = {
            player: { hp: 100, atk: 15, seed: 20 },
            dungeon: { active: false, name: "", floor: 1, enemy: null }
        };

        function generateDungeon() {
            G.dungeon = { 
                active: true, 
                name: PRE[Math.floor(Math.random()*PRE.length)] + LOC[Math.floor(Math.random()*LOC.length)], 
                floor: 1, 
                enemy: null 
            };
            document.getElementById('dungeon-name').innerText = G.dungeon.name;
            log(`『${G.dungeon.name}』へ侵攻を開始した。`);
        }

        function handleAction() {
            if (!G.dungeon.active) return generateDungeon();
            if (!G.dungeon.enemy) {
                const r = RANKS[Math.floor(Math.random()*RANKS.length)];
                const a = ADJ[Math.floor(Math.random()*ADJ.length)];
                const j = JOB[Math.floor(Math.random()*JOB.length)];
                G.dungeon.enemy = { 
                    name: `${r.name}${a}${j}`, 
                    color: r.color, 
                    hp: Math.floor(100 * r.mult) 
                };
                log(`敵：<span style="color:${G.dungeon.enemy.color}">${G.dungeon.enemy.name}</span> が現れた！`);
            } else {
                G.dungeon.enemy.hp -= G.player.atk;
                log(`${G.dungeon.enemy.name} にダメージ！ HP:${G.dungeon.enemy.hp}`);
                if (G.dungeon.enemy.hp <= 0) {
                    log("撃破。");
                    G.dungeon.enemy = null;
                    if (++G.dungeon.floor > 30) { G.dungeon.active = false; log("制覇完了。"); }
                }
            }
        }

        function log(m) { const l = document.getElementById('log'); l.innerHTML += `<div>> ${m}</div>`; l.scrollTop = l.scrollHeight; }
    </script>
</body>
</html>
