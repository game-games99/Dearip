<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DeaRip - v0.32 (Tabbed UI)</title>
    <style>
        :root { --bg: #050505; --panel: #121212; --accent: #dcdcdc; --danger: #b30000; --win: #ffffff; --skill: #0077be; --sp: #ffcc00; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--accent); font-family: 'Hiragino Mincho ProN', 'serif'; margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        
        #game-container { width: 100%; max-width: 480px; height: 100%; display: flex; flex-direction: column; background: var(--panel); position: relative; }
        
        /* ヘッダー：さらに薄く */
        #header { padding: 8px 15px; border-bottom: 1px solid #333; background: #000; flex-shrink: 0; }
        .status-row { display: flex; justify-content: space-between; font-size: 0.7rem; color: #888; }
        .hp-bar-container { width: 100%; height: 5px; background: #222; margin: 4px 0; border-radius: 2px; overflow: hidden; }
        .hp-bar { height: 100%; background: #2a2; transition: width 0.3s; }
        .e-hp-bar { background: var(--danger); }
        
        /* 敵表示エリア：さらにコンパクトに */
        #display { padding: 5px; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; min-height: 90px; }
        #enemy-name { font-size: 0.9rem; margin-bottom: 2px; }
        #enemy-sprite { font-size: 1rem; color: #888; margin: 2px 0; }

        /* タブシステム：ここが今回の肝 */
        #tab-container { flex-shrink: 0; background: #0a0a0a; border-top: 1px solid #222; border-bottom: 1px solid #222; }
        .tab-buttons { display: flex; border-bottom: 1px solid #222; }
        .tab-btn { flex: 1; padding: 8px; background: #111; border: none; color: #555; font-size: 0.7rem; cursor: pointer; border-right: 1px solid #222; }
        .tab-btn.active { background: #1a1a1a; color: var(--accent); border-bottom: 2px solid var(--accent); }
        .tab-content { display: none; padding: 8px; height: 80px; overflow-y: auto; font-size: 0.7rem; }
        .tab-content.active { display: block; }

        /* ステ振りボタン */
        .growth-grid { display: flex; gap: 4px; align-items: center; }
        .growth-btn { flex: 1; background: #1a1a1a; border: 1px solid #333; color: #888; padding: 10px 2px; font-size: 0.65rem; border-radius: 3px; }

        /* ログ：メイン操作のために高さを確保しつつスクロール */
        #log { flex: 1; overflow-y: auto; font-size: 0.75rem; padding: 8px; background: #000; color: #555; line-height: 1.2; }
        
        /* 操作系：画面下部にボタンをまとめ、押しやすく */
        #controls { padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: #080808; border-top: 1px solid #333; flex-shrink: 0; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
        
        button { background: #1a1a1a; color: #ccc; border: 1px solid #333; padding: 16px 5px; cursor: pointer; transition: 0.2s; font-family: inherit; border-radius: 4px; font-size: 0.9rem; }
        button:hover:not(:disabled) { background: #2a2a2a; color: #fff; }
        button:disabled { opacity: 0.1; }
        .btn-skill { border-color: var(--skill); color: #8af; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="header">
        <div id="area-title" style="font-size: 0.65rem; color:#555;">---</div>
        <div class="status-row">
            <span id="p-lv">Soul Lv.1</span>
            <span id="p-hp-text">HP: 100/100</span>
        </div>
        <div class="hp-bar-container"><div id="p-hp-bar" class="hp-bar"></div></div>
        <div style="display:flex; justify-content: space-between; font-size: 0.6rem; color: #444;">
            <span id="p-stats">A:15 / D:5 / S:10</span>
            <span id="p-exp">Next: 100 exp</span>
        </div>
    </div>

    <div id="display">
        <div id="enemy-name">---</div>
        <div id="enemy-sprite">【 彷 徨 う 魂 】</div>
        <div class="hp-bar-container" style="width: 80%;"><div id="e-hp-bar" class="hp-bar e-hp-bar"></div></div>
    </div>

    <div id="tab-container">
        <div class="tab-buttons">
            <button class="tab-btn active" onclick="game.switchTab(0)">ステータス</button>
            <button class="tab-btn" onclick="game.switchTab(1)">装備</button>
            <button class="tab-btn" onclick="game.switchTab(2)">スキル</button>
        </div>
        <div id="tab-growth" class="tab-content active">
            <div style="margin-bottom:5px;">Soul Point: <span id="p-sp" class="sp-text">0</span></div>
            <div class="growth-grid">
                <button class="growth-btn" onclick="game.grow('atk')">力(ATK)+</button>
                <button class="growth-btn" onclick="game.grow('hp')">器(HP)+</button>
                <button class="growth-btn" onclick="game.grow('spd')">迅(SPD)+</button>
            </div>
        </div>
        <div id="tab-equip" class="tab-content">
            <div id="eq-head">頭: ---</div>
            <div id="eq-arm">腕: ---</div>
            <div id="eq-body">体: ---</div>
            <div id="eq-leg">脚: ---</div>
        </div>
        <div id="tab-skill" class="tab-content">
            <div id="skill-desc" style="color:#8af;">腕パーツを装備すると、固有スキルが解放されます。</div>
        </div>
    </div>

    <div id="log"></div>

    <div id="controls">
        <button id="btn-attack" onclick="game.battle('atk')">解放（通常）</button>
        <button id="btn-skill" class="btn-skill" onclick="game.battle('skill')" disabled>スキル：---</button>
        <button id="btn-next" onclick="game.nextFloor()" style="display:none; grid-column: span 2;">深部（次層）へ</button>
        <button id="btn-restart" onclick="game.reset()" style="display:none; grid-column: span 2;">再構築する</button>
    </div>
</div>

<script>
class DeaRip {
    constructor() {
        this.SAVE_KEY = "DEARIP_SAVE_DATA_V032";
        this.load();
        
        this.jobs = ["村人", "兵士", "騎士", "魔導師", "商人", "貴族"];
        this.ranks = [{n:"ただの", m:1.0}, {n:"生きたかった", m:1.3}, {n:"狂気に染まる", m:1.8}, {n:"支配された", m:2.5}];
        this.areaNames = ["嘆きの", "静寂の", "狂乱の", "歪な", "見捨てられた"];
        this.areaTypes = ["村", "街", "砦", "城"];

        this.enemy = null;
        this.busy = false;

        if(!this.seed) this.generateSeed();
        this.spawn();
    }

    // --- タブ切り替え ---
    switchTab(index) {
        const btns = document.querySelectorAll('.tab-btn');
        const contents = document.querySelectorAll('.tab-content');
        btns.forEach((b, i) => b.classList.toggle('active', i === index));
        contents.forEach((c, i) => c.classList.toggle('active', i === index));
    }

    save() {
        const data = { p: this.p, seed: this.seed, floor: this.floor };
        localStorage.setItem(this.SAVE_KEY, JSON.stringify(data));
    }

    load() {
        const saved = localStorage.getItem(this.SAVE_KEY);
        if(saved) {
            const d = JSON.parse(saved);
            this.p = d.p; this.seed = d.seed; this.floor = d.floor;
        } else {
            this.p = {
                lv: 1, exp: 0, next: 100, sp: 0,
                baseHp: 100, baseAtk: 15, baseDef: 5, baseSpd: 10,
                hp: 100, plusAtk: 0, plusHp: 0, plusSpd: 0,
                eq: { head: null, arm: null, body: null, leg: null }
            };
            this.seed = null; this.floor = 1;
        }
    }

    reset() { localStorage.removeItem(this.SAVE_KEY); location.reload(); }

    generateSeed() {
        const name = this.areaNames[Math.floor(Math.random()*this.areaNames.length)] + 
                     this.areaTypes[Math.floor(Math.random()*this.areaTypes.length)];
        this.seed = { name: name, diff: 1.0 + (Math.random() * 0.4) };
    }

    get stats() {
        let s = { hp: this.p.baseHp + this.p.plusHp, atk: this.p.baseAtk + this.p.plusAtk, def: this.p.baseDef, spd: this.p.baseSpd + this.p.plusSpd };
        for(let k in this.p.eq) if(this.p.eq[k]) {
            s.hp += (this.p.eq[k].hp || 0); s.atk += (this.p.eq[k].atk || 0);
            s.def += (this.p.eq[k].def || 0); s.spd += (this.p.eq[k].spd || 0);
        }
        return s;
    }

    spawn() {
        const isBoss = this.floor % 30 === 0;
        if(isBoss) {
            this.enemy = {
                name: `${this.seed.name}主：崩御せし異形`,
                hp: Math.floor(800 * this.seed.diff), maxHp: Math.floor(800 * this.seed.diff),
                atk: Math.floor(45 * this.seed.diff), isBoss: true
            };
            this.log(`<span style="color:#f44;">【警告】強大な異形を感知。</span>`);
        } else {
            const job = this.jobs[Math.floor(Math.random()*this.jobs.length)];
            const rank = this.ranks[Math.floor(Math.random()*Math.min(this.ranks.length, Math.ceil(this.floor/8)))];
            const scale = 1 + (this.floor * 0.12) * this.seed.diff;
            this.enemy = {
                name: `${rank.n}${job}`,
                hp: Math.floor(50 * rank.m * scale), maxHp: Math.floor(50 * rank.m * scale),
                atk: Math.floor(10 * rank.m * scale), isBoss: false
            };
        }
        this.updateUI();
    }

    grow(type) {
        if(this.p.sp <= 0) return;
        this.p.sp--;
        if(type === 'atk') this.p.plusAtk += 3;
        if(type === 'hp') { this.p.plusHp += 15; this.p.hp += 15; }
        if(type === 'spd') this.p.plusSpd += 2;
        this.log(`<span style="color:var(--sp);">Soul強化完了。</span>`);
        this.save(); this.updateUI();
    }

    async battle(mode) {
        if(this.busy) return;
        this.busy = true;
        const s = this.stats;
        let dmg = s.atk + Math.floor(Math.random()*5);
        if(mode === 'skill' && this.p.eq.arm) {
            dmg = Math.floor(dmg * 2.5);
            this.log(`<span style="color:var(--skill);">『${this.p.eq.arm.skill}』発動。</span>`);
        }
        this.enemy.hp -= dmg;
        this.log(`${this.enemy.name} を剥ぐ：${dmg} dmg`);

        if(this.enemy.hp <= 0) { await this.win(); } else {
            await new Promise(r => setTimeout(r, 400));
            const eDmg = Math.max(1, this.enemy.atk - Math.floor(s.def/2));
            this.p.hp -= eDmg;
            this.log(`${this.enemy.name} の拒絶：${eDmg} dmg`);
            if(this.p.hp <= 0) this.gameOver();
        }
        this.updateUI(); this.busy = false; this.save();
    }

    async win() {
        this.enemy.hp = 0;
        this.log(`<span style="color:var(--win);">${this.enemy.name} を救済。 R.I.P.</span>`);
        document.getElementById('btn-attack').disabled = true;
        document.getElementById('btn-skill').disabled = true;
        const exp = this.enemy.isBoss ? 1000 : 30 + (this.floor * 5);
        this.p.exp += exp;
        if(this.p.exp >= this.p.next) this.levelUp();
        if(this.enemy.isBoss) { this.dropPart(); this.generateSeed(); }
        setTimeout(() => { document.getElementById('btn-next').style.display = 'block'; }, 600);
    }

    levelUp() {
        this.p.lv++; this.p.exp -= this.p.next;
        this.p.next = Math.floor(this.p.next * 1.6);
        this.p.sp += 2; this.p.hp = this.stats.hp;
        this.log(`<span style="color:#0f0;">Level Up. 魂が純化した。</span>`);
    }

    dropPart() {
        const slots = ["head", "arm", "body", "leg"];
        const s = slots[Math.floor(Math.random()*slots.length)];
        const names = {head:"の思考回路", arm:"の執行腕", body:"の防護殻", leg:"の加速脚"};
        const skills = ["重圧破断", "魂の連撃", "虚空斬り", "絶命の閃き"];
        const part = { name: this.enemy.name.split('：')[0] + names[s] };
        if(s === 'head') part.def = 15;
        if(s === 'arm') { part.atk = 20; part.skill = skills[Math.floor(Math.random()*skills.length)]; }
        if(s === 'body') part.hp = 150;
        if(s === 'leg') part.spd = 15;
        this.p.eq[s] = part;
        this.log(`<span style="color:gold;">パーツ獲得：${part.name}</span>`);
    }

    nextFloor() {
        this.floor++; this.spawn();
        document.getElementById('btn-next').style.display = 'none';
        document.getElementById('btn-attack').disabled = false;
        this.save();
    }

    gameOver() {
        this.log(`<span style="color:red;">【警告】意識が消失。</span>`);
        document.getElementById('btn-attack').disabled = true;
        document.getElementById('btn-restart').style.display = 'block';
    }

    log(m) {
        const l = document.getElementById('log');
        l.innerHTML = `<div>> ${m}</div>` + l.innerHTML;
    }

    updateUI() {
        const s = this.stats;
        document.getElementById('area-title').innerText = `${this.seed.name} (${this.floor}層)`;
        document.getElementById('p-lv').innerText = `Soul Lv.${this.p.lv}`;
        document.getElementById('p-hp-text').innerText = `HP: ${Math.max(0,this.p.hp)}/${s.hp}`;
        document.getElementById('p-hp-bar').style.width = `${(this.p.hp/s.hp)*100}%`;
        document.getElementById('p-exp').innerText = `Next: ${this.p.next - this.p.exp} exp`;
        document.getElementById('p-stats').innerText = `A:${s.atk} / D:${s.def} / S:${s.spd}`;
        document.getElementById('p-sp').innerText = this.p.sp;
        document.getElementById('enemy-name').innerText = this.enemy ? this.enemy.name : "---";
        document.getElementById('e-hp-bar').style.width = this.enemy ? `${(this.enemy.hp/this.enemy.maxHp)*100}%` : "0%";
        
        // 装備タブの更新
        document.getElementById('eq-head').innerText = `頭: ${this.p.eq.head ? this.p.eq.head.name : '---'}`;
        document.getElementById('eq-arm').innerText = `腕: ${this.p.eq.arm ? this.p.eq.arm.name : '---'}`;
        document.getElementById('eq-body').innerText = `体: ${this.p.eq.body ? this.p.eq.body.name : '---'}`;
        document.getElementById('eq-leg').innerText = `脚: ${this.p.eq.leg ? this.p.eq.leg.name : '---'}`;

        const sk = this.p.eq.arm ? this.p.eq.arm.skill : "---";
        document.getElementById('btn-skill').innerText = `技：${sk}`;
        document.getElementById('btn-skill').disabled = (sk === "---" || this.busy || this.enemy.hp <= 0);
        document.getElementById('skill-desc').innerText = this.p.eq.arm ? `発動可能スキル：『${sk}』\n(通常の2.5倍の威力を放ちます)` : "腕パーツを装備すると、固有スキルが解放されます。";
    }
}

const game = new DeaRip();
</script>
</body>
</html>
