<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>NECRAI - Necromancer RPG</title>
    <style>
        body { background: #1a1a1a; color: #eee; font-family: sans-serif; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .card { border: 1px solid #444; padding: 15px; margin-bottom: 10px; background: #2a2a2a; }
        button { cursor: pointer; padding: 10px; margin: 5px; background: #550000; color: white; border: none; }
        .inventory-list { display: grid; grid-template-columns: repeat(10, 1fr); gap: 2px; }
        .slot { border: 1px solid #333; padding: 2px; font-size: 10px; background: #222; }
    </style>
</head>
<body>
    <div class="container">
        <h1>NECRAI: Dead Army Strategy</h1>
        
        <div class="card">
            <h2>主人公ステータス</h2>
            <div id="player-status"></div>
            <button onclick="saveGame()">データをセーブ</button>
            <button onclick="loadGame()">データをロード</button>
        </div>

        <div class="card">
            <h2>軍団リスト (残り: <span id="slots-left"></span>/100)</h2>
            <div id="inventory" class="inventory-list"></div>
        </div>

        <div class="card" id="dungeon-area">
            <h2>ダンジョン攻略</h2>
            <p id="dungeon-info">拠点未選択</p>
            <button onclick="exploreDungeon()">階層を進む</button>
        </div>
    </div>

    <script>
        let player = { level: 1, atk: 10, hp: 100, occupiedCount: 0 };
        let army = [];
        let currentDungeon = null;
        const MAX_SLOTS = 100;

        // セーブ・ロード機能
        function saveGame() {
            const data = { player, army };
            localStorage.setItem('necrai_save', JSON.stringify(data));
            alert('セーブ完了');
        }

        function loadGame() {
            const data = JSON.parse(localStorage.getItem('necrai_save'));
            if(data) {
                player = data.player;
                army = data.army;
                updateUI();
                alert('ロード完了');
            }
        }

        function updateUI() {
            document.getElementById('player-status').innerText = 
                `Lv: ${player.level} | ATK: ${player.atk} | HP: ${player.hp} | 総占領数: ${player.occupiedCount}`;
            document.getElementById('slots-left').innerText = MAX_SLOTS - army.length;
            
            const invDiv = document.getElementById('inventory');
            invDiv.innerHTML = '';
            army.forEach((unit, index) => {
                const slot = document.createElement('div');
                slot.className = 'slot';
                slot.innerHTML = `${unit.job}<br><button onclick="absorb(${index})">吸</button>`;
                invDiv.appendChild(slot);
            });
        }

        function exploreDungeon() {
            // 階層進行ロジック（簡易版）
            if(Math.random() < 0.1) {
                alert('ボス出現！');
            } else if(Math.random() < 0.3) {
                alert('中ボス出現！');
            } else {
                const job = ['村人', '兵士', '騎士', '魔法使い', '勇者'][Math.floor(Math.random()*5)];
                army.push({job, atk: 5});
                updateUI();
            }
        }

        function absorb(index) {
            const unit = army.splice(index, 1)[0];
            player.atk += Math.floor(unit.atk * 0.5);
            updateUI();
        }

        updateUI();
    </script>
</body>
</html>
