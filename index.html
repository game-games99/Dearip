<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Dearip Core</title>
<style>
body { background:#111; color:#ccc; font-family:sans-serif; padding:10px; }
button { padding:10px; margin:5px; font-size:16px; }
.log { height:300px; overflow:auto; border:1px solid #333; padding:5px; }
</style>
</head>
<body>

<h2>Dearip - ダンジョン</h2>

<div id="status"></div>
<div id="enemy"></div>

<button onclick="attack()">攻撃</button>
<button onclick="nextFloor()">次の階層へ</button>

<div class="log" id="log"></div>

<script>
let player = {
  level:1,
  exp:0,
  hp:100,
  maxHp:100,
  atk:10
};

let floor = 1;
let enemy = null;

/* ログ */
function log(msg){
  const el = document.getElementById("log");
  el.innerHTML = msg + "<br>" + el.innerHTML;
}

/* 敵生成 */
function spawnEnemy(){
  if(floor === 30){
    enemy = {
      name: "城主の歪な異形",
      hp: 500,
      atk: 25,
      exp: 100
    };
  }else{
    const types = ["村人","兵士","魔導師","騎士"];
    const stages = ["ただの","生きたかった","狂気に染まる","支配された"];

    let t = types[Math.floor(Math.random()*types.length)];
    let s = stages[Math.floor(Math.random()*stages.length)];

    enemy = {
      name: s + t,
      hp: 50 + floor * 10,
      atk: 5 + floor * 2,
      exp: 10 + floor * 2
    };
  }
}

/* UI更新 */
function update(){
  document.getElementById("status").innerHTML =
    `Lv:${player.level} HP:${player.hp}/${player.maxHp} ATK:${player.atk} EXP:${player.exp}`;

  document.getElementById("enemy").innerHTML =
    `【${floor}層】 ${enemy.name} HP:${enemy.hp}`;
}

/* 攻撃 */
function attack(){
  if(player.hp <= 0) return;

  let dmg = Math.floor(player.atk * (0.8 + Math.random()*0.4));
  enemy.hp -= dmg;

  log("攻撃 → " + dmg);

  if(enemy.hp <= 0){
    log(enemy.name + " 撃破");

    player.exp += enemy.exp;

    levelUpCheck();

    floor++;
    if(floor > 30){
      log("ダンジョンクリア！");
      reset();
      return;
    }

    spawnEnemy();
  }else{
    enemyAttack();
  }

  update();
}

/* 敵攻撃 */
function enemyAttack(){
  let dmg = Math.floor(enemy.atk * (0.8 + Math.random()*0.4));
  player.hp -= dmg;

  log("敵攻撃 → " + dmg);

  if(player.hp <= 0){
    log("敗北…最初から");
    reset();
  }
}

/* レベルアップ */
function levelUpCheck(){
  let need = player.level * 20;

  if(player.exp >= need){
    player.exp -= need;
    player.level++;
    player.maxHp += 20;
    player.hp = player.maxHp;
    player.atk += 5;

    log("レベルアップ！");
  }
}

/* 次の階層 */
function nextFloor(){
  floor++;
  if(floor > 30){
    log("ダンジョンクリア！");
    reset();
    return;
  }
  spawnEnemy();
  update();
}

/* リセット */
function reset(){
  player = { level:1, exp:0, hp:100, maxHp:100, atk:10 };
  floor = 1;
  spawnEnemy();
  update();
}

/* 初期化 */
spawnEnemy();
update();
</script>

</body>
</html>
