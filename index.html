<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DeaRip - v1.9</title>
    <style>
        :root { 
            --bg: #050505; --panel: #121212; --accent: #dcdcdc; 
            --danger: #ff3333; --win: #ffffff; --skill: #0077be; 
            --exp-bar: #666; --rarity-n: #aaa; --rarity-r: #4af;
            --rarity-e: #a4f; --rarity-l: #fa0;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body { 
            background: var(--bg); color: var(--accent); font-family: 'Hiragino Mincho ProN', 'serif'; 
            margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden;
        }
        #game-container { width: 100%; max-width: 480px; height: 100%; display: flex; flex-direction: column; background: var(--panel); position: relative; }
        
        #header { padding: 10px 15px; border-bottom: 1px solid #333; background: #000; flex-shrink: 0; }
        .status-row { display: flex; justify-content: space-between; font-size: 0.75rem; color: #aaa; margin-bottom: 4px; }
        .bar-container { width: 100%; height: 6px; background: #222; margin: 2px 0; border-radius: 1px; overflow: hidden; }
        .bar-fill { height: 100%; transition: width 0.3s; }
        .hp-bar { background: #2a2; }
        .e-hp-bar { background: #b30000; }
        .exp-bar { background: var(--exp-bar); height: 2px; }
        
        #tab-container { flex: 1; display: flex; flex-direction: column; background: #0a0a0a; overflow: hidden; }
        .tab-buttons { display: flex; border-bottom: 1px solid #222; flex-shrink: 0; }
        .tab-btn { flex: 1; padding: 12px; background: #111; border: none; color: #555; font-size: 0.7rem; cursor: pointer; border-bottom: 2px solid transparent; }
        .tab-btn.active { background: #1a1a1a; color: var(--accent); border-bottom-color: var(--accent); }
        .tab-content { display: none; padding: 12px; flex: 1; font-size: 0.75rem; overflow-y: auto; }
        .tab-content.active { display: flex; flex-direction: column; }
        
        #enemy-area { padding: 15px 0; text-align: center; flex-shrink: 0; }
        #enemy-name { font-size: 0.9rem; margin-bottom: 4px; letter-spacing: 1px; }
        #enemy-hp-num { font-size: 0.7rem; color: #888; margin-bottom: 8px; }

        #battle-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; flex-shrink: 0; }
        button.action-btn { background: #1a1a1a; color: #ccc; border: 1px solid #444; padding: 18px 5px; cursor: pointer; border-radius: 4px; font-size: 0.9rem; }
        button.action-btn:disabled { opacity: 0.2; }
        .btn-skill { border-color: var(--skill) !important; color: #8af !important; }

        #log { flex: 1; overflow-y: auto; font-size: 0.72rem; padding: 10px; background: #000; color: #777; line-height: 1.6; border: 1px solid #222; }
        .log-entry { margin-bottom: 4px; border-left: 2px solid #222; padding-left: 8px; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 20px; margin-bottom: 15px; }
        .stat-item { border-bottom: 1px solid #1a1a1a; padding: 4px 0; display: flex; justify-content: space-between; }
        .stat-label { color: #666; font-size: 0.65rem; }

        .equip-slot { padding: 12px; background: #111; margin-bottom: 8px; border-radius: 4px; border-left: 3px solid #333; }
        .slot-header { display: flex; justify-content: space-between; margin-bottom: 5px; color: #555; font-size: 0.65rem; }
        .equip-name { font-size: 0.85rem; color: #ddd; }
        .equip-eff { font-size: 0.7rem; color: #8af; margin-top: 4px; }

        .coll-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #151515; }
        .coll-name { font-size: 0.7rem; color: #444; flex: 1; }
        .coll-name.comp { color: #fa0; font-weight: bold; }
        .coll-chips { display: flex; gap: 4px; }
        .chip { font-size: 0.55rem; width: 16px; text-align: center; color: #222; background: #111; border-radius: 2px; }
        .chip.active { color: #000; }
        .chip.n.active { background: var(--rarity-n); }
        .chip.r.active { background: var(--rarity-r); }
        .chip.e.active { background: var(--rarity-e); }
        .chip.l.active { background: var(--rarity-l); }

        #version-tag { position: absolute; bottom: 5px; right: 10px; font-size: 0.6rem; color: #333; pointer-events: none; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="header">
        <div id="area-title" style="font-size: 0.65rem; color:#666; margin-bottom:2px;">---</div>
        <div class="status-row">
            <span id="p-lv">Lv.1</span>
            <span id="p-hp-text">HP: --/--</span>
        </div>
        <div class="bar-container"><div id="p-hp-bar" class="bar-fill hp-bar"></div></div>
        <div class="bar-container" style="height:2px;"><div id="p-exp-bar" class="bar-fill exp-bar"></div></div>
    </div>

    <div id="tab-container">
        <div class="tab-buttons">
            <button class="tab-btn active" onclick="game.switchTab(0)">戦闘</button>
            <button class="tab-btn" onclick="game.switchTab(1)">装備</button>
            <button class="tab-btn" onclick="game.switchTab(2)">能力</button>
            <button class="tab-btn" onclick="game.switchTab(3)">収集</button>
        </div>
        
        <div id="tab-battle" class="tab-content active">
            <div id="enemy-area">
                <div id="enemy-name">---</div>
                <div id="enemy-hp-num">HP: --- / ---</div>
                <div class="bar-container" style="height: 10px;"><div id="e-hp-bar" class="bar-fill e-hp-bar"></div></div>
            </div>
            <div id="battle-controls">
                <button id="btn-main" class="action-btn" onclick="game.handleMainBtn()">こうげき</button>
                <button id="btn-skill" class="action-btn btn-skill" onclick="game.battle('skill')" disabled>技</button>
            </div>
            <div id="log"></div>
        </div>

        <div id="tab-equip" class="tab-content"><div id="equip-list"></div></div>
        <div id="tab-status" class="tab-content"><div class="stat-grid" id="stat-list"></div><div id="p-exp-full" style="color:#666; font-size:0.65rem; text-align:right;"></div></div>
        <div id="tab-coll" class="tab-content"><div id="coll-list"></div></div>
    </div>
    <div id="version-tag"></div>
</div>

<script>
class DeaRip {
    constructor() {
        this.VERSION = "1.9";
        this.SAVE_KEY = "DEARIP_SAVE_V19";
        
        this.initData();
        this.load();
        if(!this.seed) this.generateArea(0);
        this.spawn();
    }

    initData() {
        const names = ["村人","兵士","騎士","魔導師","暗殺者","狂戦士","守護者","司祭","狩人","格闘家","盗賊","薬師","剣豪","弓兵","盾使い","吟遊詩人","賢者","死霊使い","竜騎士","忍者","僧侶","修道士","侍","錬金術師","踊り子","海賊","呪術師","機工士","聖騎士","道化師","破戒僧","探検家","貴族","隠者","道士","銃士","狙撃手","槍兵","農夫","山賊","審問官","占星術師","呪われし者","異端者","大師","傭兵","狂人","王","職人","無職","虚空騎士","死神","舞姫","重装歩兵","調教師","魔王","予言者","料理人","狂信者","流浪人","傀儡師","探偵","石像鬼","博徒","発明家","裁定者","氷結使い","炎術師","森の番人","虚像","神主","暗黒騎士","英雄","観測者","混沌の器"];
        this.jobMaster = names.map((n, i) => ({
            id: i, n: n, p: (i > 50) ? "超越的な" : "熟練の", 
            s: { h: 1 + (i*0.025), a: 1 + (i*0.025) },
            sk: n==="無職"?"あがき":"魂の一撃", sm: 2.0 + (i*0.02),
            coll: {
                n: { hp: 5+i }, r: { atk: 2+(i%5) }, e: { def: 1+(i%3), spd: 1+(i%3) },
                l: { atkP: 0.01, exp: 0.02 }
            },
            cb: { hpP: 0.05 }
        }));

        this.areaMaster = [
            { id: 0, name: "嘆きの村", type: "村", tier: 1, jobs: [0, 1, 38, 39, 49] },
            { id: 1, name: "静寂の墓所", type: "墓所", tier: 2, jobs: [7, 10, 11, 17, 33, 61] },
            { id: 2, name: "狂乱の牢獄", type: "牢獄", tier: 3, jobs: [2, 13, 14, 25, 45, 53] },
            { id: 3, name: "忘却の廃都", type: "廃都", tier: 4, jobs: [16, 18, 47, 51, 55, 72] }
        ];
        this.ranks = [{n:"ただの", m:1.0}, {n:"生きたかった", m:1.3}, {n:"狂気に染まる", m:1.8}, {n:"支配された", m:2.5}];
    }

    load() {
        const saved = localStorage.getItem(this.SAVE_KEY);
        if(saved) {
            const data = JSON.parse(saved);
            this.p = data.p; this.floor = data.floor; this.seed = data.seed;
        } else {
            this.resetStatus();
            this.p.eq = { 
                head: { name: "忘却のボロ布", def: 2 }, body: { name: "忘却の骸殻", hp: 40 },
                arm: { name: "忘却の腕", atk: 4, skillId: 49 }, leg: { name: "忘却の足枷", spd: 3 }
            };
            this.p.coll = {};
            this.floor = 1;
        }
    }

    resetStatus() {
        this.p = this.p || {};
        this.p.lv = 1; this.p.exp = 0; this.p.next = 100;
        this.p.base = { hp: 120, atk: 18, def: 5, spd: 10 };
        this.p.hp = this.stats.hp;
    }

    save() { localStorage.setItem(this.SAVE_KEY, JSON.stringify({p:this.p, floor:this.floor, seed:this.seed})); }

    generateArea(areaIdx) {
        const area = this.areaMaster[areaIdx] || this.areaMaster[0];
        this.seed = { ...area, diff: 1 + (area.tier * 0.4) };
    }

    get stats() {
        let s = { ...this.p.base };
        let b = { hp:0, atk:0, def:0, spd:0, hpP:0, atkP:0, defP:0, spdP:0, exp:1, crit:0.05, critD:1.5, eva:0.05, drain:0, regen:0 };
        for(let jn in this.p.coll) {
            const m = this.jobMaster.find(j => j.n === jn);
            const owned = this.p.coll[jn];
            const rr = ["n", "r", "e", "l"];
            owned.forEach((has, i) => { if(has) for(let k in m.coll[rr[i]]) b[k] += m.coll[rr[i]][k]; });
            if(owned.every(v=>v)) for(let k in m.cb) b[k] += m.cb[k];
        }
        for(let k in this.p.eq) {
            const it = this.p.eq[k];
            if(it.hp) s.hp += it.hp; if(it.atk) s.atk += it.atk; if(it.def) s.def += it.def; if(it.spd) s.spd += it.spd;
        }
        return {
            hp: Math.floor((s.hp + b.hp) * (1+b.hpP)), atk: Math.floor((s.atk + b.atk) * (1+b.atkP)),
            def: Math.floor((s.def + b.def) * (1+b.defP)), spd: Math.floor((s.spd + b.spd) * (1+b.spdP)),
            exp: b.exp, crit: b.crit, critD: b.critD, eva: b.eva, drain: b.drain, regen: b.regen
        };
    }

    spawn() {
        const isBoss = this.floor % 30 === 0;
        const availableJobs = this.seed.jobs;
        const job = this.jobMaster[availableJobs[Math.floor(Math.random() * availableJobs.length)]];
        const rankIdx = Math.floor(Math.random() * Math.min(4, this.seed.tier));
        const scale = (1 + (this.floor * 0.12)) * this.seed.diff;
        
        this.enemy = {
            name: isBoss ? `${this.seed.name}の主` : `${this.ranks[rankIdx].n}${job.n}`,
            hp: Math.floor((isBoss?1200:70) * scale * job.s.h),
            atk: Math.floor((isBoss?60:15) * scale * job.s.a),
            def: Math.floor(12 * scale),
            isBoss: isBoss, jobRef: job, rankIdx: rankIdx
        };
        this.enemy.maxHp = this.enemy.hp;
        this.state = "battle";
        this.updateUI();
    }

    levelUp() {
        this.p.lv++; this.p.exp -= this.p.next; this.p.next = Math.floor(this.p.next * 1.6);
        const incHp = 18 + Math.floor(Math.random() * 12);
        const incAtk = 4 + Math.floor(Math.random() * 4);
        this.p.base.hp += incHp; this.p.base.atk += incAtk;
        this.p.base.def += 1; this.p.base.spd += 1;
        this.p.hp = this.stats.hp;
        this.log(`<span style="color:#fff;">魂の格が上昇した (HP+${incHp} ATK+${incAtk})</span>`);
    }

    async battle(mode) {
        if(this.busy || this.state !== "battle") return;
        this.busy = true; const s = this.stats;
        let dmg = s.atk; let isCrit = Math.random() < s.crit;
        if(mode === 'skill') {
            const sk = this.jobMaster.find(j => j.id === this.p.eq.arm.skillId);
            dmg *= sk.sm; this.log(`<span style="color:var(--skill);">『${sk.sk}』</span>`);
        }
        if(isCrit) dmg *= s.critD;
        let finalDmg = Math.max(1, Math.floor(dmg * (600 / (this.enemy.def + 600))));
        this.enemy.hp -= finalDmg;
        this.log(`${this.enemy.name} に ${finalDmg}${isCrit?" (Crit!)":""} ダメージ`);

        if(this.enemy.hp <= 0) {
            this.enemy.hp = 0; this.state = "win";
            const exp = Math.floor((this.enemy.isBoss ? 3000 : 50 + this.floor * 8) * s.exp);
            this.p.exp += exp; this.log(`${exp} exp 獲得`);
            this.tryDrop();
            // 装備ドロップ判定
            if(this.enemy.isBoss || Math.random() < 0.05) this.dropEquip();
            
            if(this.p.exp >= this.p.next) this.levelUp();
            if(this.enemy.isBoss) this.nextArea();
        } else {
            await new Promise(r => setTimeout(r, 250));
            if(Math.random() > s.eva) {
                const eDmg = Math.max(1, Math.floor(this.enemy.atk * (600 / (s.def + 600))));
                this.p.hp -= eDmg;
                this.log(`<span style="color:var(--danger);">${this.enemy.name}から${eDmg}の痛打</span>`);
                if(this.p.hp <= 0) { this.p.hp = 0; this.gameOver(); }
            } else this.log(`回避成功`);
        }
        this.updateUI(); this.busy = false; this.save();
    }

    tryDrop() {
        const jn = this.enemy.jobRef.n;
        if(!this.p.coll[jn]) this.p.coll[jn] = [false,false,false,false];
        const rates = [0.12, 0.04, 0.01, 0.003];
        for(let i=0; i<=this.enemy.rankIdx; i++) {
            if(!this.p.coll[jn][i] && Math.random() < rates[i]) {
                this.p.coll[jn][i] = true;
                this.log(`<span style="color:#fa0;">収集：${jn}の魂獲得</span>`); break;
            }
        }
    }

    dropEquip() {
        const slots = ["head", "body", "arm", "leg"];
        const s = slots[Math.floor(Math.random()*4)];
        const job = this.enemy.jobRef;
        const item = { name: job.p + (s==="head"?"の思考":s==="body"?"の器":s==="arm"?"の腕":"の脚") };
        const baseVal = 5 + (job.id * 0.5);
        if(s==='head') item.def = Math.floor(baseVal * job.s.h);
        if(s==='body') item.hp = Math.floor(baseVal * 10 * job.s.h);
        if(s==='arm') { item.atk = Math.floor(baseVal * 2 * job.s.a); item.skillId = job.id; }
        if(s==='leg') item.spd = Math.floor(baseVal * job.s.a);
        this.p.eq[s] = item;
        this.log(`<span style="color:#fff; background:#444;">適合：${item.name}</span>`);
    }

    nextArea() {
        const nextIdx = (this.areaMaster.findIndex(a => a.id === this.seed.id) + 1) % this.areaMaster.length;
        this.generateArea(nextIdx);
        this.floor++; 
        this.resetStatus(); // エリアクリアでレベルと基礎ステをリセット
        this.log(`<span style="color:#fa0; font-weight:bold;">領域踏破。魂は浄化され、新たな地「${this.seed.name}」へ。</span>`);
    }

    gameOver() {
        this.log(`力尽きた…。。。`);
        this.floor = 1; this.generateArea(0);
        this.resetStatus();
        this.spawn();
    }

    handleMainBtn() {
        if(this.state === "battle") this.battle('atk');
        else { this.floor++; this.spawn(); }
    }

    switchTab(i) {
        document.querySelectorAll('.tab-btn').forEach((b,idx)=>b.classList.toggle('active', i===idx));
        document.querySelectorAll('.tab-content').forEach((c,idx)=>c.classList.toggle('active', i===idx));
    }

    log(m) {
        const l = document.getElementById('log');
        l.innerHTML = `<div class="log-entry">> ${m}</div>` + l.innerHTML;
        if(l.children.length > 40) l.removeChild(l.lastChild);
    }

    updateUI() {
        const s = this.stats;
        document.getElementById('area-title').innerText = `${this.seed.name} (${this.floor}層 / Tier ${this.seed.tier})`;
        document.getElementById('p-lv').innerText = `Lv.${this.p.lv}`;
        document.getElementById('p-hp-text').innerText = `HP: ${this.p.hp} / ${s.hp}`;
        document.getElementById('p-hp-bar').style.width = (this.p.hp/s.hp*100)+'%';
        document.getElementById('p-exp-bar').style.width = (this.p.exp/this.p.next*100)+'%';
        document.getElementById('enemy-name').innerText = this.enemy.name;
        document.getElementById('enemy-hp-num').innerText = `HP: ${this.enemy.hp} / ${this.enemy.maxHp}`;
        document.getElementById('e-hp-bar').style.width = (this.enemy.hp/this.enemy.maxHp*100)+'%';
        document.getElementById('btn-main').innerText = this.state==="battle"?"こうげき":"深層へ";
        const sk = this.jobMaster.find(j=>j.id === this.p.eq.arm.skillId);
        document.getElementById('btn-skill').innerText = sk ? sk.sk : "技なし";
        document.getElementById('btn-skill').disabled = !sk || this.state!=="battle";

        document.getElementById('stat-list').innerHTML = `
            <div class="stat-item"><span class="stat-label">攻撃力</span><span>${s.atk}</span></div>
            <div class="stat-item"><span class="stat-label">防御力</span><span>${s.def}</span></div>
            <div class="stat-item"><span class="stat-label">俊敏性</span><span>${s.spd}</span></div>
            <div class="stat-item"><span class="stat-label">会心率</span><span>${Math.floor(s.crit*100)}%</span></div>
            <div class="stat-item"><span class="stat-label">回避率</span><span>${Math.floor(s.eva*100)}%</span></div>
            <div class="stat-item"><span class="stat-label">獲得経験値</span><span>${s.exp.toFixed(2)}x</span></div>
            <div class="stat-item"><span class="stat-label">吸収/再生</span><span>${s.drain}% / ${s.regen}</span></div>
        `;
        document.getElementById('p-exp-full').innerText = `EXP: ${this.p.exp} / ${this.p.next}`;
        let eqH = "";
        ["head","body","arm","leg"].forEach(k => {
            const it = this.p.eq[k];
            eqH += `<div class="equip-slot"><div class="slot-header">部位: ${k.toUpperCase()}</div><div class="equip-name">${it.name}</div><div class="equip-eff">${this.getEqStr(it)}</div></div>`;
        });
        document.getElementById('equip-list').innerHTML = eqH;
        let collH = "";
        this.jobMaster.forEach(j => {
            const ow = this.p.coll[j.n] || [false,false,false,false];
            collH += `<div class="coll-row"><div class="coll-name ${ow.every(v=>v)?'comp':''}">${j.n}</div><div class="coll-chips">
                <div class="chip n ${ow[0]?'active':''}">N</div><div class="chip r ${ow[1]?'active':''}">R</div>
                <div class="chip e ${ow[2]?'active':''}">E</div><div class="chip l ${ow[3]?'active':''}">L</div>
            </div></div>`;
        });
        document.getElementById('coll-list').innerHTML = collH;
        document.getElementById('version-tag').innerText = `DeaRip v${this.VERSION}`;
    }
    getEqStr(it) {
        let s = [];
        if(it.hp) s.push(`HP+${it.hp}`); if(it.atk) s.push(`ATK+${it.atk}`); 
        if(it.def) s.push(`DEF+${it.def}`); if(it.spd) s.push(`SPD+${it.spd}`);
        if(it.skillId !== undefined) s.push(`[技:${this.jobMaster.find(j=>j.id===it.skillId).sk}]`);
        return s.join(" ");
    }
}
const game = new DeaRip();
</script>
</body>
</html>
